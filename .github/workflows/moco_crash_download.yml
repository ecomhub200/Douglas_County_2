name: Download MoCo Crash Data

# Downloads Montgomery County, MD crash data from the county-level Socrata portal.
# Separate from the statewide Maryland workflow because MoCo publishes its own
# datasets (crashes, drivers, non-motorists) on data.montgomerycountymd.gov.

on:
  schedule:
    # 1st of every month at 7:00 AM UTC
    - cron: '0 7 1 * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to download (e.g., "2023"). Leave empty for current + previous year.'
        required: false
        default: ''
        type: string
      dataset:
        description: 'Dataset to download (leave empty for all 3)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - crashes
          - drivers
          - nonmotorists
      force:
        description: 'Force re-download even if files exist'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  R2_STATE_PREFIX: maryland
  STATE_DISPLAY: "Montgomery County, MD"

jobs:
  download-moco-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build download arguments
        id: build-args
        run: |
          ARGS="--gzip"

          YEAR_INPUT="${{ github.event.inputs.year }}"
          DATASET_INPUT="${{ github.event.inputs.dataset }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ -n "$YEAR_INPUT" ]; then
            echo "year_input=$YEAR_INPUT" >> $GITHUB_OUTPUT
          else
            CURRENT_YEAR=$(date +%Y)
            PREV_YEAR=$((CURRENT_YEAR - 1))
            echo "current_year=$CURRENT_YEAR" >> $GITHUB_OUTPUT
            echo "prev_year=$PREV_YEAR" >> $GITHUB_OUTPUT
          fi

          if [ -n "$DATASET_INPUT" ]; then
            ARGS="$ARGS --dataset $DATASET_INPUT"
          fi

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "year_input=$YEAR_INPUT" >> $GITHUB_OUTPUT
          echo "Download arguments: $ARGS"

      - name: Download MoCo crash data
        run: |
          echo "=========================================="
          echo "Downloading MoCo Crash Data"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          YEAR_INPUT="${{ steps.build-args.outputs.year_input }}"
          ARGS="${{ steps.build-args.outputs.args }}"

          if [ -n "$YEAR_INPUT" ]; then
            python download_moco_crashes.py --year "$YEAR_INPUT" $ARGS
          else
            CURRENT_YEAR="${{ steps.build-args.outputs.current_year }}"
            PREV_YEAR="${{ steps.build-args.outputs.prev_year }}"
            python download_moco_crashes.py --year "$PREV_YEAR" $ARGS
            python download_moco_crashes.py --year "$CURRENT_YEAR" $ARGS
          fi

          echo "=========================================="
          echo "Download complete at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

      - name: Generate download statistics
        id: stats
        run: |
          echo "=========================================="
          echo "Download Statistics"
          echo "=========================================="
          echo ""
          echo "Files in data/MarylandDOT/montgomery/:"
          ls -lh data/MarylandDOT/montgomery/*.csv* 2>/dev/null || echo "  No CSV files found"
          echo ""

          CHANGED=$(git diff --name-only data/MarylandDOT/montgomery/ 2>/dev/null | wc -l | tr -d ' ')
          UNTRACKED=$(git ls-files --others --exclude-standard data/MarylandDOT/montgomery/ 2>/dev/null | wc -l | tr -d ' ')
          echo "Changed files: $CHANGED"
          echo "New files: $UNTRACKED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "untracked=$UNTRACKED" >> $GITHUB_OUTPUT
          echo "=========================================="

      - name: Upload raw CSVs to R2
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          UPLOADED=0
          for f in data/MarylandDOT/montgomery/moco_*.csv data/MarylandDOT/montgomery/moco_*.csv.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            if aws s3 cp "$f" "s3://crash-lens-data/${R2_STATE_PREFIX}/montgomery/raw/${BASENAME}" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "text/csv"; then
              echo "  Uploaded: $f -> ${R2_STATE_PREFIX}/montgomery/raw/${BASENAME}"
              UPLOADED=$((UPLOADED + 1))
            else
              echo "  Warning: failed to upload $f"
            fi
          done
          echo "uploaded=$UPLOADED" >> $GITHUB_OUTPUT
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::warning::No CSV files were uploaded to R2 — download may have failed"
          fi

      - name: Verify R2 state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          echo "=========================================="
          echo "R2 Storage State: ${R2_STATE_PREFIX}/montgomery/raw/"
          echo "=========================================="
          aws s3 ls "s3://crash-lens-data/${R2_STATE_PREFIX}/montgomery/raw/" \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "  Could not list R2 bucket (check credentials)"
          echo "=========================================="

      - name: Upload data as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moco-crash-data
          path: |
            data/MarylandDOT/montgomery/moco_*.csv
            data/MarylandDOT/montgomery/moco_*.csv.gz
          retention-days: 90

      - name: Commit manifest and metadata
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/r2-manifest.json 2>/dev/null || true
          git add data/MarylandDOT/moco_source_manifest.json data/MarylandDOT/moco_config.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update MoCo crash data -> R2 [$(date +'%Y-%m-%d')]"

          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling latest changes..."
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort 2>/dev/null || true
              git pull --no-edit origin main
            }
          done

          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Job summary
        if: always()
        run: |
          UPLOADED="${{ steps.r2-upload.outputs.uploaded || '0' }}"
          CHANGED="${{ steps.stats.outputs.changed || '0' }}"
          UNTRACKED="${{ steps.stats.outputs.untracked || '0' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## MoCo Crash Data Download

          | Metric | Value |
          |--------|-------|
          | Jurisdiction | Montgomery County, MD |
          | CSVs changed | $CHANGED |
          | CSVs new | $UNTRACKED |
          | CSVs uploaded to R2 | $UPLOADED |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF
