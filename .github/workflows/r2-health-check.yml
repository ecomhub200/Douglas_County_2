name: R2 Health Check

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create GitHub issue on failure'
        required: false
        default: 'true'

env:
  R2_PUBLIC_URL: 'https://data.aicreatesai.com'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check R2 public accessibility
        id: check
        run: |
          echo "=========================================="
          echo "R2 Health Check — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Base URL: $R2_PUBLIC_URL"
          echo "=========================================="
          echo ""

          FAILURES=0
          TOTAL=0

          # Test files that should always exist in R2
          TEST_FILES=(
            "colorado/douglas/county_roads.csv"
            "colorado/douglas/city_roads.csv"
            "colorado/douglas/all_roads.csv"
            "virginia/henrico/county_roads.csv"
            "virginia/henrico/city_roads.csv"
            "virginia/henrico/all_roads.csv"
          )

          for FILE in "${TEST_FILES[@]}"; do
            TOTAL=$((TOTAL + 1))
            URL="${R2_PUBLIC_URL}/${FILE}"
            echo "Testing: $URL"

            # HEAD request with 15s timeout
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -I "$URL" 2>/dev/null || echo "000")
            CONTENT_TYPE=$(curl -s -o /dev/null -w "%{content_type}" --max-time 15 -I "$URL" 2>/dev/null || echo "unknown")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  Status: $HTTP_CODE OK"
              echo "  Content-Type: $CONTENT_TYPE"
            else
              echo "  Status: $HTTP_CODE FAILED"
              FAILURES=$((FAILURES + 1))
            fi
            echo ""
          done

          # Test CORS headers
          echo "Testing CORS headers..."
          CORS_URL="${R2_PUBLIC_URL}/colorado/douglas/county_roads.csv"
          CORS_HEADER=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -H "Origin: https://crashlens.com" \
            -I "$CORS_URL" 2>/dev/null || echo "000")
          echo "  CORS test response: HTTP $CORS_HEADER"
          echo ""

          echo "=========================================="
          echo "Results: $((TOTAL - FAILURES))/$TOTAL files accessible"
          echo "=========================================="

          if [ "$FAILURES" -gt 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "failures=$FAILURES" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo ""
            echo "::error::R2 health check failed: $FAILURES/$TOTAL files not accessible"
          else
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "failures=0" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo ""
            echo "All R2 files are publicly accessible"
          fi

      - name: Create GitHub issue on failure
        if: steps.check.outputs.status == 'failed' && (github.event.inputs.create_issue != 'false')
        uses: actions/github-script@v7
        with:
          script: |
            const failures = '${{ steps.check.outputs.failures }}';
            const total = '${{ steps.check.outputs.total }}';
            const now = new Date().toISOString().split('T')[0];

            // Check if there's already an open issue for R2 health
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'r2-health',
              state: 'open'
            });

            if (issues.length > 0) {
              // Add a comment to the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `R2 health check still failing (${now}): ${failures}/${total} files not accessible.\n\nCheck [workflow run](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `R2 Health Check Failed — ${failures}/${total} files not accessible`,
                labels: ['r2-health', 'bug'],
                body: `## R2 Data Pipeline Health Check Failed\n\n**Date:** ${now}\n**Failures:** ${failures}/${total} test files not publicly accessible\n\n### What this means\nThe Cloudflare R2 cloud storage is not serving crash data files properly. Users may not be able to load crash data in the application.\n\n### Possible causes\n1. R2 bucket public access disabled\n2. Custom domain (data.aicreatesai.com) DNS misconfigured\n3. R2 API token expired (uploads failing silently)\n4. Cloudflare service disruption\n\n### Resolution steps\n1. Check [Cloudflare Dashboard](https://dash.cloudflare.com) → R2 → crash-lens-data → Settings\n2. Verify custom domain is active\n3. Verify public access is enabled\n4. Check [workflow run](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details\n\n### Auto-close\nThis issue will be updated on subsequent failures. Close it once resolved.`
              });
              console.log('Created new R2 health issue');
            }
