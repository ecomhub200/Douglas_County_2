      skip_validation:
        description: 'Skip validation step'
        required: false
        default: false
        type: boolean
      skip_geocode:
        description: 'Skip geocoding step'
        required: false
        default: false
        type: boolean
      skip_forecasts:
        description: 'Skip forecast generation'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (report sizes only, no uploads)'
        required: false
