# ==============================================================================
# Batch Process All Jurisdictions — 50 US States + DC
# ==============================================================================
# Downloads statewide data ONCE, then processes through the full pipeline:
# Download → Merge → Convert → Validate → Geocode → Split → Upload
#
# Produces 3 road-type variants per jurisdiction:
#   (county_roads, no_interstate, all_roads)
#
# Virginia: 133 jurisdictions × 3 variants = 399 CSVs
# Colorado:  64 counties × 3 variants      = 192 CSVs
# + 49 additional states with ~2,857 jurisdictions
#
# This workflow is designed to run ONCE for initial population or periodically
# for full refresh. For single-jurisdiction updates, use the regular workflows.
# ==============================================================================

name: Batch All Jurisdictions

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to process'
        required: true
        type: choice
        options:
          - virginia
          - colorado
          - alabama
          - alaska
          - arizona
          - arkansas
          - california
          - connecticut
          - delaware
          - district_of_columbia
          - florida
          - georgia
          - hawaii
          - idaho
          - illinois
          - indiana
          - iowa
          - kansas
          - kentucky
          - louisiana
          - maine
          - maryland
          - massachusetts
          - michigan
          - minnesota
          - mississippi
          - missouri
          - montana
          - nebraska
          - nevada
          - new_hampshire
          - new_jersey
          - new_mexico
          - new_york
          - north_carolina
          - north_dakota
          - ohio
          - oklahoma
          - oregon
          - pennsylvania
          - rhode_island
          - south_carolina
          - south_dakota
          - tennessee
          - texas
          - utah
          - vermont
          - washington_state
          - west_virginia
          - wisconsin
          - wyoming
      batch_size:
        description: 'Jurisdictions per upload batch (0=all at once)'
        required: false
        default: '20'
        type: string
      jurisdictions:
        description: 'Jurisdiction to process (type "all" for all jurisdictions in the selected state, or a specific name like "henrico" or "de_kent"). Resolved automatically based on state selection.'
        required: false
        default: 'all'
        type: string
      skip_validation:
        description: 'Skip validation step'
        required: false
        default: false
        type: boolean
      skip_geocode:
        description: 'Skip geocoding step'
        required: false
        default: false
        type: boolean
      skip_forecasts:
        description: 'Skip forecast generation'
        required: false
        default: true
        type: boolean
      dry_run:
        description: 'Dry run (report sizes only, no uploads)'
        required: false
        default: false
        type: boolean

env:
  NOTIFICATION_EMAIL: ecomhub200@gmail.com

jobs:
  # ============================================================
  # Process state: Download → Merge → Convert → Validate →
  #                Geocode → Split → Upload
  # ============================================================
  process-state:
    name: Process (${{ github.event.inputs.state }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      state: ${{ github.event.inputs.state }}
      jurisdiction_count: ${{ steps.split.outputs.jurisdiction_count }}
      total_records: ${{ steps.download.outputs.total_records }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests awscli
          STATE="${{ github.event.inputs.state }}"
          # Colorado needs Playwright for OnBase
          if [ "$STATE" = "colorado" ]; then
            pip install playwright openpyxl
            playwright install chromium
          fi

      # ── Stage 0: Validate jurisdiction input against selected state ──
      - name: Validate jurisdiction input (Stage 0)
        id: validate-jurisdiction
        run: |
          STATE="${{ github.event.inputs.state }}"
          JURISDICTION="${{ github.event.inputs.jurisdictions }}"

          echo "=========================================="
          echo "Stage 0: Validate jurisdiction for $STATE"
          echo "=========================================="

          python3 << 'VALIDATE_EOF'
          import json, sys, os

          state = os.environ.get('INPUT_STATE', '${{ github.event.inputs.state }}')
          jurisdiction = os.environ.get('INPUT_JURISDICTION', '${{ github.event.inputs.jurisdictions }}')

          # Load state-jurisdiction mapping
          config_path = 'config/state_jurisdictions.json'
          if not os.path.exists(config_path):
              print(f"::error::Missing {config_path}. Cannot validate jurisdiction.")
              sys.exit(1)

          with open(config_path) as f:
              mapping = json.load(f)

          if state not in mapping:
              print(f"::error::Unknown state '{state}'. Available: {', '.join(sorted(mapping.keys()))}")
              sys.exit(1)

          available = mapping[state]
          print(f"State: {state}")
          print(f"Available jurisdictions ({len(available)}):")
          for j in available:
              print(f"  - {j}")

          if jurisdiction.lower() == 'all' or jurisdiction == '':
              print(f"\n✓ Processing ALL {len(available)} jurisdictions for {state}")
          else:
              # Check if the jurisdiction exists for this state
              if jurisdiction in available:
                  print(f"\n✓ Jurisdiction '{jurisdiction}' is valid for {state}")
              else:
                  # Try stripping state prefix for user convenience
                  stripped = jurisdiction
                  for prefix_len in [2, 3]:
                      if jurisdiction.startswith(jurisdiction[:prefix_len] + '_'):
                          stripped = jurisdiction[prefix_len + 1:]
                          break
                  if stripped != jurisdiction and stripped in [j.split('_', 1)[-1] if '_' in j else j for j in available]:
                      print(f"\n⚠ '{jurisdiction}' not found, but '{stripped}' matches. Will use: {jurisdiction}")
                  else:
                      print(f"\n::error::Jurisdiction '{jurisdiction}' is NOT valid for {state}.")
                      print(f"Available jurisdictions for {state}:")
                      for j in available:
                          print(f"  - {j}")
                      sys.exit(1)
          VALIDATE_EOF

          echo "jurisdiction_validated=true" >> $GITHUB_OUTPUT

      # ── Stage 1: Download statewide data ──
      - name: Download statewide data (Stage 1)
        id: download
        timeout-minutes: 45
        run: |
          STATE="${{ github.event.inputs.state }}"
          echo "=========================================="
          echo "Stage 1: Download statewide data for $STATE"
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          # Resolve the data directory and download script per state
          # Each state has its download script in data/{StateName}DOT/
          DATA_DIR="data"
          STATEWIDE=""

          if [ "$STATE" = "virginia" ]; then
            python download_crash_data.py \
              --jurisdiction henrico \
              --filter allRoads \
              --output data/_statewide_temp.csv \
              --save-statewide

            if [ -f "data/virginia_statewide_all_roads.csv" ]; then
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            elif [ -f "data/virginia_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/virginia_statewide_all_roads.csv.gz
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            else
              echo "Statewide file not found — re-downloading..."
              python -c "
          import sys, json
          sys.path.insert(0, '.')
          from download_crash_data import download_from_fallback, standardize_columns
          config = json.load(open('config.json'))
          df = download_from_fallback(config)
          df = standardize_columns(df)
          df.to_csv('data/virginia_statewide_all_roads.csv', index=False)
          print(f'Saved {len(df)} statewide records')
          "
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            fi
            rm -f data/_statewide_temp.csv

          elif [ "$STATE" = "colorado" ]; then
            python download_cdot_crash_data.py \
              --data-dir data/CDOT \
              --save-statewide-gzip

            if [ -f "data/CDOT/colorado_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/CDOT/colorado_statewide_all_roads.csv.gz
              STATEWIDE="data/CDOT/colorado_statewide_all_roads.csv"
            elif [ -f "data/CDOT/colorado_statewide_raw.csv" ]; then
              STATEWIDE="data/CDOT/colorado_statewide_raw.csv"
            else
              echo "::error::No statewide CSV found for Colorado"
              exit 1
            fi

          else
            # Generic state download using state-specific download scripts
            # Map state name to DOT directory name
            DOT_DIR=$(python3 -c "
          import json, os, glob
          state = '$STATE'
          # Check for state-specific download script
          patterns = [
              f'data/*/{state.replace(\"_\",\"\").title()}*download*.py',
              f'data/*/download_{state.replace(\"_\",\"-\")}_crash_data.py',
              f'data/*/download_{state}_crash_data.py',
          ]
          for p in patterns:
              matches = glob.glob(p)
              if matches:
                  print(os.path.dirname(matches[0]))
                  break
          else:
              # Fallback: construct DOT dir name
              parts = state.split('_')
              name = ''.join(p.title() for p in parts)
              print(f'data/{name}DOT')
          ")

            echo "DOT directory: $DOT_DIR"

            # Find and run the state-specific download script
            DOWNLOAD_SCRIPT=$(find "$DOT_DIR" -name "download_*_crash_data.py" -type f 2>/dev/null | head -1)

            if [ -n "$DOWNLOAD_SCRIPT" ]; then
              echo "Running: $DOWNLOAD_SCRIPT"
              python "$DOWNLOAD_SCRIPT" --data-dir "$DOT_DIR" --gzip 2>&1 || {
                echo "::warning::Download script failed, checking for existing data..."
              }
            else
              echo "::warning::No download script found for $STATE in $DOT_DIR"
            fi

            # Find the statewide CSV (look for common patterns)
            for f in "$DOT_DIR"/${STATE}_statewide*.csv "$DOT_DIR"/*statewide*.csv "$DOT_DIR"/*.csv; do
              if [ -f "$f" ]; then
                STATEWIDE="$f"
                break
              fi
            done

            # Try decompressing gzip if no CSV found
            if [ -z "$STATEWIDE" ]; then
              GZ=$(find "$DOT_DIR" -name "*statewide*.csv.gz" -type f 2>/dev/null | head -1)
              if [ -n "$GZ" ]; then
                gunzip -k "$GZ"
                STATEWIDE="${GZ%.gz}"
              fi
            fi
          fi

          # Verify statewide CSV exists
          if [ -z "$STATEWIDE" ] || [ ! -f "$STATEWIDE" ]; then
            echo "::error::Statewide CSV not found for $STATE"
            exit 1
          fi

          TOTAL=$(wc -l < "$STATEWIDE" | tr -d ' ')
          SIZE=$(ls -lh "$STATEWIDE" | awk '{print $5}')
          echo "Statewide: $STATEWIDE ($((TOTAL - 1)) records, $SIZE)"
          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT
          echo "total_records=$((TOTAL - 1))" >> $GITHUB_OUTPUT
          echo "data_dir=$(dirname $STATEWIDE)" >> $GITHUB_OUTPUT

      # ── Stage 2: Merge (if multi-file state data) ──
      - name: Merge source files if needed (Stage 2)
        id: merge
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 2: Merge check"
          echo "=========================================="

          # Virginia data is already merged by the download script
          # Colorado data is already merged by download_cdot_crash_data.py
          # For other states, check if multiple raw files need merging
          if [ "$STATE" != "virginia" ] && [ "$STATE" != "colorado" ]; then
            RAW_COUNT=$(find "$DATA_DIR" -maxdepth 1 -name "*.csv" ! -name "*statewide*" ! -name "*standardized*" -type f 2>/dev/null | wc -l)
            if [ "$RAW_COUNT" -gt 1 ]; then
              echo "Found $RAW_COUNT raw CSV files — merging..."
              python scripts/process_crash_data.py \
                -i "$DATA_DIR"/*.csv \
                -s "$STATE" -j "statewide" \
                -o "$DATA_DIR" \
                --merge --convert-only
              STATEWIDE="$DATA_DIR/statewide_standardized.csv"
              echo "Merged and converted: $STATEWIDE"
            else
              echo "Single statewide file — no merge needed"
            fi
          fi

          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT

      # ── Stage 3: Convert to standardized format ──
      - name: Convert to standardized format (Stage 3)
        id: convert
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 3: Convert to standardized format"
          echo "=========================================="

          # Virginia data is already in standard format (passthrough)
          if [ "$STATE" = "virginia" ]; then
            echo "Virginia data already in standard format — skipping convert"
            echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT
          else
            # Use the process pipeline convert stage
            CONVERTED="$DATA_DIR/${STATE}_statewide_standardized.csv"
            python scripts/process_crash_data.py \
              -i "$STATEWIDE" \
              -s "$STATE" -j "statewide" \
              -o "$DATA_DIR" \
              --convert-only --force 2>&1 || {
              echo "::warning::Convert stage failed, using raw data for remaining stages"
              CONVERTED="$STATEWIDE"
            }

            # Find the standardized output
            if [ -f "$DATA_DIR/statewide_standardized.csv" ]; then
              CONVERTED="$DATA_DIR/statewide_standardized.csv"
            fi

            echo "Converted: $CONVERTED"
            echo "statewide_path=$CONVERTED" >> $GITHUB_OUTPUT
          fi

      # ── Stage 4: Validate statewide data ──
      - name: Validate statewide data (Stage 4)
        id: validate
        if: github.event.inputs.skip_validation != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.convert.outputs.statewide_path || steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 4: Validate statewide data"
          echo "=========================================="

          pip install -r validation/requirements.txt 2>/dev/null || true

          # Run validation on the statewide file
          python scripts/process_crash_data.py \
            -i "$STATEWIDE" \
            -s "$STATE" -j "statewide" \
            -o "$DATA_DIR" \
            --skip-geocode --skip-split --force 2>&1 || {
            echo "::warning::Validation completed with warnings"
          }

          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT

      # ── Stage 5: Geocode statewide data ──
      - name: Geocode statewide data (Stage 5)
        id: geocode
        if: github.event.inputs.skip_geocode != 'true' && github.event.inputs.dry_run != 'true'
        timeout-minutes: 60
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.validate.outputs.statewide_path || steps.convert.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 5: Geocode statewide data"
          echo "=========================================="

          python scripts/process_crash_data.py \
            -i "$STATEWIDE" \
            -s "$STATE" -j "statewide" \
            -o "$DATA_DIR" \
            --skip-split --skip-validation --force 2>&1 || {
            echo "::warning::Geocoding completed with warnings"
          }

          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT

      # ── Stage 6: Split into jurisdictions ──
      - name: Split into jurisdictions (Stage 6)
        id: split
        run: |
          STATE="${{ github.event.inputs.state }}"
          # Find the most processed version of statewide data
          STATEWIDE="${{ steps.geocode.outputs.statewide_path || steps.validate.outputs.statewide_path || steps.convert.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"
          JURISDICTIONS="${{ github.event.inputs.jurisdictions }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "=========================================="
          echo "Stage 6: Split into jurisdictions"
          echo "=========================================="

          ARGS="--state $STATE --input $STATEWIDE --output-dir $DATA_DIR"

          # Optional: specific jurisdiction from dropdown
          if [ "$JURISDICTIONS" != "all" ] && [ -n "$JURISDICTIONS" ]; then
            # Strip state prefix if present (e.g., tx_harris -> harris)
            JURIS_KEY=$(echo "$JURISDICTIONS" | sed 's/^[a-z][a-z]_//')
            ARGS="$ARGS --jurisdictions $JURIS_KEY"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python scripts/split_jurisdictions.py $ARGS

          # Count jurisdictions processed
          if [ -f "$DATA_DIR/.split_report.json" ]; then
            JCOUNT=$(python -c "import json; r=json.load(open('$DATA_DIR/.split_report.json')); print(r['successful'])")
            EMPTY=$(python -c "import json; r=json.load(open('$DATA_DIR/.split_report.json')); print(r['empty'])")
            echo "jurisdiction_count=$JCOUNT" >> $GITHUB_OUTPUT
            echo "Split complete: $JCOUNT jurisdictions with data, $EMPTY empty"
          else
            echo "jurisdiction_count=0" >> $GITHUB_OUTPUT
          fi

          CSV_COUNT=$(find "$DATA_DIR" -maxdepth 1 \( -name "*_all_roads.csv" -o -name "*_county_roads.csv" -o -name "*_no_interstate.csv" \) -type f 2>/dev/null | wc -l)
          echo "Total CSV files generated: $CSV_COUNT"

      # ── Stage 7: Upload all CSVs to R2 ──
      - name: Upload all jurisdiction CSVs to R2 (Stage 7)
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ github.event.inputs.state }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"
          R2_PREFIX="$STATE"

          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          echo "=========================================="
          echo "Stage 7: Uploading all CSVs to R2"
          echo "=========================================="

          # Generate the full R2 upload manifest
          MANIFEST=$(python scripts/split_jurisdictions.py \
            --state "$STATE" --r2-manifest --r2-prefix "$R2_PREFIX" --output-dir "$DATA_DIR")

          TOTAL_FILES=$(echo "$MANIFEST" | python -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "Total files to upload: $TOTAL_FILES"

          # Upload all files using AWS CLI
          echo "$MANIFEST" | python3 -c "
          import json, sys, subprocess, os

          files = json.load(sys.stdin)
          endpoint = '$R2_ENDPOINT'
          bucket = '$R2_BUCKET'
          success = 0
          failed = 0
          skipped = 0

          print(f'Uploading {len(files)} files to R2...')

          for i, entry in enumerate(files):
              local = entry['local_path']
              r2_key = entry['r2_key']

              if not os.path.exists(local):
                  skipped += 1
                  continue

              content_type = 'text/csv'
              cmd = [
                  'aws', 's3', 'cp', local, f's3://{bucket}/{r2_key}',
                  '--endpoint-url', endpoint,
                  '--content-type', content_type,
                  '--only-show-errors'
              ]

              try:
                  subprocess.run(cmd, check=True, capture_output=True, timeout=120)
                  success += 1
              except subprocess.TimeoutExpired:
                  print(f'  TIMEOUT: {r2_key}')
                  failed += 1
              except subprocess.CalledProcessError as e:
                  print(f'  FAIL: {r2_key}: {e.stderr.decode() if e.stderr else str(e)}')
                  failed += 1

              if (i + 1) % 50 == 0 or (i + 1) == len(files):
                  print(f'  Progress: {i+1}/{len(files)} ({success} ok, {failed} fail, {skipped} skip)')

          print(f'')
          print(f'Upload complete: {success} succeeded, {failed} failed, {skipped} skipped')

          if failed > 0:
              sys.exit(1)
          "

      # ── Stage 7.5: Upload statewide gzip to R2 ──
      - name: Upload statewide gzip to R2 (Stage 7.5)
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ github.event.inputs.state }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          # Find gzip file
          GZ=$(find "$DATA_DIR" -name "*statewide*.csv.gz" -type f 2>/dev/null | head -1)
          if [ -z "$GZ" ]; then
            # Try creating gzip from statewide CSV
            STATEWIDE=$(find "$DATA_DIR" -name "*statewide*.csv" -type f 2>/dev/null | head -1)
            if [ -n "$STATEWIDE" ]; then
              gzip -k "$STATEWIDE"
              GZ="${STATEWIDE}.gz"
            fi
          fi

          R2_KEY="${STATE}/_state/statewide_all_roads.csv.gz"

          if [ -n "$GZ" ] && [ -f "$GZ" ]; then
            SIZE=$(ls -lh "$GZ" | awk '{print $5}')
            echo "Uploading statewide gzip: $GZ ($SIZE) → $R2_KEY"
            aws s3 cp "$GZ" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/gzip" \
              --content-encoding "gzip"
            echo "Statewide gzip uploaded successfully"
          else
            echo "No statewide gzip found — skipping"
          fi

      # ── Stage 8: Generate forecasts (optional) ──
      - name: Generate forecasts (Stage 8)
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        timeout-minutes: 60
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          STATE="${{ github.event.inputs.state }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 8: Batch forecast generation"
          echo "=========================================="

          FORECAST_FLAGS=""
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "No AWS credentials — using dry-run mode"
            FORECAST_FLAGS="--dry-run"
          fi

          SUCCESS=0
          for f in "$DATA_DIR"/*_all_roads.csv; do
            [ -f "$f" ] || continue
            JURISDICTION=$(basename "$f" | sed 's/_all_roads\.csv$//')
            echo "  Forecasting: $JURISDICTION..."
            python scripts/generate_forecast.py \
              --all-road-types \
              --jurisdiction "$JURISDICTION" \
              --data-dir "$DATA_DIR" \
              $FORECAST_FLAGS 2>/dev/null && {
              SUCCESS=$((SUCCESS + 1))
            } || {
              echo "    WARNING: Forecast failed for $JURISDICTION (non-fatal)"
            }
          done

          echo "Forecasts generated: $SUCCESS jurisdictions"

      # ── Stage 9: Generate aggregates ──
      - name: Generate aggregates (Stage 9)
        if: github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ github.event.inputs.state }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 9: Generating aggregates"
          echo "=========================================="

          python scripts/generate_aggregates.py \
            --state "$STATE" \
            --data-dir "$DATA_DIR" \
            --output-dir "data/$STATE" || {
            echo "WARNING: Aggregate generation failed (non-fatal)"
          }

          python scripts/generate_aggregates.py \
            --federal \
            --output-dir data || {
            echo "WARNING: Federal aggregate generation failed (non-fatal)"
          }

          # Upload aggregates to R2
          if [ -d "data/$STATE" ]; then
            echo "Aggregate files generated:"
            find "data/$STATE" -name "*.json" -path "*/_*" -type f | head -20

            export AWS_ACCESS_KEY_ID="${{ secrets.CF_R2_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION="auto"
            R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"

            find "data/$STATE" -name "*.json" -path "*/_*" -type f | while read f; do
              R2_KEY="${f#data/}"
              echo "  → $R2_KEY"
              aws s3 cp "$f" "s3://crash-lens-data/$R2_KEY" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type "application/json" \
                --only-show-errors || true
            done

            if [ -d "data/_federal" ]; then
              find "data/_federal" -name "*.json" -type f | while read f; do
                R2_KEY="${f#data/}"
                echo "  → $R2_KEY"
                aws s3 cp "$f" "s3://crash-lens-data/$R2_KEY" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --content-type "application/json" \
                  --only-show-errors || true
              done
            fi
          fi

      # ── Stage 10: Commit metadata ──
      - name: Commit metadata (Stage 10)
        if: github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ github.event.inputs.state }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/r2-manifest.json 2>/dev/null || true
          git add data/.validation/ 2>/dev/null || true
          git add data/.split_report.json 2>/dev/null || true
          git add data/*/.split_report.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
          else
            JCOUNT="${{ steps.split.outputs.jurisdiction_count || '0' }}"
            git commit -m "batch: process $JCOUNT ${STATE} jurisdictions ($(date -u '+%Y-%m-%d'))"

            MAX_RETRIES=4
            for i in $(seq 1 $MAX_RETRIES); do
              if git push origin main; then
                echo "Push succeeded"
                break
              fi
              echo "Push failed (attempt $i/$MAX_RETRIES), retrying in $((2 ** i))s..."
              sleep $((2 ** i))
              git fetch origin main
              git rebase origin/main || git pull --no-edit origin main
            done
          fi

      # ── Job Summary ──
      - name: Job summary
        if: always()
        run: |
          STATE="${{ github.event.inputs.state }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"
          echo "## Batch Processing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| State | $STATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Records | ${{ steps.download.outputs.total_records || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jurisdictions | ${{ steps.split.outputs.jurisdiction_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline | Download → Merge → Convert → Validate → Geocode → Split → Upload |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY

          REPORT_FILE=$(find "${DATA_DIR:-.}" -name ".split_report.json" -type f 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            REPORT=$(cat "$REPORT_FILE")
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Split Report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo "$REPORT" | python -m json.tool >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
