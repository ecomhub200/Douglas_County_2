name: Process CDOT Crash Data

# Triggers:
#   1. Auto-trigger when a new CSV is pushed to data/CDOT/
#   2. Manual trigger with configurable options

on:
  push:
    branches: [main]
    paths:
      - 'data/CDOT/**/*.csv'
      - 'data/CDOT/*.csv'
      # Ignore pipeline output files (only trigger on raw data)
      - '!data/CDOT/*_standardized.csv'
      - '!data/CDOT/*_all_roads.csv'
      - '!data/CDOT/*_county_roads.csv'
      - '!data/CDOT/*_no_interstate.csv'
      - '!data/CDOT/crashes.csv'
      - '!data/CDOT/*_merged_raw.csv'

  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'Jurisdiction to process'
        required: false
        default: 'douglas'
        type: choice
        options:
          - douglas
          - arapahoe
          - jefferson
          - elpaso
          - denver
          - adams
      input_files:
        description: 'Input CSV file(s) glob pattern (e.g., "data/CDOT/2024*.csv")'
        required: false
        default: ''
        type: string
      merge:
        description: 'Merge all matching input files before processing'
        required: false
        type: boolean
        default: true
      skip_geocode:
        description: 'Skip geocoding stage (faster)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (preview only, no output files)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  process-cdot-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect new/changed CSV files
        id: detect
        run: |
          set -e

          # Helper: check if a filename is a pipeline output
          is_pipeline_output() {
            local name
            name=$(basename "$1" | tr '[:upper:]' '[:lower:]')
            case "$name" in
              *_standardized.csv|*_all_roads.csv|*_county_roads.csv|*_no_interstate.csv|*_merged_raw.csv|crashes.csv)
                return 0 ;;
              *)
                return 1 ;;
            esac
          }

          # File list: one path per line (handles spaces in filenames)
          FILE_LIST="${RUNNER_TEMP}/input_files.txt"
          > "$FILE_LIST"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # --- Manual trigger ---
            JURISDICTION="${{ github.event.inputs.jurisdiction }}"
            echo "jurisdiction=$JURISDICTION" >> "$GITHUB_OUTPUT"

            INPUT_PATTERN="${{ github.event.inputs.input_files }}"
            if [ -z "$INPUT_PATTERN" ]; then
              # Default: all raw CSVs in data/CDOT/ that aren't pipeline outputs
              while IFS= read -r -d '' f; do
                if ! is_pipeline_output "$f"; then
                  echo "$f" >> "$FILE_LIST"
                fi
              done < <(find data/CDOT/ -maxdepth 1 -name '*.csv' -print0 | sort -z)
            else
              # Expand the user-provided glob pattern
              for f in $INPUT_PATTERN; do
                if [ -f "$f" ]; then
                  echo "$f" >> "$FILE_LIST"
                fi
              done
            fi

            echo "merge=${{ github.event.inputs.merge }}" >> "$GITHUB_OUTPUT"
            echo "skip_geocode=${{ github.event.inputs.skip_geocode }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"

          else
            # --- Push trigger: detect which CSVs changed ---
            JURISDICTION="douglas"

            # Get changed CSV files from the commit (one per line, handles spaces)
            git diff --name-only HEAD~1 HEAD -- 'data/CDOT/*.csv' 2>/dev/null | while IFS= read -r f; do
              if [ -n "$f" ] && ! is_pipeline_output "$f"; then
                echo "$f" >> "$FILE_LIST"
              fi
            done

            # If no raw CSV changes detected, collect all raw CSVs for merge
            if [ ! -s "$FILE_LIST" ]; then
              echo "No new raw CSVs in this push. Collecting all raw CSVs..."
              while IFS= read -r -d '' f; do
                if ! is_pipeline_output "$f"; then
                  echo "$f" >> "$FILE_LIST"
                fi
              done < <(find data/CDOT/ -maxdepth 1 -name '*.csv' -print0 | sort -z)
            fi

            echo "jurisdiction=$JURISDICTION" >> "$GITHUB_OUTPUT"
            echo "merge=true" >> "$GITHUB_OUTPUT"
            echo "skip_geocode=false" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

          # Count files and report
          if [ ! -s "$FILE_LIST" ]; then
            echo "No input CSV files found. Exiting."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            FILE_COUNT=$(wc -l < "$FILE_LIST")
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

            echo "=========================================="
            echo "Detected $FILE_COUNT input file(s):"
            while IFS= read -r f; do
              if [ -f "$f" ]; then
                SIZE=$(wc -c < "$f")
                ROWS=$(wc -l < "$f")
                echo "  $f ($ROWS rows, $(numfmt --to=iec "$SIZE" 2>/dev/null || echo "${SIZE}B"))"
              else
                echo "  $f (FILE NOT FOUND)"
              fi
            done < "$FILE_LIST"
            echo "=========================================="
          fi

      - name: Run pipeline
        if: steps.detect.outputs.has_files == 'true'
        id: pipeline
        run: |
          JURISDICTION="${{ steps.detect.outputs.jurisdiction }}"
          MERGE="${{ steps.detect.outputs.merge }}"
          SKIP_GEOCODE="${{ steps.detect.outputs.skip_geocode }}"
          DRY_RUN="${{ steps.detect.outputs.dry_run }}"
          FILE_LIST="${RUNNER_TEMP}/input_files.txt"

          echo "=========================================="
          echo "CDOT Pipeline - Processing $JURISDICTION"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          # Build command as a bash array (handles spaces in filenames)
          CMD=(python scripts/process_crash_data.py)

          # Add each input file individually with proper quoting
          CMD+=(-i)
          while IFS= read -r f; do
            CMD+=("$f")
          done < "$FILE_LIST"

          CMD+=(-s colorado -j "$JURISDICTION" -f -v)

          if [ "$MERGE" = "true" ]; then
            CMD+=(--merge)
            echo "Mode: Merge all files before processing"
          fi

          if [ "$SKIP_GEOCODE" = "true" ]; then
            CMD+=(--skip-geocode)
            echo "Geocoding: Skipped"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
            echo "Mode: Dry run (no output)"
          fi

          echo "Running: ${CMD[*]}"
          echo ""
          "${CMD[@]}"

          echo "=========================================="
          echo "Pipeline complete at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

      - name: Display pipeline report
        if: steps.detect.outputs.has_files == 'true'
        run: |
          REPORT="data/CDOT/.validation/pipeline_report.json"
          if [ -f "$REPORT" ]; then
            echo "=========================================="
            echo "Pipeline Report"
            echo "=========================================="
            python -m json.tool "$REPORT"

            # Extract key metrics for summary
            INPUT=$(python -c "import json; print(json.load(open('$REPORT'))['input_rows'])")
            OUTPUT=$(python -c "import json; print(json.load(open('$REPORT'))['output_rows'])")
            DUPES=$(python -c "import json; print(json.load(open('$REPORT'))['duplicates_removed'])")
            GPS=$(python -c "import json; print(json.load(open('$REPORT'))['gps_coverage'])")

            echo ""
            echo "Summary: $INPUT input -> $OUTPUT output | $DUPES duplicates removed | GPS: $GPS"
          else
            echo "No pipeline report found"
          fi

      - name: Verify output files
        if: steps.detect.outputs.has_files == 'true' && steps.detect.outputs.dry_run != 'true'
        run: |
          JURISDICTION="${{ steps.detect.outputs.jurisdiction }}"
          echo "=========================================="
          echo "Output Files"
          echo "=========================================="

          for suffix in standardized all_roads county_roads no_interstate; do
            FILE="data/CDOT/${JURISDICTION}_${suffix}.csv"
            if [ -f "$FILE" ]; then
              ROWS=$(wc -l < "$FILE")
              SIZE=$(ls -lh "$FILE" | awk '{print $5}')
              echo "  $FILE: $((ROWS - 1)) rows ($SIZE)"
            else
              echo "  $FILE: MISSING"
            fi
          done

          FALLBACK="data/CDOT/crashes.csv"
          if [ -f "$FALLBACK" ]; then
            ROWS=$(wc -l < "$FALLBACK")
            echo "  $FALLBACK: $((ROWS - 1)) rows (fallback)"
          fi

      - name: Generate workflow summary
        if: steps.detect.outputs.has_files == 'true'
        run: |
          JURISDICTION="${{ steps.detect.outputs.jurisdiction }}"
          REPORT="data/CDOT/.validation/pipeline_report.json"

          {
            echo "## CDOT Pipeline Results"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| Jurisdiction | $JURISDICTION |"
            echo "| Input Files | ${{ steps.detect.outputs.file_count }} |"
            echo "| Merge Mode | ${{ steps.detect.outputs.merge }} |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo ""

            if [ -f "$REPORT" ]; then
              echo "### Pipeline Report"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Input Rows | $(python -c "import json; print(json.load(open('$REPORT'))['input_rows'])") |"
              echo "| Output Rows | $(python -c "import json; print(json.load(open('$REPORT'))['output_rows'])") |"
              echo "| Duplicates Removed | $(python -c "import json; print(json.load(open('$REPORT'))['duplicates_removed'])") |"
              echo "| GPS Coverage | $(python -c "import json; print(json.load(open('$REPORT'))['gps_coverage'])") |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push processed data
        if: steps.detect.outputs.has_files == 'true' && steps.detect.outputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          JURISDICTION="${{ steps.detect.outputs.jurisdiction }}"

          # Stage only pipeline output files (not the raw input CSVs)
          git add \
            "data/CDOT/${JURISDICTION}_standardized.csv" \
            "data/CDOT/${JURISDICTION}_all_roads.csv" \
            "data/CDOT/${JURISDICTION}_county_roads.csv" \
            "data/CDOT/${JURISDICTION}_no_interstate.csv" \
            "data/CDOT/crashes.csv" \
            "data/CDOT/.validation/" \
            2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Build commit message with report data
          REPORT="data/CDOT/.validation/pipeline_report.json"
          if [ -f "$REPORT" ]; then
            INPUT=$(python -c "import json; print(json.load(open('$REPORT'))['input_rows'])")
            OUTPUT=$(python -c "import json; print(json.load(open('$REPORT'))['output_rows'])")
            GPS=$(python -c "import json; print(json.load(open('$REPORT'))['gps_coverage'])")
            TRIGGER="${{ github.event_name }}"
            git commit -m "Auto-process: CDOT $JURISDICTION pipeline - $(date +'%Y-%m-%d')

          Pipeline: $INPUT input -> $OUTPUT output | GPS: $GPS
          Trigger: $TRIGGER"
          else
            git commit -m "Auto-process: CDOT $JURISDICTION pipeline - $(date +'%Y-%m-%d')"
          fi

          # Push with retry logic
          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling latest changes..."
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort 2>/dev/null || true
              git pull --no-edit origin main
            }
          done

          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1
