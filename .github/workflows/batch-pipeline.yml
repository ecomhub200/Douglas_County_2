# ==============================================================================
# Crash Lens — Batch Pipeline (Statewide Processing)
# ==============================================================================
# Processes statewide crash data through the generic pipeline.
# Triggered by batch-all-jurisdictions.yml after it uploads statewide CSV to R2.
#
# KEY DIFFERENCE from pipeline.yml:
#   - Downloads input CSV from R2 (not from git repo)
#   - Designed for large statewide files (700MB+) that exceed GitHub's 100MB limit
#   - pipeline.yml remains untouched for single-jurisdiction workflows
#
# Stage order: Download from R2 → Normalize → Init Cache →
#              Split (jurisdiction + road type + aggregate in one pass) →
#              Upload → Predict → Aggregate Forecasts → Manifest
#
# NOTE: Validation is triggered from the frontend, not from the pipeline.
#
# NOTE: Validation and Geocoding are handled separately on Cloudflare.
# ==============================================================================

name: "Batch Pipeline: Process Statewide Data"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to process'
        required: true
        type: string

      scope:
        description: 'Processing scope (always statewide for batch)'
        required: false
        default: 'statewide'
        type: string

      selection:
        description: 'Selection (blank for statewide)'
        required: false
        default: ''
        type: string

      r2_data_key:
        description: 'R2 key for statewide CSV (e.g., virginia/statewide/virginia_statewide_all_roads.csv)'
        required: true
        type: string

      skip_forecasts:
        description: 'Skip forecast generation'
        required: false
        default: 'false'
        type: string

      dry_run:
        description: 'Dry run (no uploads, no commits)'
        required: false
        default: 'false'
        type: string

env:
  NOTIFICATION_EMAIL: ecomhub200@gmail.com

jobs:
  # ============================================================
  # JOB 1: Resolve scope + Download from R2
  # ============================================================
  prepare:
    name: "Prepare (${{ github.event.inputs.state }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      state: ${{ steps.resolve.outputs.state }}
      scope: ${{ steps.resolve.outputs.scope }}
      selection: ${{ steps.resolve.outputs.selection }}
      dot_name: ${{ steps.resolve.outputs.dot_name }}
      data_dir: ${{ steps.resolve.outputs.data_dir }}
      r2_prefix: ${{ steps.resolve.outputs.r2_prefix }}
      download_mode: ${{ steps.resolve.outputs.download_mode }}
      jurisdiction_count: ${{ steps.resolve.outputs.jurisdiction_count }}
      jurisdictions_json: ${{ steps.resolve.outputs.jurisdictions_json }}
      input_csv: ${{ steps.download_r2.outputs.input_csv }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests openpyxl awscli

      - name: Resolve scope
        id: resolve
        run: |
          STATE="${{ github.event.inputs.state }}"
          SCOPE="${{ github.event.inputs.scope || 'statewide' }}"
          SELECTION="${{ github.event.inputs.selection }}"

          RESOLVED=$(python scripts/resolve_scope.py \
            --state "$STATE" --scope "$SCOPE" --selection "$SELECTION" --json)

          DOT_NAME=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['dot_name'])")
          DATA_DIR=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['data_dir'])")
          R2_PREFIX=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['r2_prefix'])")
          DOWNLOAD_MODE=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['download_mode'])")
          JCOUNT=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['jurisdiction_count'])")
          JURISDICTIONS=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['jurisdictions']))")

          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "selection=$SELECTION" >> $GITHUB_OUTPUT
          echo "dot_name=$DOT_NAME" >> $GITHUB_OUTPUT
          echo "data_dir=$DATA_DIR" >> $GITHUB_OUTPUT
          echo "r2_prefix=$R2_PREFIX" >> $GITHUB_OUTPUT
          echo "download_mode=$DOWNLOAD_MODE" >> $GITHUB_OUTPUT
          echo "jurisdiction_count=$JCOUNT" >> $GITHUB_OUTPUT
          echo "jurisdictions_json=$JURISDICTIONS" >> $GITHUB_OUTPUT

      # ── Download statewide CSV from R2 ──
      - name: "Download statewide CSV from R2"
        id: download_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ steps.resolve.outputs.state }}"
          DATA_DIR="${{ steps.resolve.outputs.data_dir }}"
          R2_KEY="${{ github.event.inputs.r2_data_key }}"
          R2_PREFIX="${{ steps.resolve.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          # Canonical path: _state/statewide_all_roads.csv.gz
          PRIMARY_KEY="${R2_PREFIX}/_state/statewide_all_roads.csv.gz"

          echo "=========================================="
          echo "Downloading statewide CSV from R2"
          echo "  Primary: $PRIMARY_KEY"
          echo "  Fallback: $R2_KEY"
          echo "=========================================="

          mkdir -p "$DATA_DIR"

          LOCAL_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"
          DOWNLOADED=false

          # Try canonical _state/ gzip path first
          for i in 1 2 3 4; do
            if aws s3 cp "s3://$R2_BUCKET/$PRIMARY_KEY" "${LOCAL_CSV}.gz" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors; then
              echo "Download succeeded from _state/"
              gunzip -f "${LOCAL_CSV}.gz"
              DOWNLOADED=true
              break
            fi
            echo "Download failed (attempt $i/4), retrying in $((2 ** i))s..."
            sleep $((2 ** i))
          done

          # Fallback: try the r2_data_key input (legacy statewide/ path)
          if [ "$DOWNLOADED" = "false" ] && [ -n "$R2_KEY" ]; then
            echo "Primary key failed — trying fallback: $R2_KEY"
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$LOCAL_CSV" \
                --endpoint-url "$R2_ENDPOINT" \
                --only-show-errors; then
                echo "Fallback download succeeded"
                DOWNLOADED=true
                break
              fi
              echo "Fallback failed (attempt $i/3), retrying in $((2 ** i))s..."
              sleep $((2 ** i))
            done
          fi

          if [ "$DOWNLOADED" = "false" ] || [ ! -f "$LOCAL_CSV" ]; then
            echo "::error::Failed to download statewide CSV from R2 (tried $PRIMARY_KEY and $R2_KEY)"
            exit 1
          fi

          # Decompress if R2 object was stored with Content-Encoding: gzip
          # (aws s3 cp downloads raw gzipped bytes when Content-Encoding: gzip is set)
          if file "$LOCAL_CSV" | grep -q gzip; then
            echo "Detected gzip content — decompressing..."
            mv "$LOCAL_CSV" "${LOCAL_CSV}.gz"
            gunzip -f "${LOCAL_CSV}.gz"
          fi

          TOTAL=$(wc -l < "$LOCAL_CSV" | tr -d ' ')
          SIZE=$(ls -lh "$LOCAL_CSV" | awk '{print $5}')
          echo "Downloaded: $LOCAL_CSV ($((TOTAL - 1)) records, $SIZE)"
          echo "input_csv=$LOCAL_CSV" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 2: Process (Stages 0-6)
  # ============================================================
  process:
    name: "Process (${{ needs.prepare.outputs.state }})"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl awscli

      # ── Download statewide CSV from R2 (process job needs its own copy) ──
      - name: "Download statewide CSV from R2"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_KEY="${{ github.event.inputs.r2_data_key }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          # Canonical path: _state/statewide_all_roads.csv.gz
          PRIMARY_KEY="${R2_PREFIX}/_state/statewide_all_roads.csv.gz"

          mkdir -p "$DATA_DIR"
          LOCAL_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"
          DOWNLOADED=false

          echo "Downloading statewide CSV from R2..."
          for i in 1 2 3 4; do
            if aws s3 cp "s3://$R2_BUCKET/$PRIMARY_KEY" "${LOCAL_CSV}.gz" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors; then
              echo "Download succeeded from _state/"
              gunzip -f "${LOCAL_CSV}.gz"
              DOWNLOADED=true
              break
            fi
            echo "Retry $i/4..."
            sleep $((2 ** i))
          done

          # Fallback: try the r2_data_key input (legacy statewide/ path)
          if [ "$DOWNLOADED" = "false" ] && [ -n "$R2_KEY" ]; then
            echo "Primary failed — trying fallback: $R2_KEY"
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$LOCAL_CSV" \
                --endpoint-url "$R2_ENDPOINT" \
                --only-show-errors; then
                echo "Fallback download succeeded"
                DOWNLOADED=true
                break
              fi
              echo "Fallback retry $i/3..."
              sleep $((2 ** i))
            done
          fi

          # Decompress if R2 object was stored with Content-Encoding: gzip
          if [ -f "$LOCAL_CSV" ] && file "$LOCAL_CSV" | grep -q gzip; then
            echo "Detected gzip content — decompressing..."
            mv "$LOCAL_CSV" "${LOCAL_CSV}.gz"
            gunzip -f "${LOCAL_CSV}.gz"
          fi

          TOTAL=$(wc -l < "$LOCAL_CSV" | tr -d ' ')
          echo "Ready: $LOCAL_CSV ($((TOTAL - 1)) records)"

      # ── Stage 0.5: Normalize to CrashLens Standard ──
      - name: "Stage 0.5: Normalize to CrashLens standard"
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 0.5: Normalize to CrashLens Standard"
          echo "State: $STATE"
          echo "=========================================="

          # Derive state abbreviation from hierarchy.json
          HIERARCHY="states/$STATE/hierarchy.json"
          if [ ! -f "$HIERARCHY" ]; then
            echo "WARNING: No hierarchy.json for $STATE — skipping normalization"
            exit 0
          fi

          ABBR=$(python3 -c "
          import json
          with open('$HIERARCHY') as f:
              h = json.load(f)
          s = h.get('state', {})
          print((s.get('abbreviation') or s.get('abbr') or '').lower())
          ")

          if [ -z "$ABBR" ]; then
            echo "WARNING: Could not resolve state abbreviation — skipping normalization"
            exit 0
          fi

          NORMALIZER="states/$STATE/${ABBR}_normalize.py"
          if [ ! -f "$NORMALIZER" ]; then
            echo "INFO: No state normalizer found at $NORMALIZER — skipping normalization"
            echo "To enable normalization, create $NORMALIZER from state_normalize_template.py"
            exit 0
          fi

          # Find the statewide CSV (matches the download step naming convention)
          INPUT_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"
          if [ ! -f "$INPUT_CSV" ]; then
            echo "WARNING: Statewide CSV not found at $INPUT_CSV — skipping normalization"
            exit 0
          fi

          OUTPUT_CSV="$DATA_DIR/${STATE}_statewide_all_roads_normalized.csv"
          REPORT_JSON="$DATA_DIR/${STATE}_normalization_report.json"

          echo "  Normalizer: $NORMALIZER"
          echo "  Input:      $INPUT_CSV"
          echo "  Output:     $OUTPUT_CSV"

          # Run the state-specific normalizer
          # Each normalizer imports geo_resolver from repo root via sys.path
          # Detect CLI convention: --input (existing normalizers) vs --csv (template-based)
          INPUT_FLAG=$(python3 -c "
          import re
          with open('$NORMALIZER') as f:
              text = f.read()
          if \"'--input'\" in text or '\"--input\"' in text:
              print('--input')
          else:
              print('--csv')
          ")

          python "$NORMALIZER" \
            $INPUT_FLAG "$INPUT_CSV" \
            --output "$OUTPUT_CSV" \
            --report "$REPORT_JSON" || {
            echo "::warning::Normalization failed — falling back to raw data"
            exit 0
          }

          # Replace original CSV with normalized version for downstream stages
          if [ -f "$OUTPUT_CSV" ]; then
            ORIG_COLS=$(head -1 "$INPUT_CSV" | tr ',' '\n' | wc -l)
            NORM_COLS=$(head -1 "$OUTPUT_CSV" | tr ',' '\n' | wc -l)
            NORM_ROWS=$(wc -l < "$OUTPUT_CSV" | tr -d ' ')
            echo "  Normalized: $((NORM_ROWS - 1)) rows × $NORM_COLS columns (was $ORIG_COLS columns)"
            mv "$OUTPUT_CSV" "$INPUT_CSV"
            echo "  Replaced original CSV with normalized version"
          fi

          if [ -f "$REPORT_JSON" ]; then
            QUALITY=$(python3 -c "import json; print(json.load(open('$REPORT_JSON')).get('quality_score', 'N/A'))")
            echo "  Quality score: $QUALITY%"
          fi

      # ── Stage 0: Initialize Cache ──
      - name: "Stage 0: Initialize cache"
        run: |
          STATE="${{ needs.prepare.outputs.state }}"

          echo "=========================================="
          echo "Stage 0: Initialize state-isolated cache"
          echo "State: $STATE"
          echo "=========================================="

          python scripts/init_cache.py --state "$STATE"

      # ── Stages 1-3 (unified): Split by jurisdiction + road type + aggregate ──
      # split.py v2.0 merges the old Stage 1 (split by jurisdiction),
      # Stage 2 (split by road type), and Stage 3 (aggregate by scope)
      # into a single pass. It produces the full R2 folder structure:
      #   _state/          SET A: all_roads, dot_roads, primary_roads, non_dot_roads
      #   _region/{id}/    SET A: all_roads, dot_roads, primary_roads, non_dot_roads
      #   _mpo/{id}/       SET B: all_roads, county_roads, city_roads, no_interstate
      #   _planning_district/{id}/  SET B
      #   _city/{slug}/    SET B
      #   {county_key}/    SET B: all_roads, county_roads, city_roads, no_interstate
      - name: "Stages 1-3: Split by jurisdiction, road type & aggregate"
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          INPUT_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"

          echo "=========================================="
          echo "Stages 1-3: Universal split (jurisdiction + road type + aggregate)"
          echo "=========================================="

          if [ ! -f "$INPUT_CSV" ]; then
            echo "WARNING: No statewide CSV found at $INPUT_CSV"
            exit 0
          fi

          SPLIT_OUTPUT="data/$STATE"

          python scripts/split.py \
            --input "$INPUT_CSV" \
            --state "$STATE" \
            --hierarchy "states/$STATE/hierarchy.json" \
            --output-dir "$SPLIT_OUTPUT" || {
            echo "::error::split.py failed"
            exit 1
          }

          # Verify manifest was created
          if [ -f "$SPLIT_OUTPUT/split_manifest.json" ]; then
            python3 -c "
          import json
          with open('$SPLIT_OUTPUT/split_manifest.json') as f:
              m = json.load(f)
          print(f'  Input rows:  {m[\"total_input_rows\"]:,}')
          print(f'  Elapsed:     {m[\"elapsed_s\"]}s')
          print(f'  Counties:    {len(m[\"splits\"].get(\"counties\", {}))}')
          print(f'  Regions:     {len(m[\"splits\"].get(\"regions\", {}))}')
          print(f'  MPOs:        {len(m[\"splits\"].get(\"mpos\", {}))}')
          print(f'  PDs:         {len(m[\"splits\"].get(\"planning_districts\", {}))}')
          print(f'  Cities:      {len(m[\"splits\"].get(\"cities\", {}))}')
          "
          fi

      # ── Stage 4: Upload to R2 ──
      # Uploads all CSVs produced by split.py from data/{state}/.
      # split.py output mirrors the R2 folder structure exactly:
      #   data/{state}/_state/all_roads.csv    → {r2_prefix}/_state/all_roads.csv
      #   data/{state}/_region/{id}/...        → {r2_prefix}/_region/{id}/...
      #   data/{state}/{county_key}/...        → {r2_prefix}/{county_key}/...
      - name: "Stage 4: Upload to R2"
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"

          echo "=========================================="
          echo "Stage 4: Upload all split CSVs to R2"
          echo "=========================================="

          if [ ! -d "$SPLIT_DIR" ]; then
            echo "::error::Split output directory not found: $SPLIT_DIR"
            exit 1
          fi

          # Upload every CSV in the splits directory, gzip-compressed
          # The directory structure maps 1:1 to R2 paths
          python3 -c "
          import os, sys, subprocess, gzip as gz, shutil

          split_dir = '$SPLIT_DIR'
          r2_prefix = '$R2_PREFIX'
          endpoint  = '$R2_ENDPOINT'
          bucket    = '$R2_BUCKET'
          success = failed = 0
          saved_bytes = 0

          csv_files = []
          for root, dirs, files in os.walk(split_dir):
              for f in files:
                  if f.endswith('.csv'):
                      csv_files.append(os.path.join(root, f))

          csv_files.sort()
          total = len(csv_files)
          print(f'  Found {total} CSV files to upload')

          for i, local in enumerate(csv_files):
              rel = os.path.relpath(local, split_dir)
              r2_key = f'{r2_prefix}/{rel}'
              try:
                  gz_path = local + '.gz'
                  orig_size = os.path.getsize(local)
                  with open(local, 'rb') as f_in:
                      with gz.open(gz_path, 'wb', compresslevel=6) as f_out:
                          shutil.copyfileobj(f_in, f_out)
                  gz_size = os.path.getsize(gz_path)
                  saved_bytes += (orig_size - gz_size)

                  # Retry up to 4 times with exponential backoff
                  uploaded = False
                  for attempt in range(1, 5):
                      result = subprocess.run([
                          'aws', 's3', 'cp', gz_path, f's3://{bucket}/{r2_key}',
                          '--endpoint-url', endpoint,
                          '--content-type', 'text/csv',
                          '--content-encoding', 'gzip',
                          '--only-show-errors'
                      ], capture_output=True, timeout=120)
                      if result.returncode == 0:
                          uploaded = True
                          break
                      import time
                      time.sleep(2 ** attempt)

                  os.remove(gz_path)
                  if uploaded:
                      success += 1
                  else:
                      print(f'  FAIL after 4 attempts: {r2_key}')
                      failed += 1
              except Exception as e:
                  print(f'  FAIL: {r2_key}: {e}')
                  failed += 1
                  if os.path.exists(local + '.gz'):
                      os.remove(local + '.gz')

              if (i + 1) % 100 == 0 or (i + 1) == total:
                  print(f'  Progress: {i+1}/{total} ({success} ok, {failed} fail)')

          print(f'Upload complete: {success} ok, {failed} fail')
          print(f'  Gzip savings: {saved_bytes / 1024 / 1024:.1f} MB saved')
          if failed > 0:
              sys.exit(1)
          "

      # NOTE: Stage 4.5 (Validation) removed — validation is triggered from the frontend.

      # ── Stage 5: Predict (Forecasts) ──
      - name: "Stage 5: Generate forecasts"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        timeout-minutes: 60
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          JURISDICTIONS='${{ needs.prepare.outputs.jurisdictions_json }}'

          echo "=========================================="
          echo "Stage 5: Forecast generation (per county only)"
          echo "=========================================="

          SPLIT_DIR="data/$STATE"

          echo "$JURISDICTIONS" | python3 -c "
          import json, sys, subprocess, os
          jurisdictions = json.load(sys.stdin)
          state = '$STATE'
          split_dir = '$SPLIT_DIR'
          success = 0
          for j in jurisdictions:
              # Forecasts read from split.py output directory
              data_dir = os.path.join(split_dir, j) if os.path.isdir(os.path.join(split_dir, j)) else '$DATA_DIR'
              cmd = ['python', 'scripts/generate_forecast.py',
                     '--all-road-types', '--jurisdiction', j, '--data-dir', data_dir,
                     '--state', state, '--source', 'r2']
              result = subprocess.run(cmd, capture_output=True)
              if result.returncode == 0:
                  success += 1
              else:
                  print(f'    WARNING: Forecast failed for {j} (non-fatal)')
          print(f'Forecasts: {success}/{len(jurisdictions)} jurisdictions')
          "

      # ── Stage 5b: Upload forecast JSONs to R2 ──
      - name: "Stage 5b: Upload forecast JSONs to R2"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          JURISDICTIONS='${{ needs.prepare.outputs.jurisdictions_json }}'
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"

          echo "=========================================="
          echo "Stage 5b: Upload forecast JSONs to R2"
          echo "=========================================="

          # Upload all forecast JSONs found in splits/ directory tree
          python3 -c "
          import os, sys, subprocess, gzip as gz, shutil

          split_dir = '$SPLIT_DIR'
          data_dir = '$DATA_DIR'
          r2_prefix = '$R2_PREFIX'
          endpoint = '$R2_ENDPOINT'
          bucket = '$R2_BUCKET'
          uploaded = 0
          saved_bytes = 0

          # Find all forecast JSONs in the splits directory
          forecast_files = []
          for search_dir in [split_dir, data_dir]:
              if not os.path.isdir(search_dir):
                  continue
              for root, dirs, files in os.walk(search_dir):
                  for f in files:
                      if f.startswith('forecasts_') and f.endswith('.json'):
                          forecast_files.append(os.path.join(root, f))

          # Deduplicate by R2 key
          seen = set()
          for local_path in sorted(forecast_files):
              # Determine R2 key from path relative to split_dir or data_dir
              if local_path.startswith(split_dir):
                  rel = os.path.relpath(local_path, split_dir)
              else:
                  rel = os.path.relpath(local_path, data_dir)
              r2_key = f'{r2_prefix}/{rel}'

              if r2_key in seen:
                  continue
              seen.add(r2_key)

              try:
                  gz_path = local_path + '.gz'
                  orig_size = os.path.getsize(local_path)
                  with open(local_path, 'rb') as f_in:
                      with gz.open(gz_path, 'wb', compresslevel=6) as f_out:
                          shutil.copyfileobj(f_in, f_out)
                  gz_size = os.path.getsize(gz_path)
                  saved_bytes += (orig_size - gz_size)
                  subprocess.run([
                      'aws', 's3', 'cp', gz_path, f's3://{bucket}/{r2_key}',
                      '--endpoint-url', endpoint,
                      '--content-type', 'application/json',
                      '--content-encoding', 'gzip',
                      '--only-show-errors'
                  ], check=True, capture_output=True, timeout=120)
                  os.remove(gz_path)
                  uploaded += 1
              except Exception as e:
                  print(f'  FAIL: {r2_key}: {e}')
                  if os.path.exists(local_path + '.gz'):
                      os.remove(local_path + '.gz')

          print(f'Forecast upload: {uploaded} uploaded')
          print(f'  Gzip savings: {saved_bytes / 1024 / 1024:.1f} MB saved')
          "

      # ── Stage 5c: Aggregate Forecasts (Region + MPO) ──
      - name: "Stage 5c: Aggregate forecasts (region + MPO)"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"

          echo "=========================================="
          echo "Stage 5c: Aggregate jurisdiction forecasts into region/MPO forecasts"
          echo "=========================================="

          SPLIT_DIR="data/$STATE"

          python scripts/aggregate_forecasts.py \
            --state "$STATE" \
            --scope statewide \
            --data-dir "$SPLIT_DIR" \
            --output-dir "$SPLIT_DIR" || {
            echo "WARNING: Forecast aggregation had issues (non-fatal)"
          }

      # ── Stage 5d: Upload aggregated forecast JSONs to R2 ──
      - name: "Stage 5d: Upload region/MPO forecast JSONs to R2"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"

          echo "=========================================="
          echo "Stage 5d: Upload region/MPO forecast JSONs to R2"
          echo "=========================================="

          UPLOADED=0
          # Find all forecast JSONs in _region/ and _mpo/ directories
          find "$SPLIT_DIR" \( -path "*/_region/*" -o -path "*/_mpo/*" -o -path "*/_planning_district/*" -o -path "*/_state/*" \) -name "forecasts_*.json" 2>/dev/null | while read f; do
            REL="${f#$SPLIT_DIR/}"
            R2_KEY="$R2_PREFIX/$REL"
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "?")
            if aws s3 cp "$f" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/json" \
              --only-show-errors; then
              echo "  Uploaded: $R2_KEY ($SIZE bytes)"
              UPLOADED=$((UPLOADED + 1))
            else
              echo "  WARN: failed to upload $R2_KEY"
            fi
          done

          echo "Region/MPO forecast upload complete"

      # ── Stage 6: Commit ──
      - name: "Stage 6: Commit manifest and metadata"
        if: github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          SELECTION="${{ needs.prepare.outputs.selection || 'all' }}"
          JCOUNT="${{ needs.prepare.outputs.jurisdiction_count }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/r2-manifest.json 2>/dev/null || true
          git add data/*/.split_report.json 2>/dev/null || true
          git add data/*/split_manifest.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
          else
            git commit -m "batch-pipeline: ${STATE} ${SCOPE}/${SELECTION} — ${JCOUNT} jurisdictions ($(date -u '+%Y-%m-%d'))"

            for i in 1 2 3 4; do
              if git push origin main; then
                echo "Push succeeded"
                break
              fi
              sleep $((2 ** i))
              git fetch origin main
              git rebase origin/main || git pull --no-edit origin main
            done
          fi

      # ── Summary ──
      - name: Job summary
        if: always()
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          SELECTION="${{ needs.prepare.outputs.selection || 'all' }}"
          echo "## Batch Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| State | $STATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | $SCOPE ($SELECTION) |" >> $GITHUB_STEP_SUMMARY
          echo "| Jurisdictions | ${{ needs.prepare.outputs.jurisdiction_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Source | R2: ${{ github.event.inputs.r2_data_key }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stages | R2 Download → Init Cache → Split Jurisdiction → Split Road Type → Aggregate (CSV) → Upload → Predict → Aggregate Forecasts → Manifest |" >> $GITHUB_STEP_SUMMARY
