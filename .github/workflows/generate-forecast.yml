name: Generate Crash Forecasts

on:
  # Run after data downloads complete (first Monday of each month)
  schedule:
    - cron: '0 14 1-7 * 1'  # 2:00 PM UTC (9:00 AM ET) - 3 hours after data download
  workflow_dispatch:
    inputs:
      horizon:
        description: 'Forecast horizon (months ahead)'
        required: false
        default: '12'
        type: choice
        options:
          - '6'
          - '12'
          - '24'
      dry_run:
        description: 'Dry run (synthetic forecasts, no SageMaker)'
        required: false
        default: false
        type: boolean
      data_file:
        description: 'Crash data file path'
        required: false
        default: 'data/CDOT/douglas_all_roads.csv'
        type: string

permissions:
  contents: write

jobs:
  generate-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas boto3

      - name: Download crash data from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          DATA_FILE="${{ github.event.inputs.data_file || 'data/CDOT/douglas_all_roads.csv' }}"

          # Skip if file already exists locally
          if [ -f "$DATA_FILE" ]; then
            echo "Data file already exists locally: $DATA_FILE"
            exit 0
          fi

          # Extract jurisdiction and file type from the path
          # data/CDOT/douglas_all_roads.csv -> colorado/douglas/all_roads.csv
          BASENAME=$(basename "$DATA_FILE" .csv)
          JURISDICTION=$(echo "$BASENAME" | sed 's/_all_roads$//' | sed 's/_county_roads$//' | sed 's/_no_interstate$//' | sed 's/_standardized$//')
          SUFFIX=$(echo "$BASENAME" | sed "s/^${JURISDICTION}_//")
          R2_KEY="colorado/${JURISDICTION}/${SUFFIX}.csv"

          echo "Downloading $R2_KEY from R2 to $DATA_FILE..."
          mkdir -p "$(dirname "$DATA_FILE")"
          aws s3 cp "s3://crash-lens-data/${R2_KEY}" "$DATA_FILE" \
            --endpoint-url "$R2_ENDPOINT" || {
            echo "WARNING: R2 download failed. Forecast may fail if data file is not available."
          }
          ls -lh "$DATA_FILE" 2>/dev/null || echo "WARNING: Data file not found!"

      - name: Generate forecasts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          HORIZON="${{ github.event.inputs.horizon || '12' }}"
          DATA_FILE="${{ github.event.inputs.data_file || 'data/CDOT/douglas_all_roads.csv' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python scripts/generate_forecast.py --horizon $HORIZON --data $DATA_FILE"

          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Verify output
        run: |
          if [ -f data/CDOT/forecasts.json ]; then
            echo "forecasts.json generated successfully in data/CDOT/"
            python -c "
          import json
          with open('data/CDOT/forecasts.json') as f:
              d = json.load(f)
          print(f'Model: {d[\"model\"]}')
          print(f'Horizon: {d[\"horizon\"]} months')
          print(f'Matrices: {list(d[\"matrices\"].keys())}')
          print(f'Total crashes: {d[\"summary\"][\"totalCrashes\"]:,}')
          "
          else
            echo "ERROR: forecasts.json not generated in data/CDOT/"
            exit 1
          fi

      - name: Commit and push forecast data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/CDOT/forecasts*.json
          if git diff --cached --quiet; then
            echo "No changes to forecasts.json"
          else
            git commit -m "Update crash forecasts ($(date +%Y-%m-%d))

          Generated by Chronos-2 forecast pipeline
          Horizon: ${{ github.event.inputs.horizon || '12' }} months
          Data: ${{ github.event.inputs.data_file || 'data/CDOT/douglas_all_roads.csv' }}"
            git push
          fi
