name: Download Ohio Crash Data

# Workflow for Ohio Department of Transportation crash data downloads.
# Modeled after download-cdot-crash-data.yml

on:
  # schedule:
    # - cron: '0 11 1 * *'     # DISABLED — re-enable when pipeline is ready (see data/cdot/github_action_activation_plan.md)
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'Jurisdiction to filter to'
        required: false
        default: 'statewide'
        type: string
      years:
        description: 'Space-separated years to download'
        required: false
        default: ''
        type: string
      force_download:
        description: 'Force re-download'
        required: false
        type: boolean
        default: false
      skip_pipeline:
        description: 'Skip pipeline trigger (download only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  R2_STATE_PREFIX: ohio
  STATE_DISPLAY: Ohio

jobs:
  download-ohio-data:
    runs-on: ubuntu-latest
    outputs:
      jurisdiction: ${{ steps.build-args.outputs.jurisdiction }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build download arguments
        id: build-args
        run: |
          ARGS="--data-dir data/OhioDOT"
          JURISDICTION="${{ github.event.inputs.jurisdiction || 'statewide' }}"
          ARGS="$ARGS --jurisdiction $JURISDICTION"
          YEARS="${{ github.event.inputs.years }}"
          if [ -n "$YEARS" ]; then
            ARGS="$ARGS --years $YEARS"
          fi
          FORCE="${{ github.event.inputs.force_download }}"
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          ARGS="$ARGS --gzip"
          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "jurisdiction=$JURISDICTION" >> $GITHUB_OUTPUT

      - name: Download Ohio crash data
        run: |
          echo "=========================================="
          echo "Downloading ${STATE_DISPLAY} Crash Data"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
          python data/OhioDOT/download_ohio_crash_data.py ${{ steps.build-args.outputs.args }}

      - name: Generate download statistics
        id: stats
        run: |
          echo "Files in data/OhioDOT/:"
          ls -lh data/OhioDOT/*.csv* 2>/dev/null || echo "  No CSV files found"
          CHANGED=$(git diff --name-only data/OhioDOT/ 2>/dev/null | wc -l | tr -d ' ')
          UNTRACKED=$(git ls-files --others --exclude-standard data/OhioDOT/ 2>/dev/null | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "untracked=$UNTRACKED" >> $GITHUB_OUTPUT

      - name: Upload CSVs to R2
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED=0
          for f in data/OhioDOT/*.csv.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f" .csv.gz)
            if aws s3 cp "$f" "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/${BASENAME}.csv.gz" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/gzip"; then
              echo "  Uploaded: $f"
              UPLOADED=$((UPLOADED + 1))
            fi
          done
          echo "uploaded=$UPLOADED" >> $GITHUB_OUTPUT

      - name: Upload statewide gzip to R2 (_state/)
        if: steps.build-args.outputs.jurisdiction == 'statewide'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          R2_BUCKET="crash-lens-data"
          R2_KEY="${R2_STATE_PREFIX}/_state/statewide_all_roads.csv.gz"
          # Find the statewide file — may be named statewide_crashes.csv.gz or statewide.csv.gz
          GZ_PATH=""
          for candidate in data/OhioDOT/statewide_crashes.csv.gz data/OhioDOT/statewide.csv.gz data/OhioDOT/statewide_all_roads.csv.gz; do
            if [ -f "$candidate" ]; then
              GZ_PATH="$candidate"
              break
            fi
          done

          if [ -z "$GZ_PATH" ]; then
            echo "No statewide gzip found — skipping _state/ upload"
            exit 0
          fi

          LOCAL_SIZE=$(stat -c%s "$GZ_PATH" 2>/dev/null || stat -f%z "$GZ_PATH" 2>/dev/null || echo "0")
          LOCAL_MB=$((LOCAL_SIZE / 1048576))
          echo "Uploading statewide gzip to _state/"
          echo "  Local: $GZ_PATH ($LOCAL_SIZE bytes, ${LOCAL_MB}MB)"
          echo "  R2:    s3://$R2_BUCKET/$R2_KEY"

          for i in 1 2 3 4; do
            if aws s3 cp "$GZ_PATH" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/gzip" \
              --only-show-errors; then
              echo "Statewide gzip upload succeeded"
              break
            fi
            DELAY=$((2 ** i))
            echo "Upload failed (attempt $i/4), retrying in ${DELAY}s..."
            sleep $DELAY
          done

          # Verify
          SIZE=$(aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key "$R2_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --query 'ContentLength' --output text 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE / 1048576))
          echo "Verified: $R2_KEY (${SIZE_MB}MB on R2, local was ${LOCAL_MB}MB)"

      - name: Verify R2 state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          aws s3 ls "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/" \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "  Could not list R2 bucket"

      - name: Commit manifest and metadata
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/r2-manifest.json
          git add data/OhioDOT/.validation/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          git commit -m "chore: update $STATE_DISPLAY crash data ($JURISDICTION) -> R2 [$(date +'%Y-%m-%d')]"
          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then echo "Push successful"; exit 0; fi
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || { git rebase --abort 2>/dev/null || true; git pull --no-edit origin main; }
          done
          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Job summary
        if: always()
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED="${{ steps.r2-upload.outputs.uploaded || '0' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${STATE_DISPLAY} Crash Data Download — ${JURISDICTION}
          | Metric | Value |
          |--------|-------|
          | Jurisdiction | ${JURISDICTION} |
          | CSVs uploaded to R2 | ${UPLOADED} |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF

  # Trigger unified pipeline
  trigger-pipeline:
    name: "Trigger pipeline"
    needs: download-ohio-data
    if: github.event.inputs.skip_pipeline != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline.yml',
              ref: 'main',
              inputs: {
                state: 'ohio',
                scope: 'jurisdiction',
                selection: '${{ needs.download-ohio-data.outputs.jurisdiction }}',
                data_source: '',
                skip_forecasts: 'false'
              }
            });
            console.log('Pipeline triggered for Ohio');
