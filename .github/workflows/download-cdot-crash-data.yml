name: Download CDOT Crash Data

# Separate workflow for Colorado CDOT crash data downloads from Hyland OnBase.
# This is kept separate from download-data.yml because:
#   1. Different data source (OnBase document portal vs ArcGIS API / Grants.gov)
#   2. Different cadence (CDOT publishes annually, not monthly)
#   3. Different failure modes (OnBase may require manual intervention)

on:
  schedule:
    # 1st of every month at 11:00 AM UTC — checks for new data
    - cron: '0 11 1 * *'
  workflow_dispatch:
    inputs:
      years:
        description: 'Comma-separated years to download (e.g., "2024,2025"). Leave empty for latest only.'
        required: false
        default: ''
        type: string
      jurisdiction:
        description: 'County to filter to (any of 64 CO counties)'
        required: false
        default: 'douglas'
        type: string
      latest_only:
        description: 'Download only the most recent year'
        required: false
        type: boolean
        default: true
      skip_dictionaries:
        description: 'Skip downloading data dictionaries'
        required: false
        type: boolean
        default: false
      force_download:
        description: 'Force re-download even for finalized years that already exist'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  # R2 state prefix - parameterized for multi-state support
  R2_STATE_PREFIX: colorado
  STATE_DISPLAY: Colorado

jobs:
  download-cdot-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
          # Verify Playwright + Chromium are working
          python -c "
          from playwright.sync_api import sync_playwright
          import os
          with sync_playwright() as p:
              path = p.chromium.executable_path
              exists = os.path.isfile(path) if path else False
              print(f'Chromium binary: {path}')
              print(f'Binary exists: {exists}')
              if not exists:
                  print('WARNING: Chromium binary not found!')
          " || echo "WARNING: Playwright verification failed (non-fatal)"

      - name: Build download arguments
        id: build-args
        run: |
          ARGS="--data-dir data/CDOT"

          # Jurisdiction
          JURISDICTION="${{ github.event.inputs.jurisdiction || 'douglas' }}"
          ARGS="$ARGS --jurisdiction $JURISDICTION"

          # Years or latest
          YEARS="${{ github.event.inputs.years }}"
          LATEST="${{ github.event.inputs.latest_only }}"
          SKIP_DICT="${{ github.event.inputs.skip_dictionaries }}"

          if [ -n "$YEARS" ]; then
            # Convert comma-separated to space-separated
            YEARS_SPACED=$(echo "$YEARS" | tr ',' ' ')
            ARGS="$ARGS --years $YEARS_SPACED"
          elif [ "$LATEST" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled runs always use --latest to check for updates
            ARGS="$ARGS --latest"
          fi

          if [ "$SKIP_DICT" = "true" ]; then
            ARGS="$ARGS --no-dict"
          fi

          FORCE="${{ github.event.inputs.force_download }}"
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "jurisdiction=$JURISDICTION" >> $GITHUB_OUTPUT
          echo "Download arguments: $ARGS"

      - name: Download CDOT crash data
        id: download
        run: |
          echo "=========================================="
          echo "Downloading CDOT Crash Data"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          EXIT_CODE=0
          python download_cdot_crash_data.py ${{ steps.build-args.outputs.args }} || EXIT_CODE=$?

          echo "=========================================="
          echo "Download finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Exit code: $EXIT_CODE"
          echo "=========================================="

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::All downloads failed — OnBase may be blocking automated access. No crash data was produced."
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Download script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Verify crash data was produced
        id: verify
        run: |
          echo "=========================================="
          echo "Verifying crash data output"
          echo "=========================================="

          # Count crash data CSVs (year-prefixed, excluding dictionaries)
          CRASH_CSVS=$(ls data/CDOT/20*.csv 2>/dev/null | wc -l | tr -d ' ')
          echo "Crash data CSVs found: $CRASH_CSVS"
          echo "crash_csv_count=$CRASH_CSVS" >> $GITHUB_OUTPUT

          DOWNLOAD_EXIT="${{ steps.download.outputs.exit_code }}"
          if [ "$CRASH_CSVS" -eq 0 ] && [ "$DOWNLOAD_EXIT" -ne 0 ]; then
            echo "::error::No crash data CSVs were produced and download reported failure (exit $DOWNLOAD_EXIT)."
            echo "::error::OnBase is likely blocking automated downloads. Consider using seed-r2.yml for manual upload."
            echo "data_available=false" >> $GITHUB_OUTPUT
            exit 1
          elif [ "$CRASH_CSVS" -eq 0 ]; then
            echo "::warning::No crash data CSVs found. Download may have silently failed."
            echo "data_available=false" >> $GITHUB_OUTPUT
          else
            echo "data_available=true" >> $GITHUB_OUTPUT
            ls -lh data/CDOT/20*.csv
          fi

      - name: Generate download statistics
        if: steps.verify.outputs.data_available == 'true'
        id: stats
        run: |
          echo "=========================================="
          echo "Download Statistics"
          echo "=========================================="
          echo ""
          echo "Files in data/CDOT/:"
          ls -lh data/CDOT/*.csv 2>/dev/null || echo "  No CSV files found"
          echo ""

          # Count new/changed files
          CHANGED=$(git diff --name-only data/CDOT/ 2>/dev/null | wc -l | tr -d ' ')
          UNTRACKED=$(git ls-files --others --exclude-standard data/CDOT/ 2>/dev/null | wc -l | tr -d ' ')
          echo "Changed files: $CHANGED"
          echo "New files: $UNTRACKED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "untracked=$UNTRACKED" >> $GITHUB_OUTPUT
          echo "=========================================="

      - name: Upload raw annual CSVs to R2
        if: steps.verify.outputs.data_available == 'true'
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED=0
          # Upload raw annual CSVs (filenames may have spaces)
          for f in data/CDOT/20*.csv; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            YEAR=$(echo "$BASENAME" | grep -oP '^\d{4}')
            if [ -n "$YEAR" ]; then
              if aws s3 cp "$f" "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/raw/${YEAR}.csv" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type "text/csv"; then
                echo "  Uploaded: $f -> ${R2_STATE_PREFIX}/${JURISDICTION}/raw/${YEAR}.csv"
                UPLOADED=$((UPLOADED + 1))
              else
                echo "  Warning: failed to upload $f"
              fi
            fi
          done
          echo "uploaded=$UPLOADED" >> $GITHUB_OUTPUT
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::warning::No CSV files were uploaded to R2 — download may have failed"
          fi

      - name: Verify R2 state
        if: steps.verify.outputs.data_available == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          echo "=========================================="
          echo "R2 Storage State: ${R2_STATE_PREFIX}/${JURISDICTION}/raw/"
          echo "=========================================="
          aws s3 ls "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/raw/" \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "  Could not list R2 bucket (check credentials)"
          echo "=========================================="

      - name: Commit manifest and metadata
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage only metadata and manifest (NOT the large CSVs)
          git add data/r2-manifest.json
          git add data/CDOT/.validation/ 2>/dev/null || true
          git add data/CDOT/config.json data/CDOT/source_manifest.json data/CDOT/jurisdictions.json 2>/dev/null || true
          git add data/CDOT/.geocode_cache.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          git commit -m "chore: update $STATE_DISPLAY crash data ($JURISDICTION) -> R2 [$(date +'%Y-%m-%d')]"

          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling latest changes..."
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort 2>/dev/null || true
              git pull --no-edit origin main
            }
          done

          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Job summary
        if: always()
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED="${{ steps.r2-upload.outputs.uploaded || '0' }}"
          CHANGED="${{ steps.stats.outputs.changed || '0' }}"
          UNTRACKED="${{ steps.stats.outputs.untracked || '0' }}"
          DOWNLOAD_EXIT="${{ steps.download.outputs.exit_code || 'unknown' }}"
          DATA_AVAILABLE="${{ steps.verify.outputs.data_available || 'false' }}"
          CRASH_CSVS="${{ steps.verify.outputs.crash_csv_count || '0' }}"

          if [ "$DATA_AVAILABLE" = "true" ]; then
            STATUS_EMOJI="SUCCESS"
            STATUS_NOTE="> Data was downloaded and uploaded to R2 successfully."
          elif [ "$DOWNLOAD_EXIT" = "2" ]; then
            STATUS_EMOJI="FAILED — NO DATA DOWNLOADED"
            STATUS_NOTE="> **OnBase blocked all automated download attempts.** All strategies (requests, OBToken, direct endpoints, HTML parsing, Playwright) failed to extract the Excel file. OnBase serves an HTML document viewer instead of the actual file. Consider using \`seed-r2.yml\` for manual upload, or investigate if CDOT has changed their OnBase portal configuration."
          elif [ "$DOWNLOAD_EXIT" != "0" ]; then
            STATUS_EMOJI="FAILED"
            STATUS_NOTE="> Download script exited with code ${DOWNLOAD_EXIT}. Check logs for details."
          else
            STATUS_EMOJI="WARNING — UNKNOWN"
            STATUS_NOTE="> Script exited successfully but data availability is unclear."
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## CDOT Crash Data Download — ${JURISDICTION}

          ### Status: ${STATUS_EMOJI}

          | Metric | Value |
          |--------|-------|
          | Jurisdiction | ${JURISDICTION} |
          | Args | \`${{ steps.build-args.outputs.args }}\` |
          | Download exit code | ${DOWNLOAD_EXIT} |
          | Crash CSVs produced | ${CRASH_CSVS} |
          | CSVs changed/new | ${CHANGED} changed, ${UNTRACKED} new |
          | CSVs uploaded to R2 | ${UPLOADED} |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          ${STATUS_NOTE}

          > Check the **Download CDOT crash data** step logs for detailed strategy output.
          EOF
