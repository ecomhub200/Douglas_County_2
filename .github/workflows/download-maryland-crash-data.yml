name: Download Maryland Crash Data

# Separate workflow for Maryland ACRS crash data downloads from Socrata SODA API.
# Modeled after download-cdot-crash-data.yml with Maryland-specific configuration.

on:
  # schedule:
    # 1st of every month at 11:00 AM UTC — checks for new data
    # - cron: '0 11 1 * *'     # DISABLED — re-enable when pipeline is ready (see data/cdot/github_action_activation_plan.md)
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'County to filter to (any of 24 MD jurisdictions)'
        required: false
        default: 'montgomery'
        type: choice
        options:
          - allegany
          - anne_arundel
          - baltimore_county
          - baltimore_city
          - calvert
          - caroline
          - carroll
          - cecil
          - charles
          - dorchester
          - frederick
          - garrett
          - harford
          - howard
          - kent
          - montgomery
          - prince_georges
          - queen_annes
          - st_marys
          - somerset
          - talbot
          - washington
          - wicomico
          - worcester
      years:
        description: 'Space-separated years to download (e.g., "2023 2024"). Leave empty for all available.'
        required: false
        default: ''
        type: string
      force_download:
        description: 'Force re-download even if data already exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  R2_STATE_PREFIX: maryland
  STATE_DISPLAY: Maryland

jobs:
  download-maryland-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build download arguments
        id: build-args
        run: |
          ARGS="--data-dir data/MarylandDOT"

          # Jurisdiction
          JURISDICTION="${{ github.event.inputs.jurisdiction || 'montgomery' }}"
          ARGS="$ARGS --jurisdiction $JURISDICTION"

          # Years
          YEARS="${{ github.event.inputs.years }}"
          if [ -n "$YEARS" ]; then
            ARGS="$ARGS --years $YEARS"
          fi

          # Force
          FORCE="${{ github.event.inputs.force_download }}"
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          # Always gzip for R2
          ARGS="$ARGS --gzip"

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "jurisdiction=$JURISDICTION" >> $GITHUB_OUTPUT
          echo "Download arguments: $ARGS"

      - name: Download Maryland crash data
        id: download
        run: |
          echo "=========================================="
          echo "Downloading ${STATE_DISPLAY} Crash Data"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
          python data/MarylandDOT/download_maryland_crash_data.py ${{ steps.build-args.outputs.args }}
          echo "=========================================="
          echo "Download complete at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

      - name: Generate download statistics
        id: stats
        run: |
          echo "=========================================="
          echo "Download Statistics"
          echo "=========================================="
          echo ""
          echo "Files in data/MarylandDOT/:"
          ls -lh data/MarylandDOT/*.csv* 2>/dev/null || echo "  No CSV files found"
          echo ""

          # Count new/changed files
          CHANGED=$(git diff --name-only data/MarylandDOT/ 2>/dev/null | wc -l | tr -d ' ')
          UNTRACKED=$(git ls-files --others --exclude-standard data/MarylandDOT/ 2>/dev/null | wc -l | tr -d ' ')
          echo "Changed files: $CHANGED"
          echo "New files: $UNTRACKED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "untracked=$UNTRACKED" >> $GITHUB_OUTPUT
          echo "=========================================="

      - name: Upload CSVs to R2 (gzip compressed)
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED=0
          for f in data/MarylandDOT/*.csv.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f" .csv.gz)
            if aws s3 cp "$f" "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/${BASENAME}.csv.gz" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "application/gzip"; then
              echo "  Uploaded: $f -> ${R2_STATE_PREFIX}/${JURISDICTION}/${BASENAME}.csv.gz"
              UPLOADED=$((UPLOADED + 1))
            else
              echo "  Warning: failed to upload $f"
            fi
          done
          echo "uploaded=$UPLOADED" >> $GITHUB_OUTPUT
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::warning::No CSV files were uploaded to R2 — download may have failed"
          fi

      - name: Verify R2 state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          echo "=========================================="
          echo "R2 Storage State: ${R2_STATE_PREFIX}/${JURISDICTION}/"
          echo "=========================================="
          aws s3 ls "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/" \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "  Could not list R2 bucket (check credentials)"
          echo "=========================================="

      - name: Commit manifest and metadata
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage only metadata and manifest (NOT the large CSVs)
          git add data/r2-manifest.json
          git add data/MarylandDOT/.validation/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          git commit -m "chore: update $STATE_DISPLAY crash data ($JURISDICTION) -> R2 [$(date +'%Y-%m-%d')]"

          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling latest changes..."
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort 2>/dev/null || true
              git pull --no-edit origin main
            }
          done

          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Job summary
        if: always()
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED="${{ steps.r2-upload.outputs.uploaded || '0' }}"
          CHANGED="${{ steps.stats.outputs.changed || '0' }}"
          UNTRACKED="${{ steps.stats.outputs.untracked || '0' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${STATE_DISPLAY} Crash Data Download — ${JURISDICTION}

          | Metric | Value |
          |--------|-------|
          | Jurisdiction | ${JURISDICTION} |
          | Args | \`${{ steps.build-args.outputs.args }}\` |
          | CSVs downloaded | ${CHANGED} changed, ${UNTRACKED} new |
          | CSVs uploaded to R2 | ${UPLOADED} |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          > Check the **Download Maryland crash data** step logs for detailed output.
          > Check the **Verify R2 state** step to confirm data in R2.
          EOF
