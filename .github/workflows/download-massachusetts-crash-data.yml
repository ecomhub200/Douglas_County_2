name: Download Massachusetts Crash Data

# Workflow for Massachusetts Department of Transportation crash data downloads.
# Modeled after download-cdot-crash-data.yml

on:
  # schedule:
    # - cron: '0 11 1 * *'     # DISABLED — re-enable when pipeline is ready (see data/cdot/github_action_activation_plan.md)
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'Jurisdiction to filter to'
        required: false
        default: 'statewide'
        type: string
      years:
        description: 'Space-separated years to download'
        required: false
        default: ''
        type: string
      force_download:
        description: 'Force re-download'
        required: false
        type: boolean
        default: false
      skip_pipeline:
        description: 'Skip pipeline trigger (download only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  R2_STATE_PREFIX: massachusetts
  STATE_DISPLAY: Massachusetts

jobs:
  download-massachusetts-data:
    runs-on: ubuntu-latest
    outputs:
      jurisdiction: ${{ steps.build-args.outputs.jurisdiction }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build download arguments
        id: build-args
        run: |
          ARGS="--data-dir data/MassachusettsDOT"
          JURISDICTION="${{ github.event.inputs.jurisdiction || 'statewide' }}"
          ARGS="$ARGS --jurisdiction $JURISDICTION"
          YEARS="${{ github.event.inputs.years }}"
          if [ -n "$YEARS" ]; then
            ARGS="$ARGS --years $YEARS"
          fi
          FORCE="${{ github.event.inputs.force_download }}"
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          ARGS="$ARGS --gzip"
          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "jurisdiction=$JURISDICTION" >> $GITHUB_OUTPUT

      - name: Download Massachusetts crash data
        run: |
          echo "=========================================="
          echo "Downloading ${STATE_DISPLAY} Crash Data"
          echo "Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
          python data/MassachusettsDOT/download_massachusetts_crash_data.py ${{ steps.build-args.outputs.args }}

      - name: Generate download statistics
        id: stats
        run: |
          echo "Files in data/MassachusettsDOT/:"
          ls -lh data/MassachusettsDOT/*.csv* 2>/dev/null || echo "  No CSV files found"
          CHANGED=$(git diff --name-only data/MassachusettsDOT/ 2>/dev/null | wc -l | tr -d ' ')
          UNTRACKED=$(git ls-files --others --exclude-standard data/MassachusettsDOT/ 2>/dev/null | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "untracked=$UNTRACKED" >> $GITHUB_OUTPUT

      - name: Upload CSVs to R2
        id: r2-upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED=0
          for f in data/MassachusettsDOT/*.csv.gz; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f" .csv.gz)
            if aws s3 cp "$f" "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/${BASENAME}.csv.gz" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/gzip"; then
              echo "  Uploaded: $f"
              UPLOADED=$((UPLOADED + 1))
            fi
          done
          echo "uploaded=$UPLOADED" >> $GITHUB_OUTPUT

      - name: Verify R2 state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          aws s3 ls "s3://crash-lens-data/${R2_STATE_PREFIX}/${JURISDICTION}/" \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "  Could not list R2 bucket"

      - name: Commit manifest and metadata
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/r2-manifest.json
          git add data/MassachusettsDOT/.validation/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          git commit -m "chore: update $STATE_DISPLAY crash data ($JURISDICTION) -> R2 [$(date +'%Y-%m-%d')]"
          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then echo "Push successful"; exit 0; fi
            sleep $((2 ** i))
            git fetch origin main
            git rebase origin/main || { git rebase --abort 2>/dev/null || true; git pull --no-edit origin main; }
          done
          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Job summary
        if: always()
        run: |
          JURISDICTION="${{ steps.build-args.outputs.jurisdiction }}"
          UPLOADED="${{ steps.r2-upload.outputs.uploaded || '0' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${STATE_DISPLAY} Crash Data Download — ${JURISDICTION}
          | Metric | Value |
          |--------|-------|
          | Jurisdiction | ${JURISDICTION} |
          | CSVs uploaded to R2 | ${UPLOADED} |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF

  # Trigger unified pipeline
  trigger-pipeline:
    name: "Trigger pipeline"
    needs: download-massachusetts-data
    if: github.event.inputs.skip_pipeline != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline.yml',
              ref: 'main',
              inputs: {
                state: 'massachusetts',
                scope: 'jurisdiction',
                selection: '${{ needs.download-massachusetts-data.outputs.jurisdiction }}',
                data_source: '',
                skip_forecasts: 'false'
              }
            });
            console.log('Pipeline triggered for Massachusetts');
