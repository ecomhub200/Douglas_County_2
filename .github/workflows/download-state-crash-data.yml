# ==============================================================================
# Download State Crash Data — Universal Multi-Scope Dispatcher
# ==============================================================================
# Registry-driven workflow that downloads crash data for ANY state at ANY scope.
#
# Supports all 5 scope levels:
#   - statewide:     All counties in a state → statewide CSV → batch-pipeline
#   - region:        Counties in a DOT region → statewide CSV → batch-pipeline
#   - mpo:           Counties in an MPO/TPR  → statewide CSV → batch-pipeline
#   - jurisdiction:  Single county           → individual CSV → batch-pipeline
#   - federal:       (Reserved for future cross-state)
#
# Resolution chain:
#   1. download-registry.json → script, data dir, invocation pattern
#   2. hierarchy.json         → regions, MPOs, county FIPS mappings
#   3. resolve_scope.py       → concrete jurisdiction list + download mode
#
# Flow:
#   Download statewide CSV → Upload to R2 → Trigger batch-pipeline.yml
#     batch-pipeline handles: Split → Road Type → Aggregate → Upload → Forecast
#
# Road type filters:
#   County scope:        countyOnly / countyPlusVDOT / allRoads
#                        (produces county_roads.csv, no_interstate.csv, all_roads.csv)
#   State/Region/MPO:    Handled by batch-pipeline aggregation
#                        (produces dot_roads.csv, non_dot_roads.csv, statewide_all_roads.csv)
#
# WHY R2 instead of git commit?
#   Statewide CSVs (700MB+) exceed GitHub's 100MB file size limit.
# ==============================================================================

name: "Download State Crash Data"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to download'
        required: true
        type: choice
        options:
          - virginia
          - colorado
          - maryland
          - alaska
          - arkansas
          - connecticut
          - delaware
          - florida
          - georgia
          - hawaii
          - idaho
          - illinois
          - iowa
          - louisiana
          - massachusetts
          - mississippi
          - montana
          - nevada
          - new_york
          - nyc
          - ohio
          - oklahoma
          - oregon
          - pennsylvania
          - south_carolina
          - texas
          - utah
          - vermont
          - washington
          - west_virginia
          - wisconsin

      scope:
        description: 'Processing scope'
        required: true
        type: choice
        default: 'statewide'
        options:
          - statewide
          - region
          - mpo
          - jurisdiction

      selection:
        description: 'Region/MPO/Jurisdiction ID (blank for statewide). Use --list to see available IDs.'
        required: false
        default: ''
        type: string

      filter:
        description: 'Road type filter (county scope only — ignored for state/region/mpo)'
        required: false
        type: choice
        default: 'allRoads'
        options:
          - allRoads
          - countyOnly
          - countyPlusVDOT

      force_download:
        description: 'Force re-download (skip cache)'
        required: false
        type: boolean
        default: false

      skip_pipeline:
        description: 'Skip batch pipeline (download + R2 upload only)'
        required: false
        type: boolean
        default: false

      skip_forecasts:
        description: 'Skip forecast generation in batch pipeline'
        required: false
        type: boolean
        default: false

      dry_run:
        description: 'Dry run (no uploads, no pipeline trigger)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  NOTIFICATION_EMAIL: ecomhub200@gmail.com

jobs:
  # ============================================================
  # JOB 1: Resolve scope + download statewide data
  # ============================================================
  download:
    name: "Download — ${{ github.event.inputs.state }} (${{ github.event.inputs.scope }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    outputs:
      state: ${{ github.event.inputs.state }}
      scope: ${{ steps.resolve.outputs.scope }}
      selection: ${{ steps.resolve.outputs.selection }}
      display_name: ${{ steps.registry.outputs.display_name }}
      dot_dir: ${{ steps.registry.outputs.dot_dir }}
      r2_prefix: ${{ steps.registry.outputs.r2_prefix }}
      download_mode: ${{ steps.resolve.outputs.download_mode }}
      jurisdiction_count: ${{ steps.resolve.outputs.jurisdiction_count }}
      jurisdictions_json: ${{ steps.resolve.outputs.jurisdictions_json }}
      csv_path: ${{ steps.finalize.outputs.csv_path }}
      total_records: ${{ steps.finalize.outputs.total_records }}
      r2_data_key: ${{ steps.r2_upload.outputs.r2_data_key }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: Resolve from registry ──
      - name: Resolve from download registry
        id: registry
        run: |
          STATE="${{ github.event.inputs.state }}"
          REGISTRY="states/download-registry.json"

          if [ ! -f "$REGISTRY" ]; then
            echo "::error::Registry file not found: $REGISTRY"
            exit 1
          fi

          ENTRY=$(python3 -c "
          import json, sys
          with open('$REGISTRY') as f:
              reg = json.load(f)
          state = '$STATE'
          if state not in reg:
              print(f'::error::State {state} not found in registry', file=sys.stderr)
              sys.exit(1)
          e = reg[state]
          print(f\"display_name={e.get('displayName', state.replace('_', ' ').title())}\")
          print(f\"dot_dir={e.get('dotDir', '')}\")
          print(f\"script={e.get('script', '')}\")
          print(f\"r2_prefix={e.get('r2Prefix', state)}\")
          print(f\"tier={e.get('tier', 3)}\")
          print(f\"requires_playwright={str(e.get('requiresPlaywright', False)).lower()}\")
          print(f\"default_jurisdiction={e.get('defaultJurisdiction', 'statewide')}\")
          ")

          echo "$ENTRY" >> $GITHUB_OUTPUT
          echo "Registry resolved for $STATE:"
          echo "$ENTRY"

      # ── Step 2: Resolve scope from hierarchy.json ──
      - name: Resolve scope
        id: resolve
        run: |
          STATE="${{ github.event.inputs.state }}"
          SCOPE="${{ github.event.inputs.scope }}"
          SELECTION="${{ github.event.inputs.selection }}"

          # Validate scope + selection combinations
          if [ "$SCOPE" = "statewide" ]; then
            SELECTION=""
          elif [ -z "$SELECTION" ]; then
            echo "::error::Selection is required for scope=$SCOPE. Run resolve_scope.py --state $STATE --list to see available IDs."
            exit 1
          fi

          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "selection=$SELECTION" >> $GITHUB_OUTPUT

          # Resolve jurisdictions via hierarchy.json
          HIERARCHY="states/$STATE/hierarchy.json"
          if [ ! -f "$HIERARCHY" ]; then
            echo "::error::No hierarchy.json found for $STATE at $HIERARCHY"
            exit 1
          fi

          echo "Resolving scope: state=$STATE scope=$SCOPE selection=$SELECTION"
          RESOLVED=$(python scripts/resolve_scope.py \
            --state "$STATE" --scope "$SCOPE" --selection "$SELECTION" --json)

          echo "Resolved: $RESOLVED"

          # Extract fields from resolved JSON
          DOWNLOAD_MODE=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['download_mode'])")
          JCOUNT=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['jurisdiction_count'])")
          JURISDICTIONS=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['jurisdictions']))")

          echo "download_mode=$DOWNLOAD_MODE" >> $GITHUB_OUTPUT
          echo "jurisdiction_count=$JCOUNT" >> $GITHUB_OUTPUT
          echo "jurisdictions_json=$JURISDICTIONS" >> $GITHUB_OUTPUT

          # Log scope summary
          echo ""
          echo "=========================================="
          echo "Scope Resolution Summary"
          echo "  State:          $STATE"
          echo "  Scope:          $SCOPE"
          echo "  Selection:      ${SELECTION:-'(all)'}"
          echo "  Download mode:  $DOWNLOAD_MODE"
          echo "  Jurisdictions:  $JCOUNT"
          echo "=========================================="

          # Also list what we resolved for the step summary
          if [ "$SCOPE" = "region" ] || [ "$SCOPE" = "mpo" ]; then
            REGION_NAME=$(python3 -c "
          import json
          with open('states/$STATE/hierarchy.json') as f:
              h = json.load(f)
          section = 'regions' if '$SCOPE' == 'region' else 'tprs'
          entry = h.get(section, {}).get('$SELECTION', {})
          print(entry.get('name', entry.get('shortName', '$SELECTION')))
          ")
            echo "  Resolved name:  $REGION_NAME"
            echo "region_name=$REGION_NAME" >> $GITHUB_OUTPUT
          fi

      # ── Step 3: Install dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas requests openpyxl
          fi
          pip install awscli

          # Install Playwright only if needed (Colorado)
          if [ "${{ steps.registry.outputs.requires_playwright }}" = "true" ]; then
            pip install playwright
            playwright install chromium
          fi

      # ── Step 4: Download statewide data ──
      - name: "Download statewide data"
        id: download
        timeout-minutes: 60
        run: |
          STATE="${{ github.event.inputs.state }}"
          SCRIPT="${{ steps.registry.outputs.script }}"
          DOT_DIR="${{ steps.registry.outputs.dot_dir }}"
          FORCE="${{ github.event.inputs.force_download }}"
          FILTER="${{ github.event.inputs.filter || 'allRoads' }}"
          SCOPE="${{ steps.resolve.outputs.scope }}"
          SELECTION="${{ steps.resolve.outputs.selection }}"
          DOWNLOAD_MODE="${{ steps.resolve.outputs.download_mode }}"

          echo "=========================================="
          echo "Downloading data for $STATE"
          echo "  Script:    $SCRIPT"
          echo "  Scope:     $SCOPE / ${SELECTION:-statewide}"
          echo "  Mode:      $DOWNLOAD_MODE"
          echo "  Filter:    $FILTER (county-scope only)"
          echo "  Started:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          DATA_DIR="$DOT_DIR"
          STATEWIDE=""

          # ── Virginia ──
          if [ "$STATE" = "virginia" ]; then
            ARGS="--output-dir data"
            if [ "$FORCE" = "true" ]; then
              ARGS="$ARGS --force-download"
            fi

            # Always download statewide — pipeline handles scope filtering
            ARGS="$ARGS --save-statewide --filter $FILTER"
            # Use a seed jurisdiction for the Virginia API
            ARGS="$ARGS --jurisdiction ${{ steps.registry.outputs.default_jurisdiction }}"
            python download_crash_data.py $ARGS
            DATA_DIR="data"

            if [ -f "data/virginia_statewide_all_roads.csv" ]; then
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            elif [ -f "data/virginia_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/virginia_statewide_all_roads.csv.gz
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            fi

          # ── Colorado ──
          elif [ "$STATE" = "colorado" ]; then
            python download_cdot_crash_data.py --data-dir data/CDOT --save-statewide-gzip
            DATA_DIR="data/CDOT"

            if [ -f "data/CDOT/colorado_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/CDOT/colorado_statewide_all_roads.csv.gz
              STATEWIDE="data/CDOT/colorado_statewide_all_roads.csv"
            elif [ -f "data/CDOT/colorado_statewide_raw.csv" ]; then
              STATEWIDE="data/CDOT/colorado_statewide_raw.csv"
            fi

          # ── Generic state (Tier 2/3) ──
          else
            echo "Running: python $SCRIPT --data-dir $DOT_DIR --gzip"
            python "$SCRIPT" --data-dir "$DOT_DIR" --gzip 2>&1 || {
              echo "::warning::Download script returned non-zero, checking for output..."
            }

            # Find the statewide CSV
            for f in "$DOT_DIR"/${STATE}_statewide*.csv "$DOT_DIR"/*statewide*.csv "$DOT_DIR"/*.csv; do
              if [ -f "$f" ]; then
                STATEWIDE="$f"
                break
              fi
            done

            # Try decompressing gzip if no plain CSV found
            if [ -z "$STATEWIDE" ]; then
              GZ=$(find "$DOT_DIR" -name "*statewide*.csv.gz" -o -name "*.csv.gz" -type f 2>/dev/null | head -1)
              if [ -n "$GZ" ]; then
                gunzip -k "$GZ"
                STATEWIDE="${GZ%.gz}"
              fi
            fi
          fi

          # Verify statewide CSV exists
          if [ -z "$STATEWIDE" ] || [ ! -f "$STATEWIDE" ]; then
            echo "::error::Statewide CSV not found for $STATE after download"
            exit 1
          fi

          TOTAL=$(wc -l < "$STATEWIDE" | tr -d ' ')
          SIZE=$(ls -lh "$STATEWIDE" | awk '{print $5}')
          echo ""
          echo "Statewide CSV: $STATEWIDE"
          echo "  Records: $((TOTAL - 1))"
          echo "  Size:    $SIZE"
          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT
          echo "data_dir=$DATA_DIR" >> $GITHUB_OUTPUT

      # ── Step 5: Merge source files if needed ──
      - name: "Merge source files (if multi-file)"
        id: merge
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          # Virginia and Colorado data are already merged by their download scripts
          if [ "$STATE" != "virginia" ] && [ "$STATE" != "colorado" ]; then
            RAW_COUNT=$(find "$DATA_DIR" -maxdepth 1 -name "*.csv" ! -name "*statewide*" ! -name "*standardized*" -type f 2>/dev/null | wc -l)
            if [ "$RAW_COUNT" -gt 1 ]; then
              echo "Found $RAW_COUNT raw CSV files — merging..."
              python scripts/process_crash_data.py \
                -i "$DATA_DIR"/*.csv \
                -s "$STATE" -j "statewide" \
                -o "$DATA_DIR" \
                --merge --convert-only
              STATEWIDE="$DATA_DIR/statewide_standardized.csv"
              echo "Merged: $STATEWIDE"
            else
              echo "Single statewide file — no merge needed"
            fi
          fi

          echo "statewide_path=${STATEWIDE}" >> $GITHUB_OUTPUT

      # ── Step 6: Convert to standardized format ──
      - name: "Convert to standardized format"
        id: convert
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          # Virginia data is already in standard format
          if [ "$STATE" = "virginia" ]; then
            echo "Virginia data already in standard format — skipping"
            echo "csv_path=$STATEWIDE" >> $GITHUB_OUTPUT
          else
            CONVERTED="$DATA_DIR/${STATE}_statewide_standardized.csv"
            python scripts/process_crash_data.py \
              -i "$STATEWIDE" \
              -s "$STATE" -j "statewide" \
              -o "$DATA_DIR" \
              --convert-only --force 2>&1 || {
              echo "::warning::Convert stage failed, using raw data"
              CONVERTED="$STATEWIDE"
            }

            # Find the standardized output
            if [ -f "$DATA_DIR/statewide_standardized.csv" ]; then
              CONVERTED="$DATA_DIR/statewide_standardized.csv"
            fi

            echo "Converted: $CONVERTED"
            echo "csv_path=$CONVERTED" >> $GITHUB_OUTPUT
          fi

      # ── Step 7: Finalize ──
      - name: "Finalize download"
        id: finalize
        run: |
          CSV_PATH="${{ steps.convert.outputs.csv_path || steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"

          if [ -z "$CSV_PATH" ] || [ ! -f "$CSV_PATH" ]; then
            echo "::error::No statewide CSV available after download stages"
            exit 1
          fi

          TOTAL=$(wc -l < "$CSV_PATH" | tr -d ' ')
          SIZE=$(ls -lh "$CSV_PATH" | awk '{print $5}')
          echo "Final CSV: $CSV_PATH ($((TOTAL - 1)) records, $SIZE)"
          echo "csv_path=$CSV_PATH" >> $GITHUB_OUTPUT
          echo "total_records=$((TOTAL - 1))" >> $GITHUB_OUTPUT

      # ── Step 8: Upload statewide CSV to R2 ──
      - name: "Upload statewide CSV to R2"
        id: r2_upload
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ github.event.inputs.state }}"
          CSV_PATH="${{ steps.finalize.outputs.csv_path }}"
          TOTAL="${{ steps.finalize.outputs.total_records }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          R2_KEY="${STATE}/statewide/${STATE}_statewide_all_roads.csv"

          echo "=========================================="
          echo "Uploading statewide CSV to R2"
          echo "  Local:   $CSV_PATH"
          echo "  R2:      s3://$R2_BUCKET/$R2_KEY"
          echo "  Records: $TOTAL"
          echo "=========================================="

          if [ -z "$CSV_PATH" ] || [ ! -f "$CSV_PATH" ]; then
            echo "::error::No CSV to upload"
            exit 1
          fi

          # Upload with retry (exponential backoff)
          for i in 1 2 3 4; do
            if aws s3 cp "$CSV_PATH" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "text/csv" \
              --only-show-errors; then
              echo "Upload succeeded"
              break
            fi
            DELAY=$((2 ** i))
            echo "Upload failed (attempt $i/4), retrying in ${DELAY}s..."
            sleep $DELAY
          done

          # Verify upload
          SIZE=$(aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key "$R2_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --query 'ContentLength' --output text 2>/dev/null || echo "0")

          if [ "$SIZE" = "0" ]; then
            echo "::error::R2 upload verification failed"
            exit 1
          fi

          SIZE_MB=$((SIZE / 1048576))
          echo "Verified: $R2_KEY (${SIZE_MB}MB on R2)"
          echo "r2_data_key=$R2_KEY" >> $GITHUB_OUTPUT

      # ── Step 9: Job summary ──
      - name: Job summary
        if: always()
        run: |
          STATE="${{ github.event.inputs.state }}"
          DISPLAY="${{ steps.registry.outputs.display_name }}"
          SCOPE="${{ steps.resolve.outputs.scope }}"
          SELECTION="${{ steps.resolve.outputs.selection }}"
          JCOUNT="${{ steps.resolve.outputs.jurisdiction_count }}"
          REGION_NAME="${{ steps.resolve.outputs.region_name }}"
          TOTAL="${{ steps.finalize.outputs.total_records }}"
          R2_KEY="${{ steps.r2_upload.outputs.r2_data_key }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          SCOPE_LABEL="${SCOPE}"
          if [ -n "$SELECTION" ]; then
            SCOPE_LABEL="${SCOPE}: ${REGION_NAME:-$SELECTION}"
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${DISPLAY} — Download ($SCOPE_LABEL)

          | Metric | Value |
          |--------|-------|
          | State | ${DISPLAY} (${STATE}) |
          | Scope | ${SCOPE_LABEL} |
          | Jurisdictions | ${JCOUNT:-N/A} |
          | Records | ${TOTAL:-N/A} |
          | R2 Key | ${R2_KEY:-'(dry run)'} |
          | Dry Run | ${DRY_RUN} |
          | Completed | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF

  # ============================================================
  # JOB 2: Trigger batch pipeline with scope awareness
  # ============================================================
  trigger-pipeline:
    name: "Trigger pipeline — ${{ github.event.inputs.scope }}"
    needs: download
    if: github.event.inputs.skip_pipeline != 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ needs.download.outputs.state }}';
            const scope = '${{ needs.download.outputs.scope }}';
            const selection = '${{ needs.download.outputs.selection }}';
            const r2DataKey = '${{ needs.download.outputs.r2_data_key }}';
            const skipForecasts = '${{ github.event.inputs.skip_forecasts }}';
            const dryRun = '${{ github.event.inputs.dry_run }}';

            console.log('='.repeat(50));
            console.log('Triggering batch-pipeline.yml');
            console.log(`  State:     ${state}`);
            console.log(`  Scope:     ${scope}`);
            console.log(`  Selection: ${selection || '(all)'}`);
            console.log(`  R2 key:    ${r2DataKey}`);
            console.log('='.repeat(50));

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'batch-pipeline.yml',
              ref: 'main',
              inputs: {
                state: state,
                scope: scope,
                selection: selection || '',
                r2_data_key: r2DataKey,
                skip_forecasts: skipForecasts || 'false',
                dry_run: dryRun || 'false'
              }
            });

            console.log('Pipeline dispatched successfully');

      - name: Job summary
        run: |
          STATE="${{ needs.download.outputs.state }}"
          SCOPE="${{ needs.download.outputs.scope }}"
          SELECTION="${{ needs.download.outputs.selection }}"
          TOTAL="${{ needs.download.outputs.total_records }}"
          R2_KEY="${{ needs.download.outputs.r2_data_key }}"
          JCOUNT="${{ needs.download.outputs.jurisdiction_count }}"

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Pipeline Triggered

          | Metric | Value |
          |--------|-------|
          | State | $STATE |
          | Scope | $SCOPE ${SELECTION:+($SELECTION)} |
          | Jurisdictions | ${JCOUNT:-N/A} |
          | Records | ${TOTAL:-N/A} |
          | R2 Key | $R2_KEY |
          | Skip Forecasts | ${{ github.event.inputs.skip_forecasts }} |

          **Pipeline stages:** R2 Download → Init Cache → Split Jurisdiction → Split Road Type → Aggregate (CSV) → Upload per-county to R2 → Forecasts → Manifest

          **Scope-aware aggregation:**
          - \`statewide\`: Produces ALL region + MPO aggregates
          - \`region\`: Processes only counties in the selected DOT region
          - \`mpo\`: Processes only counties in the selected MPO/TPR
          - \`jurisdiction\`: Processes single county (3 road-type CSVs)
          EOF
