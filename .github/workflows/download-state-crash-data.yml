# ==============================================================================
# Batch Download for Any State
# ==============================================================================
# Registry-driven replacement for batch-all-jurisdictions.yml.
# Reads states/download-registry.json to resolve the correct script,
# data directory, and invocation pattern for each state.
#
# Flow: Resolve registry → Download statewide → Merge → Convert →
#       Upload statewide CSV to R2 → Trigger batch-pipeline.yml
#
# batch-pipeline.yml then handles:
#   Split by jurisdiction → Split road type (3 CSVs per county) →
#   Aggregate → Upload per-county to R2 → Forecasts → Manifest
#
# WHY R2 instead of git commit?
#   Statewide CSVs (700MB+) exceed GitHub's 100MB file size limit.
#   R2 has no file size limit and avoids bloating the git repo.
# ==============================================================================

name: "Batch Download for Any State"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to download (statewide)'
        required: true
        type: choice
        options:
          - virginia
          - colorado
          - maryland
          - alaska
          - arkansas
          - connecticut
          - delaware
          - florida
          - georgia
          - hawaii
          - idaho
          - illinois
          - iowa
          - louisiana
          - massachusetts
          - mississippi
          - montana
          - nevada
          - new_york
          - nyc
          - ohio
          - oklahoma
          - oregon
          - pennsylvania
          - south_carolina
          - texas
          - utah
          - vermont
          - washington
          - west_virginia
          - wisconsin

      filter:
        description: 'Road type filter (Virginia only — other states ignore this)'
        required: false
        type: choice
        default: 'countyOnly'
        options:
          - countyOnly
          - countyPlusVDOT
          - allRoads

      force_download:
        description: 'Force re-download (skip cache)'
        required: false
        type: boolean
        default: false

      skip_pipeline:
        description: 'Skip batch pipeline (download + R2 upload only)'
        required: false
        type: boolean
        default: false

      skip_forecasts:
        description: 'Skip forecast generation in batch pipeline'
        required: false
        type: boolean
        default: false

      dry_run:
        description: 'Dry run (no uploads, no commits in batch pipeline)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  NOTIFICATION_EMAIL: ecomhub200@gmail.com

jobs:
  # ============================================================
  # JOB 1: Download statewide data via registry
  # ============================================================
  download:
    name: "Download (${{ github.event.inputs.state }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    outputs:
      state: ${{ github.event.inputs.state }}
      display_name: ${{ steps.registry.outputs.display_name }}
      dot_dir: ${{ steps.registry.outputs.dot_dir }}
      r2_prefix: ${{ steps.registry.outputs.r2_prefix }}
      csv_path: ${{ steps.finalize.outputs.csv_path }}
      total_records: ${{ steps.finalize.outputs.total_records }}
      r2_data_key: ${{ steps.r2_upload.outputs.r2_data_key }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: Resolve from registry ──
      - name: Resolve from download registry
        id: registry
        run: |
          STATE="${{ github.event.inputs.state }}"
          REGISTRY="states/download-registry.json"

          if [ ! -f "$REGISTRY" ]; then
            echo "::error::Registry file not found: $REGISTRY"
            exit 1
          fi

          ENTRY=$(python3 -c "
          import json, sys
          with open('$REGISTRY') as f:
              reg = json.load(f)
          state = '$STATE'
          if state not in reg:
              print(f'::error::State {state} not found in registry', file=sys.stderr)
              sys.exit(1)
          e = reg[state]
          print(f\"display_name={e.get('displayName', state.replace('_', ' ').title())}\")
          print(f\"dot_dir={e.get('dotDir', '')}\")
          print(f\"script={e.get('script', '')}\")
          print(f\"r2_prefix={e.get('r2Prefix', state)}\")
          print(f\"requires_playwright={str(e.get('requiresPlaywright', False)).lower()}\")
          ")

          echo "$ENTRY" >> $GITHUB_OUTPUT
          echo "Registry resolved for $STATE:"
          echo "$ENTRY"

      # ── Step 2: Install dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas requests openpyxl
          fi
          pip install awscli

          # Install Playwright only if needed (Colorado)
          if [ "${{ steps.registry.outputs.requires_playwright }}" = "true" ]; then
            pip install playwright
            playwright install chromium
          fi

      # ── Step 3: Download statewide data ──
      - name: "Download statewide data"
        id: download
        timeout-minutes: 45
        run: |
          STATE="${{ github.event.inputs.state }}"
          SCRIPT="${{ steps.registry.outputs.script }}"
          DOT_DIR="${{ steps.registry.outputs.dot_dir }}"
          FORCE="${{ github.event.inputs.force_download }}"
          FILTER="${{ github.event.inputs.filter || 'countyOnly' }}"

          echo "=========================================="
          echo "Downloading statewide data for $STATE"
          echo "Script: $SCRIPT"
          echo "Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

          DATA_DIR="$DOT_DIR"
          STATEWIDE=""

          if [ "$STATE" = "virginia" ]; then
            ARGS="--output-dir data --jurisdiction henrico --save-statewide --filter $FILTER"
            if [ "$FORCE" = "true" ]; then
              ARGS="$ARGS --force-download"
            fi
            python download_crash_data.py $ARGS
            DATA_DIR="data"

            if [ -f "data/virginia_statewide_all_roads.csv" ]; then
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            elif [ -f "data/virginia_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/virginia_statewide_all_roads.csv.gz
              STATEWIDE="data/virginia_statewide_all_roads.csv"
            fi

          elif [ "$STATE" = "colorado" ]; then
            python download_cdot_crash_data.py --data-dir data/CDOT --save-statewide-gzip
            DATA_DIR="data/CDOT"

            if [ -f "data/CDOT/colorado_statewide_all_roads.csv.gz" ]; then
              gunzip -k data/CDOT/colorado_statewide_all_roads.csv.gz
              STATEWIDE="data/CDOT/colorado_statewide_all_roads.csv"
            elif [ -f "data/CDOT/colorado_statewide_raw.csv" ]; then
              STATEWIDE="data/CDOT/colorado_statewide_raw.csv"
            fi

          else
            # Generic state: run state-specific download script
            echo "Running: python $SCRIPT --data-dir $DOT_DIR --gzip"
            python "$SCRIPT" --data-dir "$DOT_DIR" --gzip 2>&1 || {
              echo "::warning::Download script failed, checking for existing data..."
            }

            # Find the statewide CSV
            for f in "$DOT_DIR"/${STATE}_statewide*.csv "$DOT_DIR"/*statewide*.csv "$DOT_DIR"/*.csv; do
              if [ -f "$f" ]; then
                STATEWIDE="$f"
                break
              fi
            done

            # Try decompressing gzip if no CSV found
            if [ -z "$STATEWIDE" ]; then
              GZ=$(find "$DOT_DIR" -name "*statewide*.csv.gz" -o -name "*.csv.gz" -type f 2>/dev/null | head -1)
              if [ -n "$GZ" ]; then
                gunzip -k "$GZ"
                STATEWIDE="${GZ%.gz}"
              fi
            fi
          fi

          # Verify statewide CSV exists
          if [ -z "$STATEWIDE" ] || [ ! -f "$STATEWIDE" ]; then
            echo "::error::Statewide CSV not found for $STATE"
            exit 1
          fi

          TOTAL=$(wc -l < "$STATEWIDE" | tr -d ' ')
          SIZE=$(ls -lh "$STATEWIDE" | awk '{print $5}')
          echo "Statewide: $STATEWIDE ($((TOTAL - 1)) records, $SIZE)"
          echo "statewide_path=$STATEWIDE" >> $GITHUB_OUTPUT
          echo "data_dir=$DATA_DIR" >> $GITHUB_OUTPUT

      # ── Step 4: Merge source files if needed ──
      - name: "Merge source files if needed"
        id: merge
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Merge check"
          echo "=========================================="

          # Virginia and Colorado data are already merged by their download scripts
          if [ "$STATE" != "virginia" ] && [ "$STATE" != "colorado" ]; then
            RAW_COUNT=$(find "$DATA_DIR" -maxdepth 1 -name "*.csv" ! -name "*statewide*" ! -name "*standardized*" -type f 2>/dev/null | wc -l)
            if [ "$RAW_COUNT" -gt 1 ]; then
              echo "Found $RAW_COUNT raw CSV files — merging..."
              python scripts/process_crash_data.py \
                -i "$DATA_DIR"/*.csv \
                -s "$STATE" -j "statewide" \
                -o "$DATA_DIR" \
                --merge --convert-only
              STATEWIDE="$DATA_DIR/statewide_standardized.csv"
              echo "Merged and converted: $STATEWIDE"
            else
              echo "Single statewide file — no merge needed"
            fi
          fi

          echo "statewide_path=${STATEWIDE}" >> $GITHUB_OUTPUT

      # ── Step 5: Convert to standardized format ──
      - name: "Convert to standardized format"
        id: convert
        run: |
          STATE="${{ github.event.inputs.state }}"
          STATEWIDE="${{ steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"
          DATA_DIR="${{ steps.download.outputs.data_dir }}"

          echo "=========================================="
          echo "Convert to standardized format"
          echo "=========================================="

          # Virginia data is already in standard format (passthrough)
          if [ "$STATE" = "virginia" ]; then
            echo "Virginia data already in standard format — skipping convert"
            echo "csv_path=$STATEWIDE" >> $GITHUB_OUTPUT
          else
            CONVERTED="$DATA_DIR/${STATE}_statewide_standardized.csv"
            python scripts/process_crash_data.py \
              -i "$STATEWIDE" \
              -s "$STATE" -j "statewide" \
              -o "$DATA_DIR" \
              --convert-only --force 2>&1 || {
              echo "::warning::Convert stage failed, using raw data"
              CONVERTED="$STATEWIDE"
            }

            # Find the standardized output
            if [ -f "$DATA_DIR/statewide_standardized.csv" ]; then
              CONVERTED="$DATA_DIR/statewide_standardized.csv"
            fi

            echo "Converted: $CONVERTED"
            echo "csv_path=$CONVERTED" >> $GITHUB_OUTPUT
          fi

      # ── Step 6: Finalize ──
      - name: "Finalize download"
        id: finalize
        run: |
          CSV_PATH="${{ steps.convert.outputs.csv_path || steps.merge.outputs.statewide_path || steps.download.outputs.statewide_path }}"

          if [ -z "$CSV_PATH" ] || [ ! -f "$CSV_PATH" ]; then
            echo "::error::No statewide CSV available after download stages"
            exit 1
          fi

          TOTAL=$(wc -l < "$CSV_PATH" | tr -d ' ')
          SIZE=$(ls -lh "$CSV_PATH" | awk '{print $5}')
          echo "Final CSV: $CSV_PATH ($((TOTAL - 1)) records, $SIZE)"
          echo "csv_path=$CSV_PATH" >> $GITHUB_OUTPUT
          echo "total_records=$((TOTAL - 1))" >> $GITHUB_OUTPUT

      # ── Step 7: Upload statewide CSV to R2 ──
      - name: "Upload statewide CSV to R2"
        id: r2_upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ github.event.inputs.state }}"
          CSV_PATH="${{ steps.finalize.outputs.csv_path }}"
          TOTAL="${{ steps.finalize.outputs.total_records }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          R2_KEY="${STATE}/statewide/${STATE}_statewide_all_roads.csv"

          echo "=========================================="
          echo "Uploading statewide CSV to R2"
          echo "  Local: $CSV_PATH"
          echo "  R2:    s3://$R2_BUCKET/$R2_KEY"
          echo "  Records: $TOTAL"
          echo "=========================================="

          if [ -z "$CSV_PATH" ] || [ ! -f "$CSV_PATH" ]; then
            echo "::error::No CSV to upload"
            exit 1
          fi

          # Upload with retry
          for i in 1 2 3 4; do
            if aws s3 cp "$CSV_PATH" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "text/csv" \
              --only-show-errors; then
              echo "Upload succeeded"
              break
            fi
            echo "Upload failed (attempt $i/4), retrying in $((2 ** i))s..."
            sleep $((2 ** i))
          done

          # Verify upload
          SIZE=$(aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key "$R2_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --query 'ContentLength' --output text 2>/dev/null || echo "0")

          if [ "$SIZE" = "0" ]; then
            echo "::error::R2 upload verification failed"
            exit 1
          fi

          SIZE_MB=$((SIZE / 1048576))
          echo "Verified: $R2_KEY (${SIZE_MB}MB on R2)"
          echo "r2_data_key=$R2_KEY" >> $GITHUB_OUTPUT

      # ── Step 8: Job summary ──
      - name: Job summary
        if: always()
        run: |
          STATE="${{ github.event.inputs.state }}"
          DISPLAY="${{ steps.registry.outputs.display_name }}"
          TOTAL="${{ steps.finalize.outputs.total_records }}"
          R2_KEY="${{ steps.r2_upload.outputs.r2_data_key }}"
          CSV_PATH="${{ steps.finalize.outputs.csv_path }}"

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${DISPLAY} — Batch Download

          | Metric | Value |
          |--------|-------|
          | State | ${DISPLAY} (${STATE}) |
          | Records | ${TOTAL:-N/A} |
          | Output | \`${CSV_PATH}\` |
          | R2 Key | ${R2_KEY} |
          | Run time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |
          EOF

  # ============================================================
  # JOB 2: Trigger batch pipeline
  # ============================================================
  trigger-pipeline:
    name: "Trigger batch pipeline"
    needs: download
    if: github.event.inputs.skip_pipeline != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ needs.download.outputs.state }}';
            const r2DataKey = '${{ needs.download.outputs.r2_data_key }}';
            const skipForecasts = '${{ github.event.inputs.skip_forecasts }}';
            const dryRun = '${{ github.event.inputs.dry_run }}';

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'batch-pipeline.yml',
              ref: 'main',
              inputs: {
                state: state,
                scope: 'statewide',
                selection: '',
                r2_data_key: r2DataKey,
                skip_forecasts: skipForecasts || 'false',
                dry_run: dryRun || 'false'
              }
            });

            console.log(`Batch pipeline triggered for ${state} (statewide)`);
            console.log(`  R2 key: ${r2DataKey}`);
            console.log(`  Skip forecasts: ${skipForecasts}`);
            console.log(`  Dry run: ${dryRun}`);

      - name: Job summary
        run: |
          STATE="${{ needs.download.outputs.state }}"
          TOTAL="${{ needs.download.outputs.total_records }}"
          R2_KEY="${{ needs.download.outputs.r2_data_key }}"
          echo "## Batch Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| State | $STATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Records | ${TOTAL:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| R2 Upload | $R2_KEY |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Pipeline | Triggered (scope=statewide) |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip Forecasts | ${{ github.event.inputs.skip_forecasts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** batch-pipeline.yml → Split jurisdiction → Split road type (3 CSVs) → Aggregate → Upload per-county to R2 → Forecasts → Manifest" >> $GITHUB_STEP_SUMMARY
