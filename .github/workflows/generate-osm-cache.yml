# .github/workflows/generate-osm-cache.yml
# Universal: Download OSM road network for ANY state → parquet cache → R2
# Run manually from Actions tab → "Generate OSM Cache" → pick state(s) → Run
#
# Supports:
#   - Single state:  select from dropdown
#   - All states:    select "ALL" to generate cache for every registered state
#
# Reusable for any future state — just add it to STATES dict in the resolve step.

name: Generate OSM Cache

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to cache (or ALL for every registered state)'
        required: true
        default: 'delaware'
        type: choice
        options:
          - delaware
          - virginia
          - colorado
          - maryland
          - florida
          - new_york
          - california
          - texas
          - ALL

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        run: |
          python3 -c "
          import json

          # ── Master state registry ──
          # Add new states here — everything else is automatic.
          STATES = {
              'delaware':   {'name': 'Delaware',     'abbreviation': 'de', 'r2_prefix': 'delaware'},
              'virginia':   {'name': 'Virginia',     'abbreviation': 'va', 'r2_prefix': 'virginia'},
              'colorado':   {'name': 'Colorado',     'abbreviation': 'co', 'r2_prefix': 'colorado'},
              'maryland':   {'name': 'Maryland',     'abbreviation': 'md', 'r2_prefix': 'maryland'},
              'florida':    {'name': 'Florida',      'abbreviation': 'fl', 'r2_prefix': 'florida'},
              'new_york':   {'name': 'New York',     'abbreviation': 'ny', 'r2_prefix': 'new_york'},
              'california': {'name': 'California',   'abbreviation': 'ca', 'r2_prefix': 'california'},
              'texas':      {'name': 'Texas',        'abbreviation': 'tx', 'r2_prefix': 'texas'},
          }

          selected = '${{ github.event.inputs.state }}'

          if selected == 'ALL':
              matrix = list(STATES.values())
          else:
              if selected not in STATES:
                  raise ValueError(f'{selected} not in registry. Add it to the workflow.')
              matrix = [STATES[selected]]

          print(json.dumps({'include': matrix}))
          " > matrix.json

          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  generate:
    needs: resolve
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
      fail-fast: false
      max-parallel: 2

    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install osmnx scipy geopandas pandas pyarrow

      - name: "Download ${{ matrix.name }} OSM road network"
        run: |
          mkdir -p cache
          python3 << 'PYEOF'
          import osmnx as ox
          import geopandas as gpd
          import os, time

          state = "${{ matrix.name }}"
          abbr  = "${{ matrix.abbreviation }}"

          print(f"osmnx {ox.__version__}, geopandas {gpd.__version__}")
          print(f"Downloading {state} road network from OSM...")
          t0 = time.time()

          G = ox.graph_from_place(f"{state}, United States", network_type="drive", simplify=True)
          print(f"Graph: {G.number_of_nodes():,} nodes, {G.number_of_edges():,} edges")

          # Save roads
          edges = ox.graph_to_gdfs(G, nodes=False, edges=True)
          keep = [c for c in ["geometry","name","ref","highway","maxspeed","lanes","surface","oneway","length"] if c in edges.columns]
          roads_path = f"cache/{abbr}_roads.parquet"
          edges[keep].to_parquet(roads_path, index=True)
          roads_mb = os.path.getsize(roads_path) / 1048576
          print(f"Roads: {roads_path} ({roads_mb:.1f} MB, {len(edges):,} segments)")

          # Save intersections (degree >= 3)
          nodes = ox.graph_to_gdfs(G, nodes=True, edges=False)
          degree = dict(G.degree())
          nodes["degree"] = nodes.index.map(degree)
          intersections = nodes[nodes["degree"] >= 3][["geometry","degree"]]
          int_path = f"cache/{abbr}_intersections.parquet"
          intersections.to_parquet(int_path, index=True)
          int_mb = os.path.getsize(int_path) / 1048576
          print(f"Intersections: {int_path} ({int_mb:.1f} MB, {len(intersections):,} nodes)")

          print(f"Done in {time.time() - t0:.0f}s — Total: {roads_mb + int_mb:.1f} MB")
          PYEOF

      - name: "Upload ${{ matrix.name }} cache to R2"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          ABBR="${{ matrix.abbreviation }}"
          PREFIX="${{ matrix.r2_prefix }}"
          BUCKET="crash-lens-data"

          pip install -q awscli

          for FILE in cache/${ABBR}_roads.parquet cache/${ABBR}_intersections.parquet; do
            if [ -f "$FILE" ]; then
              BASENAME=$(basename "$FILE")
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              SIZE_MB=$((SIZE / 1048576))
              aws s3 cp "$FILE" "s3://$BUCKET/$PREFIX/cache/$BASENAME" \
                --endpoint-url "$R2_ENDPOINT" --only-show-errors
              echo "✅ $PREFIX/cache/$BASENAME (${SIZE_MB} MB)"
            fi
          done

      - name: Verify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          PREFIX="${{ matrix.r2_prefix }}"
          echo "R2 cache for ${{ matrix.name }}:"
          aws s3 ls "s3://crash-lens-data/$PREFIX/cache/" \
            --endpoint-url "$R2_ENDPOINT" || echo "(empty)"

      - name: Summary
        run: |
          ABBR="${{ matrix.abbreviation }}"
          PREFIX="${{ matrix.r2_prefix }}"
          ROADS=$(stat -c%s "cache/${ABBR}_roads.parquet" 2>/dev/null || echo "0")
          INTS=$(stat -c%s "cache/${ABBR}_intersections.parquet" 2>/dev/null || echo "0")

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## OSM Cache — ${{ matrix.name }} (${{ matrix.abbreviation }})

          | File | Size | R2 Key |
          |------|------|--------|
          | ${ABBR}_roads.parquet | $((ROADS / 1048576)) MB | ${PREFIX}/cache/${ABBR}_roads.parquet |
          | ${ABBR}_intersections.parquet | $((INTS / 1048576)) MB | ${PREFIX}/cache/${ABBR}_intersections.parquet |

          Tier 2 will fill: Functional Class, RTE Name, Ownership, SYSTEM, Node, Intersection Name.
          EOF
