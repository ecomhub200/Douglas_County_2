# Complete Nginx configuration for CRASH LENS
# Replaces /etc/nginx/nginx.conf entirely (not an include)

worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;

    # Gzip compression for large HTML/CSS/JS files
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript text/csv;

    # Max upload size (5 GB for large crash data CSVs)
    client_max_body_size 5G;

    # Timeouts for large file uploads
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    send_timeout 600s;

    # Buffer large uploads to disk instead of RAM
    client_body_buffer_size 1M;
    client_body_temp_path /var/lib/nginx/tmp/client_body 1 2;

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Proxy API requests to the Node.js Qdrant proxy server
        location /api/ {
            proxy_pass http://127.0.0.1:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Clean URL for /app
        location = /app {
            try_files /app/index.html =404;
        }

        # Clean URL for /login
        location = /login {
            try_files /login/index.html =404;
        }

        # Cache static assets for 1 year
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache images for 1 year
        location /data/images/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache CSV and JSON data for 1 hour
        location ~* \.(csv|json)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Default location - serve static files
        location / {
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Custom error page
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
