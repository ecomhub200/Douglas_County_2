server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for large HTML/CSS/JS files
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript text/csv;

    # Increase client max body size (for file uploads)
    client_max_body_size 50M;

    # Proxy API requests to the Node.js Qdrant proxy server
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Clean URL for /app
    location = /app {
        try_files /app/index.html =404;
    }

    # Clean URL for /login
    location = /login {
        try_files /login/index.html =404;
    }

    # Cache static assets for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images for 1 year
    location /data/images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache CSV and JSON data for 1 hour
    location ~* \.(csv|json)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Default location - serve static files
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
