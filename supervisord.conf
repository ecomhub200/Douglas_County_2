[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:qdrant-proxy]
command=node /app/server/qdrant-proxy.js
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PROXY_PORT="3001",BREVO_API_KEY="%(ENV_BREVO_API_KEY)s",BREVO_SMTP_LOGIN="%(ENV_BREVO_SMTP_LOGIN)s",BREVO_SMTP_PASSWORD="%(ENV_BREVO_SMTP_PASSWORD)s",NOTIFICATION_FROM_EMAIL="%(ENV_NOTIFICATION_FROM_EMAIL)s"
