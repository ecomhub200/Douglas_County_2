# Netlify Configuration for Virginia Crash Analysis Tool
# =====================================================

[build]
  # Build command (none needed for static site)
  command = ""
  # Publish directory - where the site files are
  publish = "."
  # Functions directory
  functions = "netlify/functions"

# Redirect /api/* to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA routing - all routes go to index.html except for actual files
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Environment variables (set these in Netlify dashboard for production)
# QDRANT_ENDPOINT = "your-qdrant-cloud-url"
# QDRANT_API_KEY = "your-api-key"
# VOYAGE_API_KEY = "your-voyage-key"
