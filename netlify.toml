# Netlify Configuration for CRASH LENS - Virginia Crash Analysis Tool

[build]
  # No build command needed - this is a static HTML site
  command = "cd netlify/functions && npm install && cd ../.."
  publish = "."
  base = "."
  # Functions directory for Netlify Functions
  functions = "netlify/functions"

# Node.js 18+ required for native fetch and modern features
[build.environment]
  NODE_VERSION = "18"

# Functions configuration
[functions]
  node_bundler = "esbuild"

# Redirect /api/* to Netlify Functions (for Qdrant CORS workaround)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSV and JSON data files - shorter cache
[[headers]]
  for = "*.csv"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects - ensure clean URLs work
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login/index.html"
  status = 200

# Handle 404 errors
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Environment variables (set these in Netlify dashboard for production)
# QDRANT_ENDPOINT = "your-qdrant-cloud-url"
# QDRANT_API_KEY = "your-api-key"
# VOYAGE_API_KEY = "your-voyage-key"

