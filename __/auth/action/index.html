<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRASH LENS - Email Verification</title>
  <link rel="icon" type="image/svg+xml" href="../../../data/images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../../../data/images/favicon-32x32.png">
  <meta name="theme-color" content="#1e3a5f">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../../../assets/css/styles.css">

  <style>
    .action-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg-dark);
      position: relative;
      overflow: hidden;
    }

    .action-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(30, 64, 175, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
      animation: bgShift 15s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-5%, -5%); }
    }

    .action-card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(135deg, rgba(30, 58, 95, 0.85) 0%, rgba(12, 46, 78, 0.75) 100%);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2.5rem;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .action-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    }

    .action-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .action-logo img {
      height: 40px;
      width: 40px;
    }

    .action-logo span {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .action-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-icon.loading {
      background: rgba(59, 130, 246, 0.15);
      border: 2px solid rgba(59, 130, 246, 0.3);
    }

    .action-icon.success {
      background: rgba(5, 150, 105, 0.15);
      border: 2px solid rgba(5, 150, 105, 0.3);
    }

    .action-icon.error {
      background: rgba(220, 38, 38, 0.15);
      border: 2px solid rgba(220, 38, 38, 0.3);
    }

    .action-icon svg {
      width: 36px;
      height: 36px;
    }

    .action-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .action-text {
      color: #adbdcc;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .action-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Reset password form */
    .reset-form {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .reset-form label {
      display: block;
      color: #adbdcc;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .reset-form input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(6, 18, 32, 0.8);
      border: 1px solid rgba(26, 48, 69, 0.8);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s ease;
      box-sizing: border-box;
    }

    .reset-form input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .password-requirements {
      color: #64748b;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="action-container">
    <div class="action-card">
      <div class="action-logo">
        <img src="../../../data/images/favicon.svg" alt="Crash Lens" onerror="this.style.display='none'">
        <span>CRASH LENS</span>
      </div>

      <div id="loadingState">
        <div class="action-icon loading">
          <div class="spinner"></div>
        </div>
        <h2 class="action-title">Processing...</h2>
        <p class="action-text">Please wait while we process your request.</p>
      </div>

      <div id="successState" style="display:none;">
        <div class="action-icon success">
          <svg fill="none" stroke="#059669" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="action-title" id="successTitle">Success!</h2>
        <p class="action-text" id="successText"></p>
        <a href="../../../login/?verified=true" class="action-btn" id="successBtn">Continue to Sign In</a>
      </div>

      <div id="errorState" style="display:none;">
        <div class="action-icon error">
          <svg fill="none" stroke="#dc2626" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
        <h2 class="action-title" id="errorTitle">Something went wrong</h2>
        <p class="action-text" id="errorText"></p>
        <a href="../../../login/" class="action-btn" id="errorBtn">Go to Sign In</a>
      </div>

      <div id="resetPasswordState" style="display:none;">
        <div class="action-icon loading" style="background: rgba(124, 58, 237, 0.15); border-color: rgba(124, 58, 237, 0.3);">
          <svg fill="none" stroke="#a78bfa" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <h2 class="action-title">Reset your password</h2>
        <p class="action-text">Enter your new password below.</p>
        <div class="reset-form">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">
          <p class="password-requirements">Password must be at least 6 characters.</p>
        </div>
        <button class="action-btn" id="resetBtn" onclick="handlePasswordReset()">Reset Password</button>
        <p id="resetError" style="color: #f87171; font-size: 0.875rem; margin-top: 1rem; display: none;"></p>
      </div>
    </div>
  </div>

  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');
    const apiKey = params.get('apiKey');
    const continueUrl = params.get('continueUrl');

    // Initialize Firebase from config
    async function initFirebase() {
      try {
        const resp = await fetch('../../../config.json');
        const config = await resp.json();
        if (config.apis && config.apis.firebase) {
          firebase.initializeApp(config.apis.firebase);
          return true;
        }
      } catch (e) {
        console.error('Failed to load Firebase config:', e);
      }
      return false;
    }

    function showState(stateId) {
      ['loadingState', 'successState', 'errorState', 'resetPasswordState'].forEach(function(id) {
        document.getElementById(id).style.display = id === stateId ? 'block' : 'none';
      });
    }

    function showSuccess(title, text, btnText, btnHref) {
      document.getElementById('successTitle').textContent = title;
      document.getElementById('successText').textContent = text;
      if (btnText) document.getElementById('successBtn').textContent = btnText;
      if (btnHref) document.getElementById('successBtn').href = btnHref;
      showState('successState');
    }

    function showError(title, text) {
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorText').textContent = text;
      showState('errorState');
    }

    // Resolve continue URL or fallback to login
    function getRedirectUrl(verified) {
      if (continueUrl) {
        return continueUrl;
      }
      return '../../../login/' + (verified ? '?verified=true' : '');
    }

    // Handle email verification
    async function handleVerifyEmail() {
      try {
        await firebase.auth().applyActionCode(oobCode);
        var redirectUrl = getRedirectUrl(true);
        showSuccess(
          'Email Verified!',
          'Your email has been verified successfully. You can now sign in and start your free trial.',
          'Continue to Sign In',
          redirectUrl
        );
        // Auto-redirect after 3 seconds
        setTimeout(function() {
          window.location.href = redirectUrl;
        }, 3000);
      } catch (error) {
        console.error('Verification error:', error);
        var msg = 'The verification link may have expired or already been used.';
        if (error.code === 'auth/invalid-action-code') {
          msg = 'This verification link has expired or has already been used. Please request a new one.';
        } else if (error.code === 'auth/expired-action-code') {
          msg = 'This verification link has expired. Please request a new verification email.';
        }
        showError('Verification Failed', msg);
        document.getElementById('errorBtn').textContent = 'Request New Link';
        document.getElementById('errorBtn').href = '../../../login/?reason=verify_email';
      }
    }

    // Handle password reset - show form
    async function handleResetPassword() {
      try {
        // Verify the code is valid first
        await firebase.auth().verifyPasswordResetCode(oobCode);
        showState('resetPasswordState');
      } catch (error) {
        console.error('Reset code error:', error);
        var msg = 'This password reset link has expired or has already been used.';
        if (error.code === 'auth/invalid-action-code') {
          msg = 'This password reset link is invalid or has already been used. Please request a new one.';
        } else if (error.code === 'auth/expired-action-code') {
          msg = 'This password reset link has expired. Please request a new one.';
        }
        showError('Reset Link Invalid', msg);
        document.getElementById('errorBtn').textContent = 'Request New Link';
        document.getElementById('errorBtn').href = '../../../login/';
      }
    }

    // Submit new password
    async function handlePasswordReset() {
      var newPass = document.getElementById('newPassword').value;
      var confirmPass = document.getElementById('confirmPassword').value;
      var errorEl = document.getElementById('resetError');

      errorEl.style.display = 'none';

      if (!newPass || newPass.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }

      if (newPass !== confirmPass) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      document.getElementById('resetBtn').disabled = true;
      document.getElementById('resetBtn').textContent = 'Resetting...';

      try {
        await firebase.auth().confirmPasswordReset(oobCode, newPass);
        showSuccess(
          'Password Reset!',
          'Your password has been reset successfully. You can now sign in with your new password.',
          'Sign In',
          '../../../login/'
        );
      } catch (error) {
        console.error('Password reset error:', error);
        document.getElementById('resetBtn').disabled = false;
        document.getElementById('resetBtn').textContent = 'Reset Password';
        var msg = 'Failed to reset password. Please try again.';
        if (error.code === 'auth/weak-password') {
          msg = 'Password is too weak. Please use at least 6 characters.';
        } else if (error.code === 'auth/expired-action-code') {
          msg = 'This reset link has expired. Please request a new one.';
        }
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      }
    }

    // Handle recover email
    async function handleRecoverEmail() {
      try {
        var info = await firebase.auth().checkActionCode(oobCode);
        await firebase.auth().applyActionCode(oobCode);
        showSuccess(
          'Email Recovered',
          'Your email has been restored to ' + info.data.email + '.',
          'Go to Sign In',
          '../../../login/'
        );
      } catch (error) {
        console.error('Email recovery error:', error);
        showError('Recovery Failed', 'This email recovery link has expired or is invalid.');
      }
    }

    // Main handler
    async function processAction() {
      if (!oobCode || !mode) {
        showError('Invalid Link', 'This link is missing required parameters. Please check your email and try again.');
        return;
      }

      var firebaseReady = await initFirebase();
      if (!firebaseReady) {
        showError('Configuration Error', 'Unable to load application configuration. Please try again later.');
        return;
      }

      switch (mode) {
        case 'verifyEmail':
          handleVerifyEmail();
          break;
        case 'resetPassword':
          handleResetPassword();
          break;
        case 'recoverEmail':
          handleRecoverEmail();
          break;
        default:
          showError('Unknown Action', 'This link contains an unrecognized action. Please check your email and try again.');
      }
    }

    // Start processing
    processAction();
  </script>
</body>
</html>
