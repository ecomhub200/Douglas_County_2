<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRASH LENS | Intersection Crash Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --fatal-red: #dc2626;
            --serious-orange: #f97316;
            --minor-yellow: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .animation-container {
            width: 100%;
            max-width: 900px;
            height: 400px;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--bg-secondary);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #crash-canvas { width: 100%; height: 100%; display: block; }

        .crash-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .crash-label .severity-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        .crash-label.fatal .severity-dot { background: var(--fatal-red); box-shadow: 0 0 10px var(--fatal-red); }
        .crash-label.serious .severity-dot { background: var(--serious-orange); box-shadow: 0 0 10px var(--serious-orange); }
        .crash-label.minor .severity-dot { background: var(--minor-yellow); box-shadow: 0 0 10px var(--minor-yellow); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .legend {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            z-index: 10;
        }

        .legend-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend-text { color: var(--text-secondary); font-size: 0.7rem; }

        .timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            transition: width 0.1s linear;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="animation-container">
        <canvas id="crash-canvas"></canvas>
        <div class="crash-label fatal" id="crash-label">
            <span class="severity-dot"></span>
            <span id="label-text">Vehicle-Pedestrian Crash</span>
        </div>
        <div class="legend">
            <div class="legend-title">KABCO Severity</div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #dc2626;"></div>
                <span class="legend-text">K - Fatal</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #f97316;"></div>
                <span class="legend-text">A - Serious Injury</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #f59e0b;"></div>
                <span class="legend-text">B - Minor Injury</span>
            </div>
        </div>
        <div class="timer-bar" id="timer-bar"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============ UTILITY FUNCTIONS ============
        function lerp(a, b, t) { return a + (b - a) * t; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
        function easeOutQuad(t) { return t * (2 - t); }
        function smoothstep(t) { return t * t * (3 - 2 * t); }

        // ============ SCENE SETUP ============
        const container = document.querySelector('.animation-container');
        const canvas = document.getElementById('crash-canvas');
        const labelElement = document.getElementById('crash-label');
        const labelText = document.getElementById('label-text');
        const timerBar = document.getElementById('timer-bar');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        const colors = {
            ground: 0x1e293b,
            road: 0x52525b,
            roadLine: 0xffffff,
            roadLineYellow: 0xfcd34d,
            sidewalk: 0xd6d3d1,
            sidewalkEdge: 0xa8a29e,
            fatal_K: 0xdc2626,
            seriousInjury_A: 0xf97316,
            minorInjury_B: 0xf59e0b,
            signalPole: 0x27272a,
            signalBox: 0x18181b,
            signalRed: 0xef4444,
            signalYellow: 0xfbbf24,
            signalGreen: 0x22c55e,
            pedestrian: 0x22c55e,
            cyclist: 0x06b6d4,
            skin: 0xe8c4a0,
            skidMark: 0x1a1a1a
        };

        const roadWidth = 14;
        const laneWidth = 3.5;
        const intSize = roadWidth + 2;

        // ============ CAMERA - CLOSER VIEW ============
        const aspect = container.clientWidth / container.clientHeight;
        const frustumSize = 22;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2,
            frustumSize * aspect / 2,
            frustumSize / 2,
            frustumSize / -2,
            0.1,
            1000
        );
        
        let cameraAngle = Math.PI * 1.15;
        const cameraRadius = 28;
        const cameraHeight = 16;
        let cameraShake = { x: 0, y: 0, intensity: 0 };

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(15, 25, 15);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 100;
        directionalLight.shadow.camera.left = -40;
        directionalLight.shadow.camera.right = 40;
        directionalLight.shadow.camera.top = 40;
        directionalLight.shadow.camera.bottom = -40;
        scene.add(directionalLight);

        // ============ GROUND ============
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: colors.ground, roughness: 0.95 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============ ROAD SEGMENTS ============
        function createRoadSegment(x, z, width, length, rotation = 0) {
            const g = new THREE.Group();
            
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(width, length),
                new THREE.MeshStandardMaterial({ color: colors.road, roughness: 0.75 })
            );
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.02;
            g.add(road);
            
            const swWidth = 3.5;
            const swHeight = 0.3;
            [-1, 1].forEach(side => {
                const sw = new THREE.Mesh(
                    new THREE.BoxGeometry(swWidth, swHeight, length),
                    new THREE.MeshStandardMaterial({ color: colors.sidewalk, roughness: 0.85 })
                );
                sw.position.set(side * (width / 2 + swWidth / 2), swHeight / 2, 0);
                sw.receiveShadow = true;
                sw.castShadow = true;
                g.add(sw);
                
                const curb = new THREE.Mesh(
                    new THREE.BoxGeometry(0.15, swHeight + 0.05, length),
                    new THREE.MeshStandardMaterial({ color: colors.sidewalkEdge, roughness: 0.9 })
                );
                curb.position.set(side * (width / 2 + 0.075), swHeight / 2, 0);
                g.add(curb);
            });
            
            [-0.12, 0.12].forEach(offset => {
                const yellowLine = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.15, length),
                    new THREE.MeshStandardMaterial({ color: colors.roadLineYellow, roughness: 0.4 })
                );
                yellowLine.rotation.x = -Math.PI / 2;
                yellowLine.position.set(offset, 0.03, 0);
                g.add(yellowLine);
            });
            
            [-laneWidth, laneWidth].forEach(laneX => {
                for (let i = -length / 2 + 3; i < length / 2 - 3; i += 6) {
                    const dash = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.15, 3),
                        new THREE.MeshStandardMaterial({ color: colors.roadLine, roughness: 0.4 })
                    );
                    dash.rotation.x = -Math.PI / 2;
                    dash.position.set(laneX, 0.03, i);
                    g.add(dash);
                }
            });
            
            g.position.set(x, 0, z);
            g.rotation.y = rotation;
            return g;
        }

        scene.add(createRoadSegment(0, -24, roadWidth, 32, 0));
        scene.add(createRoadSegment(0, 24, roadWidth, 32, 0));
        scene.add(createRoadSegment(-24, 0, roadWidth, 32, Math.PI / 2));
        scene.add(createRoadSegment(24, 0, roadWidth, 32, Math.PI / 2));

        // ============ INTERSECTION ============
        const intersection = new THREE.Mesh(
            new THREE.PlaneGeometry(intSize, intSize),
            new THREE.MeshStandardMaterial({ color: colors.road, roughness: 0.75 })
        );
        intersection.rotation.x = -Math.PI / 2;
        intersection.position.y = 0.02;
        scene.add(intersection);
        
        const cornerSize = 3.5;
        [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([cx, cz]) => {
            const corner = new THREE.Mesh(
                new THREE.BoxGeometry(cornerSize, 0.3, cornerSize),
                new THREE.MeshStandardMaterial({ color: colors.sidewalk, roughness: 0.85 })
            );
            corner.position.set(cx * (intSize/2 + cornerSize/2), 0.15, cz * (intSize/2 + cornerSize/2));
            corner.receiveShadow = true;
            scene.add(corner);
            
            const ramp = new THREE.Mesh(
                new THREE.PlaneGeometry(1.2, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.7 })
            );
            ramp.rotation.x = -Math.PI / 2;
            ramp.position.set(cx * (intSize/2 + 0.8), 0.31, cz * (intSize/2 + 0.8));
            scene.add(ramp);
        });

        // ============ CROSSWALKS ============
        function createCrosswalk(x, z, rotation, width = roadWidth - 1) {
            const cwGroup = new THREE.Group();
            const crosswalkDepth = 3.5;
            const barWidth = 0.6;
            const barSpacing = 1.0;
            
            [-crosswalkDepth/2, crosswalkDepth/2].forEach(offset => {
                const line = new THREE.Mesh(
                    new THREE.PlaneGeometry(width, 0.25),
                    new THREE.MeshStandardMaterial({ color: colors.roadLine, roughness: 0.35 })
                );
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.035, offset);
                cwGroup.add(line);
            });
            
            const numBars = Math.floor(width / barSpacing);
            for (let i = 0; i < numBars; i++) {
                const bar = new THREE.Mesh(
                    new THREE.PlaneGeometry(barWidth, crosswalkDepth - 0.3),
                    new THREE.MeshStandardMaterial({ color: colors.roadLine, roughness: 0.35 })
                );
                bar.rotation.x = -Math.PI / 2;
                bar.position.set(-width/2 + 0.5 + i * barSpacing, 0.035, 0);
                cwGroup.add(bar);
            }
            
            cwGroup.position.set(x, 0, z);
            cwGroup.rotation.y = rotation;
            return cwGroup;
        }
        
        const cwOffset = intSize / 2 + 2.5;
        scene.add(createCrosswalk(0, -cwOffset, 0));
        scene.add(createCrosswalk(0, cwOffset, 0));
        scene.add(createCrosswalk(-cwOffset, 0, Math.PI/2));
        scene.add(createCrosswalk(cwOffset, 0, Math.PI/2));

        // ============ STOP BARS ============
        const stopBarOffset = cwOffset + 2.5;
        [
            { x: -laneWidth - 0.5, z: -stopBarOffset, r: 0 },
            { x: laneWidth + 0.5, z: stopBarOffset, r: 0 },
            { x: -stopBarOffset, z: laneWidth + 0.5, r: Math.PI/2 },
            { x: stopBarOffset, z: -laneWidth - 0.5, r: Math.PI/2 }
        ].forEach(sb => {
            const bar = new THREE.Mesh(
                new THREE.PlaneGeometry(laneWidth * 2 + 1, 0.6),
                new THREE.MeshStandardMaterial({ color: colors.roadLine, roughness: 0.35 })
            );
            bar.rotation.x = -Math.PI / 2;
            bar.rotation.z = sb.r;
            bar.position.set(sb.x, 0.035, sb.z);
            scene.add(bar);
        });

        // ============ TRAFFIC SIGNALS ============
        const signalLights = [];
        
        function createTrafficSignal(x, z, facingAngle, direction) {
            const signalGroup = new THREE.Group();
            const poleHeight = 7;
            
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.25, poleHeight, 12),
                new THREE.MeshStandardMaterial({ color: colors.signalPole, roughness: 0.35, metalness: 0.6 })
            );
            pole.position.y = poleHeight / 2;
            pole.castShadow = true;
            signalGroup.add(pole);
            
            const armLength = 14;
            const arm = new THREE.Mesh(
                new THREE.CylinderGeometry(0.14, 0.16, armLength, 8),
                new THREE.MeshStandardMaterial({ color: colors.signalPole, roughness: 0.35, metalness: 0.6 })
            );
            arm.rotation.z = Math.PI / 2;
            arm.position.set(armLength / 2, poleHeight - 0.4, 0);
            signalGroup.add(arm);
            
            function createSignalHead(offsetX) {
                const headG = new THREE.Group();
                
                const bracket = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.07, 0.07, 0.6, 6),
                    new THREE.MeshStandardMaterial({ color: colors.signalPole, roughness: 0.4 })
                );
                bracket.position.y = 0.3;
                headG.add(bracket);
                
                const backplate = new THREE.Mesh(
                    new THREE.BoxGeometry(1.3, 2.4, 0.1),
                    new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.95 })
                );
                backplate.position.set(0, -0.85, 0.35);
                headG.add(backplate);
                
                const housing = new THREE.Mesh(
                    new THREE.BoxGeometry(1.0, 2.1, 0.65),
                    new THREE.MeshStandardMaterial({ color: colors.signalBox, roughness: 0.7 })
                );
                housing.position.y = -0.85;
                headG.add(housing);
                
                const lensData = [
                    { color: colors.signalRed, y: -0.25, name: 'red' },
                    { color: colors.signalYellow, y: -0.85, name: 'yellow' },
                    { color: colors.signalGreen, y: -1.45, name: 'green' }
                ];
                
                const lensGroup = { red: null, yellow: null, green: null, direction: direction };
                
                lensData.forEach(lens => {
                    const lensMesh = new THREE.Mesh(
                        new THREE.CircleGeometry(0.25, 24),
                        new THREE.MeshStandardMaterial({
                            color: lens.color,
                            emissive: 0x000000,
                            emissiveIntensity: 0,
                            roughness: 0.1
                        })
                    );
                    lensMesh.rotation.y = Math.PI;
                    lensMesh.position.set(0, lens.y, -0.33);
                    headG.add(lensMesh);
                    lensGroup[lens.name] = lensMesh;
                    
                    const visor = new THREE.Mesh(
                        new THREE.BoxGeometry(0.6, 0.2, 0.4),
                        new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 })
                    );
                    visor.position.set(0, lens.y + 0.25, -0.52);
                    headG.add(visor);
                });
                
                headG.position.set(offsetX, poleHeight - 0.4, 0);
                signalLights.push(lensGroup);
                return headG;
            }
            
            signalGroup.add(createSignalHead(armLength - 3));
            signalGroup.add(createSignalHead(armLength - 7));
            
            signalGroup.position.set(x, 0, z);
            signalGroup.rotation.y = facingAngle;
            return signalGroup;
        }
        
        const sigOffset = intSize / 2 + 5;
        scene.add(createTrafficSignal(sigOffset, -sigOffset, Math.PI, 'NB'));
        scene.add(createTrafficSignal(sigOffset, sigOffset, Math.PI / 2, 'WB'));
        scene.add(createTrafficSignal(-sigOffset, sigOffset, 0, 'SB'));
        scene.add(createTrafficSignal(-sigOffset, -sigOffset, -Math.PI / 2, 'EB'));
        
        // ============ SIGNAL PHASE CONTROL ============
        const phaseTiming = {
            'NS_GREEN': 3000,  // Shorter for crash animation context
            'NS_YELLOW': 1000,
            'EW_GREEN': 3000,
            'EW_YELLOW': 1000
        };
        const phaseSequence = ['NS_GREEN', 'NS_YELLOW', 'EW_GREEN', 'EW_YELLOW'];
        let signalPhaseIndex = 0;
        let signalPhaseStartTime = 0;
        let currentSignalPhase = 'NS_GREEN';
        
        function updateSignals(phase) {
            currentSignalPhase = phase;
            const isNSGreen = phase === 'NS_GREEN';
            const isNSYellow = phase === 'NS_YELLOW';
            const isEWGreen = phase === 'EW_GREEN';
            const isEWYellow = phase === 'EW_YELLOW';
            
            signalLights.forEach(lights => {
                const isNS = lights.direction === 'NB' || lights.direction === 'SB';
                
                // Reset all lights
                ['red', 'yellow', 'green'].forEach(l => {
                    lights[l].material.emissive.setHex(0x000000);
                    lights[l].material.emissiveIntensity = 0;
                });
                
                // Set active light
                if (isNS) {
                    if (isNSGreen) {
                        lights.green.material.emissive.setHex(colors.signalGreen);
                        lights.green.material.emissiveIntensity = 1.5;
                    } else if (isNSYellow) {
                        lights.yellow.material.emissive.setHex(colors.signalYellow);
                        lights.yellow.material.emissiveIntensity = 1.5;
                    } else {
                        lights.red.material.emissive.setHex(colors.signalRed);
                        lights.red.material.emissiveIntensity = 1.5;
                    }
                } else {
                    if (isEWGreen) {
                        lights.green.material.emissive.setHex(colors.signalGreen);
                        lights.green.material.emissiveIntensity = 1.5;
                    } else if (isEWYellow) {
                        lights.yellow.material.emissive.setHex(colors.signalYellow);
                        lights.yellow.material.emissiveIntensity = 1.5;
                    } else {
                        lights.red.material.emissive.setHex(colors.signalRed);
                        lights.red.material.emissiveIntensity = 1.5;
                    }
                }
            });
        }

        // ============ KABCO CRASH PINS ============
        const pins = [];
        const pinData = [
            // K - Fatal (center intersection)
            { x: 0, z: 0, color: colors.fatal_K, severity: 'K', delay: 200 },
            
            // A - Serious Injury
            { x: 4, z: -3, color: colors.seriousInjury_A, severity: 'A', delay: 400 },
            { x: -3, z: 4, color: colors.seriousInjury_A, severity: 'A', delay: 500 },
            
            // B - Minor Injury
            { x: -5, z: -2, color: colors.minorInjury_B, severity: 'B', delay: 700 },
            { x: 2, z: 5, color: colors.minorInjury_B, severity: 'B', delay: 800 },
            { x: -laneWidth, z: -15, color: colors.minorInjury_B, severity: 'B', delay: 1200 },
            
            // C - Possible Injury (green)
            { x: cwOffset - 1, z: 2, color: 0x22c55e, severity: 'C', delay: 900 },
            { x: -cwOffset + 1, z: -2, color: 0x22c55e, severity: 'C', delay: 1000 },
            
            // O - Property Damage Only (gray)
            { x: 0, z: -cwOffset + 1, color: 0x64748b, severity: 'O', delay: 1100 },
            { x: laneWidth, z: 12, color: 0x64748b, severity: 'O', delay: 1300 },
            { x: -laneWidth, z: -12, color: 0x64748b, severity: 'O', delay: 1400 },
        ];
        
        function createPin(x, z, color, severity, delay) {
            const g = new THREE.Group();
            
            // Pin head (sphere)
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 24, 24),
                new THREE.MeshStandardMaterial({ 
                    color, roughness: 0.15, metalness: 0.5,
                    emissive: color, emissiveIntensity: 0.5
                })
            );
            head.position.y = 1.8;
            head.castShadow = true;
            g.add(head);
            
            // Pin stem
            const stem = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.08, 1.5, 10),
                new THREE.MeshStandardMaterial({ color: 0x374151, roughness: 0.3, metalness: 0.6 })
            );
            stem.position.y = 0.75;
            stem.castShadow = true;
            g.add(stem);
            
            // Ground ring (pulsing indicator)
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.35, 0.55, 32),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.04;
            g.add(ring);
            
            // Start above scene (will drop in)
            g.position.set(x, 20, z);
            g.userData = { delay, baseY: 0, color, severity, dropped: false };
            return g;
        }
        
        pinData.forEach(d => {
            const pin = createPin(d.x, d.z, d.color, d.severity, d.delay);
            pins.push(pin);
            scene.add(pin);
        });
        
        // Easing function for pin drop
        function easeOutBounce(x) {
            const n1 = 7.5625, d1 = 2.75;
            if (x < 1 / d1) return n1 * x * x;
            else if (x < 2 / d1) return n1 * (x -= 1.5 / d1) * x + 0.75;
            else if (x < 2.5 / d1) return n1 * (x -= 2.25 / d1) * x + 0.9375;
            return n1 * (x -= 2.625 / d1) * x + 0.984375;
        }

        // ============ CREATE CAR ============
        function createCar(color) {
            const carGroup = new THREE.Group();
            const carLength = 3.2;
            const carWidth = 1.4;
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.25, metalness: 0.75 });
            const lowerBody = new THREE.Mesh(
                new THREE.BoxGeometry(carLength, 0.5, carWidth),
                bodyMat
            );
            lowerBody.position.y = 0.45;
            lowerBody.castShadow = true;
            carGroup.add(lowerBody);
            
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(carLength * 0.5, 0.5, carWidth - 0.15),
                bodyMat
            );
            cabin.position.set(-carLength * 0.1, 0.95, 0);
            cabin.castShadow = true;
            carGroup.add(cabin);

        // ============ SCENE 3 STATE (improved bicycle) ============

        // ============ ANIMATION ============

        function triggerCameraShake(intensity) {
            cameraShake.intensity = intensity;
        }

        function updateCameraShake(dt) {
            if (cameraShake.intensity > 0) {
                cameraShake.x = (Math.random() - 0.5) * cameraShake.intensity;
                cameraShake.y = (Math.random() - 0.5) * cameraShake.intensity;
                cameraShake.intensity = Math.max(0, cameraShake.intensity - dt * 3);
            } else {
                cameraShake.x = 0;
                cameraShake.y = 0;
            }
        }

        // ============ SCENE 2: VEHICLE-VEHICLE (from file 1) ============
        function updateScene2(dt, sceneTime) {
            const s = scene2State;
            
            blueCar.visible = true;
            yellowCar.visible = true;
            
            if (sceneTime < 0.1 && s.phase !== 'approach') {
                resetScene2();
            }
            
            if (s.phase === 'approach') {
                s.blueZ += s.blueVz * dt;
                s.yellowX += s.yellowVx * dt;
                
                if (s.yellowX > -8 && !skidMark2.visible) {
                    skidMark2.visible = true;
                    skidMark2.position.set(s.yellowX - 2, 0, s.yellowZ);
                    skidMark2.rotation.y = Math.PI / 2;
                    s.yellowVx *= 0.98;
                }
                
                const dx = s.yellowX - s.blueX;
                const dz = s.yellowZ - s.blueZ;
                const dist = Math.sqrt(dx * dx + dz * dz);
                
                if (dist < 3.0 && s.blueZ > -2 && s.yellowX > -3) {
                    s.phase = 'collision';
                    s.collided = true;
                    s.collisionTime = sceneTime;
                    
                    s.blueVx = s.yellowVx * 0.42;
                    s.blueVz *= 0.3;
                    s.blueYawV = 1.8;
                    
                    s.yellowVx *= 0.25;
                    s.yellowVz = -s.blueVz * 0.3;
                    s.yellowYawV = -0.8;
                    
                    triggerCameraShake(0.8);
                    
                    skidMark1.visible = true;
                    skidMark1.position.set(s.blueX, 0, s.blueZ - 2);
                    skidMark1.rotation.y = 0;
                }
            } else if (s.phase === 'collision') {
                const friction = 0.96;
                
                s.blueX += s.blueVx * dt;
                s.blueZ += s.blueVz * dt;
                s.blueYaw += s.blueYawV * dt;
                s.blueVx *= friction;
                s.blueVz *= friction;
                s.blueYawV *= 0.94;
                
                s.yellowX += s.yellowVx * dt;
                s.yellowZ += s.yellowVz * dt;
                s.yellowYaw += s.yellowYawV * dt;
                s.yellowVx *= friction;
                s.yellowVz *= friction;
                s.yellowYawV *= 0.94;
                
                if (!s.debrisSpawned) {
                    s.debrisSpawned = true;
                    debris.forEach((d, i) => {
                        d.visible = true;
                        const angle = (i / debris.length) * Math.PI * 2;
                        const speed = 3 + Math.random() * 4;
                        d.position.set(
                            (s.blueX + s.yellowX) / 2 + (Math.random() - 0.5) * 2,
                            0.5 + Math.random() * 0.5,
                            (s.blueZ + s.yellowZ) / 2 + (Math.random() - 0.5) * 2
                        );
                        d.userData.velocity.set(
                            Math.cos(angle) * speed,
                            3 + Math.random() * 3,
                            Math.sin(angle) * speed
                        );
                    });
                }
                
                if (sceneTime - s.collisionTime > 0.8) {
                    s.phase = 'aftermath';
                }
            } else {
                s.blueVx *= 0.92;
                s.blueVz *= 0.92;
                s.blueYawV *= 0.9;
                s.yellowVx *= 0.92;
                s.yellowVz *= 0.92;
                s.yellowYawV *= 0.9;
                
                s.blueX += s.blueVx * dt;
                s.blueZ += s.blueVz * dt;
                s.blueYaw += s.blueYawV * dt;
                s.yellowX += s.yellowVx * dt;
                s.yellowZ += s.yellowVz * dt;
                s.yellowYaw += s.yellowYawV * dt;
            }
            
            debris.forEach(d => {
                if (d.visible) {
                    d.position.x += d.userData.velocity.x * dt;
                    d.position.y += d.userData.velocity.y * dt;
                    d.position.z += d.userData.velocity.z * dt;
                    d.userData.velocity.y -= 15 * dt;
                    
                    if (d.position.y < 0.05) {
                        d.position.y = 0.05;
                        d.userData.velocity.y = 0;
                        d.userData.velocity.x *= 0.8;
                        d.userData.velocity.z *= 0.8;
                    }
                    d.rotation.x += dt * 5;
                    d.rotation.z += dt * 4;
                }
            });
            
            blueCar.position.set(s.blueX, 0, s.blueZ);
            blueCar.rotation.y = s.blueYaw;
            
            yellowCar.position.set(s.yellowX, 0, s.yellowZ);
            yellowCar.rotation.y = s.yellowYaw;
            
            if (s.collided) {
                impactSphere2.visible = true;
                impactSphere2.position.set((s.blueX + s.yellowX) / 2, 1.0, (s.blueZ + s.yellowZ) / 2);
                const pulse = Math.sin(animationTime * 8);
                impactSphere2.material.opacity = 0.5 + pulse * 0.25;
                impactSphere2.scale.setScalar(1.2 + pulse * 0.2);
            }
        }

            const bikeWheelRadius = 0.32;
            const carLength = 3.2;
            const carWidth = 1.4;
            const bikeLength = 1.2;
            const bikeWidth = 0.5;
            
            if (s.phase === 'approach') {
                // === CAR MOTION: Smooth approach then circular arc turn ===
                if (!s.isTurning) {
                    // Straight approach - slight deceleration before turn
                    if (s.carX > turnStartX - 3) {
                        // Decelerate as approaching turn
                        s.carSpeed = s.carBaseSpeed * (0.7 + 0.3 * (turnStartX - s.carX) / 3);
                    }
                    s.carX += s.carSpeed * dt;
                    
                    // Start turning when reaching turn point
                    if (s.carX >= turnStartX) {
                        s.isTurning = true;
                        s.turnAngle = 0;
                    }
                } else {
                    // Circular arc turn - smooth and continuous
                    // Gradually accelerate through turn
                    const turnProgress = s.turnAngle / (Math.PI / 2.5);
                    s.carSpeed = s.carBaseSpeed * (0.5 + 0.3 * smoothstep(turnProgress));
                    
                    // Angular velocity based on speed and radius
                    const angularVel = s.carSpeed / turnArcRadius;
                    s.turnAngle += angularVel * dt;
                    s.turnAngle = Math.min(s.turnAngle, Math.PI / 2);
                    
                    // Position on arc
                    s.carX = turnArcCenterX + Math.sin(s.turnAngle) * turnArcRadius;
                    s.carZ = turnArcCenterZ + Math.cos(s.turnAngle) * turnArcRadius;
                    s.carYaw = s.turnAngle; // Car heading follows arc tangent
                }
                
                // === BICYCLE MOTION: Smooth straight path ===
                s.bikeX += s.bikeSpeed * dt;
                s.bikeZ = bikeLaneZ; // Stay in bike lane
                s.bikeY = 0;
                
                // Wheel rotation based on actual speed
                s.wheelSpin += (s.bikeSpeed / bikeWheelRadius) * dt;
                
                // Rider attached to bike
                if (s.riderAttached) {
                    s.riderX = s.bikeX - 0.15;
                    s.riderZ = s.bikeZ;
                    s.riderY = 0.45;
                    s.riderRotX = 0.15; // Slight forward lean
                    s.riderRotZ = 0;
                    s.riderRotY = 0;
                }
                
                // === COLLISION DETECTION: Bounding box overlap ===
                // Car front corner position (turning right, so check right-front)
                const carFrontX = s.carX + Math.cos(s.carYaw) * (carLength / 2) - Math.sin(s.carYaw) * (carWidth / 2);
                const carFrontZ = s.carZ + Math.sin(s.carYaw) * (carLength / 2) + Math.cos(s.carYaw) * (carWidth / 2);
                
                // Simple overlap check
                const dx = carFrontX - s.bikeX;
                const dz = carFrontZ - s.bikeZ;
                const dist = Math.sqrt(dx * dx + dz * dz);
                
                // Collision when car front corner is close to bike AND bike is near conflict zone
                const bikeNearConflict = Math.abs(s.bikeX - conflictX) < 2;
                const carInTurn = s.isTurning && s.turnAngle > 0.2;
                
                if (dist < 1.8 && bikeNearConflict && carInTurn) {
                    s.phase = 'collision';
                    s.collided = true;
                    s.collisionTime = sceneTime;
                    s.impactX = (carFrontX + s.bikeX) / 2;
                    s.impactZ = (carFrontZ + s.bikeZ) / 2;
                    
                    // Calculate impact direction (car pushing bike forward-right)
                    const impactAngle = Math.atan2(dz, dx) + Math.PI;
                    const impactForce = s.carSpeed * 0.8;
                    
                    // Bike velocity from impact
                    s.bikeVx = s.bikeSpeed + impactForce * Math.cos(impactAngle) * 0.6;
                    s.bikeVz = impactForce * Math.sin(impactAngle) * 0.8;
                    s.bikeVy = 1.2; // Slight lift
                    
                    // Bike rotational velocities
                    s.bikePitchV = 3.5;  // Pitch forward
                    s.bikeRollV = 2.5;   // Roll to the side
                    s.bikeYawV = 1.5;    // Slight yaw
                    
                    // Rider detaches and gets thrown
                    s.riderAttached = false;
                    s.riderVx = s.bikeSpeed + impactForce * 0.9;
                    s.riderVz = impactForce * Math.sin(impactAngle) * 0.5;
                    s.riderVy = 2.5; // Thrown up
                    s.riderRotVx = 4;  // Tumbling rotation
                    s.riderRotVz = 2;
                    
                    triggerCameraShake(0.5);
                }
            } else if (s.phase === 'collision') {
                const timeSinceCollision = sceneTime - s.collisionTime;
                const friction = 0.97;  // Velocity damping
                const rotFriction = 0.94; // Rotation damping
                const gravity = 12;
                
                // === CAR: Continues slowly then stops ===
                if (s.carSpeed > 0.5) {
                    s.turnAngle += (s.carSpeed / turnArcRadius) * 0.3 * dt;
                    s.carX = turnArcCenterX + Math.sin(s.turnAngle) * turnArcRadius;
                    s.carZ = turnArcCenterZ + Math.cos(s.turnAngle) * turnArcRadius;
                    s.carYaw = s.turnAngle;
                    s.carSpeed *= 0.92;
                }
                
                // === BIKE: Physics with damping ===
                s.bikeX += s.bikeVx * dt;
                s.bikeZ += s.bikeVz * dt;
                s.bikeY += s.bikeVy * dt;
                s.bikeVy -= gravity * dt;
                
                // Ground collision for bike
                if (s.bikeY < 0.2) {
                    s.bikeY = 0.2;
                    if (s.bikeVy < -0.5) {
                        s.bikeVy = -s.bikeVy * 0.2; // Small bounce
                    } else {
                        s.bikeVy = 0;
                    }
                    // Extra friction on ground
                    s.bikeVx *= 0.85;
                    s.bikeVz *= 0.85;
                    s.bikePitchV *= 0.8;
                    s.bikeRollV *= 0.8;
                }
                
                // Apply velocity damping
                s.bikeVx *= friction;
                s.bikeVz *= friction;
                
                // Bike rotation with damping
                s.bikePitch += s.bikePitchV * dt;
                s.bikeRoll += s.bikeRollV * dt;
                s.bikeYaw += s.bikeYawV * dt;
                s.bikePitchV *= rotFriction;
                s.bikeRollV *= rotFriction;
                s.bikeYawV *= rotFriction;
                
                // Wheels keep spinning but slow down
                s.wheelSpin += (Math.abs(s.bikeVx) / bikeWheelRadius) * dt;
                
                // === RIDER: Ragdoll physics with damping ===
                s.riderX += s.riderVx * dt;
                s.riderZ += s.riderVz * dt;
                s.riderY += s.riderVy * dt;
                s.riderVy -= gravity * 0.9 * dt;
                
                // Ground collision for rider
                if (s.riderY < 0.2) {
                    s.riderY = 0.2;
                    s.riderVy = 0;
                    // Strong friction when hitting ground
                    s.riderVx *= 0.7;
                    s.riderVz *= 0.7;
                    s.riderRotVx *= 0.6;
                    s.riderRotVz *= 0.6;
                }
                
                // Apply velocity damping
                s.riderVx *= friction;
                s.riderVz *= friction;
                
                // Rider rotation (tumbling)
                s.riderRotX += s.riderRotVx * dt;
                s.riderRotZ += s.riderRotVz * dt;
                s.riderRotVx *= rotFriction;
                s.riderRotVz *= rotFriction;
                
                // Transition to aftermath when things settle
                if (timeSinceCollision > 1.2) {
                    s.phase = 'aftermath';
                }
            } else {
                // === AFTERMATH: Smooth settling with strong damping ===
                const settleFriction = 0.88;
                const settleRotFriction = 0.90;
                
                // Bike settling
                s.bikeX += s.bikeVx * dt;
                s.bikeZ += s.bikeVz * dt;
                s.bikeVx *= settleFriction;
                s.bikeVz *= settleFriction;
                
                // Bike settles to ground
                if (s.bikeY > 0.15) {
                    s.bikeY -= dt * 0.8;
                } else {
                    s.bikeY = 0.15;
                }
                
                // Rotation settles
                s.bikePitch += s.bikePitchV * dt;
                s.bikeRoll += s.bikeRollV * dt;
                s.bikePitchV *= settleRotFriction;
                s.bikeRollV *= settleRotFriction;
                
                // Stop tiny movements
                if (Math.abs(s.bikeVx) < 0.05) s.bikeVx = 0;
                if (Math.abs(s.bikeVz) < 0.05) s.bikeVz = 0;
                if (Math.abs(s.bikePitchV) < 0.05) s.bikePitchV = 0;
                if (Math.abs(s.bikeRollV) < 0.05) s.bikeRollV = 0;
                
                // Rider settling
                s.riderX += s.riderVx * dt;
                s.riderZ += s.riderVz * dt;
                s.riderVx *= settleFriction;
                s.riderVz *= settleFriction;
                
                if (s.riderY > 0.15) {
                    s.riderY -= dt * 0.5;
                } else {
                    s.riderY = 0.15;
                }
                
                s.riderRotX += s.riderRotVx * dt;
                s.riderRotZ += s.riderRotVz * dt;
                s.riderRotVx *= settleRotFriction;
                s.riderRotVz *= settleRotFriction;
                
                if (Math.abs(s.riderVx) < 0.05) s.riderVx = 0;
                if (Math.abs(s.riderVz) < 0.05) s.riderVz = 0;
            }
            
            // === APPLY TRANSFORMS ===
            whiteCar.position.set(s.carX, 0, s.carZ);
            whiteCar.rotation.y = s.carYaw;
            
            bicycle.position.set(s.bikeX, s.bikeY, s.bikeZ);
            bicycle.rotation.set(s.bikePitch, s.bikeYaw, s.bikeRoll);
            
            // Rotate wheels
            if (bicycle.userData.wheels) {
                bicycle.userData.wheels.forEach(wheel => {
                    wheel.rotation.z = s.wheelSpin;
                });
            }
            
            cyclist.position.set(s.riderX, s.riderY, s.riderZ);
            cyclist.rotation.set(s.riderRotX, s.riderRotY, s.riderRotZ);
            
            // Impact sphere at collision point
            if (s.collided) {
                impactSphere3.visible = true;
                impactSphere3.position.set(s.impactX, 1.0, s.impactZ);
                const pulse = Math.sin(animationTime * 8);
                impactSphere3.material.opacity = 0.4 + pulse * 0.2;
                impactSphere3.scale.setScalar(1.0 + pulse * 0.15);
            }
        }

        // ============ MAIN ANIMATION LOOP ============
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            if (lastTime === 0) lastTime = currentTime;
            const dt = Math.min((currentTime - lastTime) / 1000, 0.05);
            lastTime = currentTime;
            
            animationTime += dt;
            
            const cycleTime = animationTime % cycleDuration;
            const normalizedTime = cycleTime / cycleDuration;
            
            timerBar.style.width = (normalizedTime * 100) + '%';
            
            cameraAngle += dt * 0.025;
            updateCameraShake(dt);
            
            camera.position.x = Math.cos(cameraAngle) * cameraRadius + cameraShake.x;
            camera.position.z = Math.sin(cameraAngle) * cameraRadius + cameraShake.y;
            camera.position.y = cameraHeight;
            camera.lookAt(cameraShake.x * 0.5, 0, cameraShake.y * 0.5);
            
            hideAll();
            
            // ============ SCENE 1: Vehicle-Pedestrian (from file 2 - keyframe style) ============
            if (cycleTime < sceneDuration) {
                const sceneTime = cycleTime / sceneDuration;
                
                labelElement.className = 'crash-label fatal';
                labelText.textContent = 'Vehicle-Pedestrian Crash';
                
                redCar.visible = true;
                pedestrian.visible = true;
                
                // Northbound lane (west side of road for US right-hand traffic)
                const sbLaneCenter = -laneWidth * 1.5;
                
                if (sceneTime < 0.5) {
                    const t = easeInOutQuad(sceneTime / 0.5);
                    
                    // Pedestrian walks east to west across south crosswalk
                    pedestrian.position.set(roadWidth/2 - t * (roadWidth/2 - sbLaneCenter), 0.3, -cwOffset);
                    pedestrian.rotation.y = -Math.PI / 2;  // Facing west
                    pedestrian.rotation.x = 0;
                    pedestrian.rotation.z = 0;
                    
                    // Car approaches southbound in correct lane
                    redCar.position.set(sbLaneCenter, 0, -28 + t * 16);
                    redCar.rotation.y = -Math.PI / 2;  // Facing south (+Z)
                    
                } else if (sceneTime < 0.6) {
                    const t = (sceneTime - 0.5) / 0.1;
                    
                    pedestrian.position.set(sbLaneCenter + 1, 0.3 + t * 0.2, -cwOffset);
                    pedestrian.rotation.x = t * Math.PI / 4;
                    
                    redCar.position.set(sbLaneCenter, 0, -cwOffset - 2);
                    redCar.rotation.y = -Math.PI / 2;
                    
                    impactSphere1.visible = true;
                    impactSphere1.position.set(sbLaneCenter, 1.2, -cwOffset);
                    impactSphere1.material.opacity = t * 0.85;
                    impactSphere1.scale.setScalar(0.5 + t * 0.8);
                    
                    if (t > 0.3) triggerCameraShake(0.5);
                    
                } else if (sceneTime < 0.85) {
                    const t = (sceneTime - 0.6) / 0.25;
                    
                    pedestrian.position.set(
                        sbLaneCenter + 1 - t * 2.5,
                        Math.max(0.1, 0.5 - t * 0.4),
                        -cwOffset + t * 2
                    );
                    pedestrian.rotation.x = Math.PI / 4 + t * Math.PI / 2;
                    pedestrian.rotation.z = -t * 0.4;
                    
                    redCar.position.set(sbLaneCenter, 0, -cwOffset - 1.5);
                    
                    impactSphere1.visible = true;
                    impactSphere1.material.opacity = 0.85 - t * 0.3;
                    impactSphere1.scale.setScalar(1.3 + Math.sin(animationTime * 10) * 0.15);
                    
                } else {
                    pedestrian.position.set(sbLaneCenter - 1.5, 0.1, -cwOffset + 2);
                    pedestrian.rotation.x = Math.PI * 0.75;
                    pedestrian.rotation.z = -0.4;
                    
                    redCar.position.set(sbLaneCenter, 0, -cwOffset - 1.5);
                    redCar.rotation.y = -Math.PI / 2;
                    
                    impactSphere1.visible = true;
                    const pulse = Math.sin(animationTime * 8);
                    impactSphere1.material.opacity = 0.5 + pulse * 0.25;
                    impactSphere1.scale.setScalar(1.3 + pulse * 0.2);
                }
                
            // ============ SCENE 2: Vehicle-Vehicle (physics-based from file 1) ============
            } else if (cycleTime < sceneDuration * 2) {
                labelElement.className = 'crash-label serious';
                labelText.textContent = 'Vehicle-Vehicle Crash';
                updateScene2(dt, cycleTime - sceneDuration);
                
            // ============ SCENE 3: Vehicle-Bicycle (improved) ============
            } else {
                labelElement.className = 'crash-label minor';
                labelText.textContent = 'Vehicle-Bicycle Crash';
                updateScene3(dt, cycleTime - sceneDuration * 2);
            }
            
            // ============ SIGNAL PHASE CYCLING ============
            const currentPhaseDuration = phaseTiming[phaseSequence[signalPhaseIndex]];
            if (currentTime - signalPhaseStartTime > currentPhaseDuration) {
                signalPhaseStartTime = currentTime;
                signalPhaseIndex = (signalPhaseIndex + 1) % phaseSequence.length;
                updateSignals(phaseSequence[signalPhaseIndex]);
            }
            
            // ============ PIN ANIMATIONS ============
            const elapsedMs = animationTime * 1000;
            pins.forEach((pin, i) => {
                if (elapsedMs > pin.userData.delay) {
                    const pinElapsed = elapsedMs - pin.userData.delay;
                    const dropDuration = 800; // ms
                    
                    if (pinElapsed < dropDuration) {
                        // Drop animation with bounce
                        const t = pinElapsed / dropDuration;
                        pin.position.y = 20 - 20 * easeOutBounce(t);
                    } else {
                        // Gentle floating/pulsing after landing
                        const floatTime = (pinElapsed - dropDuration) / 1000;
                        const pulseSpeed = 1.5 + (i % 3) * 0.3;
                        pin.position.y = pin.userData.baseY + Math.sin(floatTime * pulseSpeed) * 0.08;
                        
                        // Pulse the ring
                        const ring = pin.children[2];
                        if (ring) {
                            ring.material.opacity = 0.4 + Math.sin(floatTime * pulseSpeed) * 0.2;
                            ring.scale.setScalar(1 + Math.sin(floatTime * pulseSpeed) * 0.15);
                        }
                        
                        // Subtle glow pulse on head
                        const head = pin.children[0];
                        if (head) {
                            head.material.emissiveIntensity = 0.4 + Math.sin(floatTime * pulseSpeed) * 0.2;
                        }
                    }
                }
            });
            
            renderer.render(scene, camera);
        }

        // ============ RESIZE HANDLER ============
        function onResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            const aspect = width / height;
            
            camera.left = frustumSize * aspect / -2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = frustumSize / -2;
            camera.updateProjectionMatrix();
            
            renderer.setSize(width, height);
        }

        window.addEventListener('resize', onResize);
        
        // Initialize signals and scene states
        resetScene2();
        resetScene3();
        updateSignals(phaseSequence[0]);
        signalPhaseStartTime = performance.now();
        animate(0);
    </script>
</body>
