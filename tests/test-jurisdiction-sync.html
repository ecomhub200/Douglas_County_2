<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jurisdiction Sync Fix Tests</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:20px;background:#f8f9fa}
h1{margin-bottom:8px}
.subtitle{color:#666;margin-bottom:20px}
.suite{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:16px;margin-bottom:16px}
.suite h2{font-size:16px;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:6px}

.fail{background:#f8d7da;color:#721c24}

.detail{font-size:12px;color:#888;margin-left:8px}

.bug b{display:block;margin-bottom:4px}
</style>

<body>
<h1>Jurisdiction Sync Fix — Automated Tests</h1>
<p class="subtitle">Tests for branch: claude/fix-hardcoded-jurisdictions-lrPjb</p>

<div id="results"></div>
<div id="summary"></div>
<div id="bugs"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// MOCK SETUP — Replicate the relevant parts of the application
// ═══════════════════════════════════════════════════════════════

// Mock appConfig (minimal subset of config.json)
const appConfig = {
    defaultState: 'colorado',
    states: {
        virginia: {
            fips: '51', name: 'Virginia', abbreviation: 'VA',
            r2Prefix: 'virginia', defaultJurisdiction: 'henrico'
        },
        colorado: {
            fips: '08', name: 'Colorado', abbreviation: 'CO',
            r2Prefix: 'colorado', defaultJurisdiction: 'douglas'
        },
        new_york: {
            fips: '36', name: 'New York', abbreviation: 'NY',
            r2Prefix: 'new_york', defaultJurisdiction: null
        }
    },
    jurisdictions: {
        henrico: {
            name: 'Henrico County', type: 'county', fips: '087',
            state: 'VA', bbox: [-77.68, 37.49, -77.25, 37.68],
            mapCenter: [37.55, -77.40], mapZoom: 11
        },
        fairfax_county: {
            name: 'Fairfax County', type: 'county', fips: '059',
            state: 'VA', bbox: [-77.51, 38.59, -77.09, 38.97],
            mapCenter: [38.85, -77.28], mapZoom: 11
        },
        douglas: {
            name: 'Douglas County', type: 'county', fips: '035',
            state: 'CO', bbox: [-105.10, 39.13, -104.63, 39.39],
            mapCenter: [39.29, -104.80], mapZoom: 10
        },
        co_adams: {
            name: 'Adams County', type: 'county', fips: '001',
            state: 'CO', bbox: [-105.05, 39.74, -104.46, 40.00],
            mapCenter: [39.87, -104.76], mapZoom: 10
        },
        // Edge case: jurisdiction with no state tag
        mystery_county: {
            name: 'Mystery County', type: 'county', fips: '999',
            bbox: [-80.0, 35.0, -79.0, 36.0],
            mapCenter: [35.5, -79.5], mapZoom: 10
        },
        // Edge case: jurisdiction with no bbox/mapCenter (TI should skip it)
        incomplete_county: {
            name: 'Incomplete County', type: 'county', fips: '000',
            state: 'VA'
        }
    }
};

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: _abbrToStateKey
// ═══════════════════════════════════════════════════════════════
function _abbrToStateKey(abbr) {
    if (!abbr || !appConfig?.states) return null;
    for (const [key, st] of Object.entries(appConfig.states)) {
        if (st.abbreviation === abbr) return key;
    }
    return null;
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: sendAllJurisdictionsToTrafficInventory (logic only)
// ═══════════════════════════════════════════════════════════════
function buildTIJurisdictions(fallbackStateKey) {
    const allJuris = {};
    Object.entries(appConfig.jurisdictions).forEach(([key, j]) => {
        if (!j.bbox || !j.mapCenter) return; // TI requires these
        const jurStateKey = (j.state && _abbrToStateKey(j.state)) || fallbackStateKey;
        const r2Prefix = appConfig?.states?.[jurStateKey]?.r2Prefix || jurStateKey;
        allJuris[key] = {
            name: j.name || key,
            type: j.type || 'county',
            fips: j.fips || '',
            bbox: j.bbox,
            mapCenter: j.mapCenter,
            mapZoom: j.mapZoom || 10,
            state: r2Prefix,
            folder: key
        };
    });
    return allJuris;
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: sendAllJurisdictionsToInventoryManager (logic only)
// ═══════════════════════════════════════════════════════════════
function buildIMJurisdictions(fallbackStateKey) {
    const allJuris = {};
    Object.entries(appConfig.jurisdictions).forEach(([key, j]) => {
        const jurStateKey = (j.state && _abbrToStateKey(j.state)) || fallbackStateKey;
        const r2Prefix = appConfig?.states?.[jurStateKey]?.r2Prefix || jurStateKey;
        allJuris[key] = {
            name: j.name || key,
            type: j.type || 'county',
            fips: j.fips || '',
            state: r2Prefix,
            folder: key
        };
    });
    return allJuris;
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: syncJurisdictionToInventoryManager message building
// ═══════════════════════════════════════════════════════════════
function buildIMSyncMessage(stateKey, jurisdictionKey) {
    const r2Prefix = appConfig?.states?.[stateKey]?.r2Prefix || stateKey;
    return {
        type: 'im-set-jurisdiction',
        state: r2Prefix,
        jurisdictionKey: jurisdictionKey
    };
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: IM populateJurisdictions + updateCountyDropdown (logic only)
// ═══════════════════════════════════════════════════════════════
function simulateIMPopulate(juris) {
    const states = new Set();
    Object.values(juris).forEach(j => { if (j.state) states.add(j.state); });
    return { stateOptions: [...states] };
}

function simulateIMFilter(juris, state) {
    return Object.entries(juris)
        .filter(([, j]) => j.state === state)
        .map(([key]) => key);
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: IM loadCfg embedded detection
// ═══════════════════════════════════════════════════════════════
function simulateLoadCfg(localStorageData, isEmbedded) {
    const result = { pub: null, state: null, county: null };
    try {
        const c = localStorageData || {};
        if (c.pub) result.pub = c.pub;
        // Embedded detection
        if (!isEmbedded) {
            if (c.state) result.state = c.state;
            if (c.county) result.county = c.county;
        }
    } catch (e) {}
    return result;
}

// ═══════════════════════════════════════════════════════════════
// FUNCTION UNDER TEST: AD sendConfigToAssetDeficiency (logic only)
// ═══════════════════════════════════════════════════════════════
function buildADConfig(stateKey, jurisdictionId, r2BaseUrl) {
    const jurisdictionConfig = appConfig?.jurisdictions?.[jurisdictionId];
    const stateConfig = appConfig?.states?.[stateKey];
    const r2Prefix = stateConfig?.r2Prefix || stateKey;
    const r2Path = r2Prefix + '/' + jurisdictionId;
    return {
        type: 'ad-config',
        config: {
            fips: jurisdictionConfig?.stateCountyFips || jurisdictionConfig?.fips || '',
            bbox: jurisdictionConfig?.bbox || null,
            mapCenter: jurisdictionConfig?.mapCenter || null,
            mapZoom: jurisdictionConfig?.mapZoom || 10,
            jurisdictionName: jurisdictionConfig?.name || jurisdictionId,
            state: stateKey,
            r2BaseUrl: r2BaseUrl,
            r2Path: r2Path
        }
    };
}

// ═══════════════════════════════════════════════════════════════
// TEST FRAMEWORK
// ═══════════════════════════════════════════════════════════════
let totalTests = 0, passed = 0, failed = 0, skipped = 0;
const results = [];
const bugs = [];

function assert(condition, testName, detail) {
    totalTests++;
    if (condition) {
        passed++;
        results.push({ name: testName, status: 'pass', detail });
    } else {
        failed++;
        results.push({ name: testName, status: 'fail', detail });
    }
}

function assertEq(actual, expected, testName) {
    const pass = JSON.stringify(actual) === JSON.stringify(expected);
    assert(pass, testName, pass ? '' : `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    return pass;
}

function skip(testName, reason) {
    totalTests++;
    skipped++;
    results.push({ name: testName, status: 'skip', detail: reason });
}

function reportBug(severity, title, description, file, line) {
    bugs.push({ severity, title, description, file, line });
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 1: _abbrToStateKey
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── _abbrToStateKey ──', status: 'suite' });

assertEq(_abbrToStateKey('VA'), 'virginia', '_abbrToStateKey("VA") → "virginia"');
assertEq(_abbrToStateKey('CO'), 'colorado', '_abbrToStateKey("CO") → "colorado"');
assertEq(_abbrToStateKey('NY'), 'new_york', '_abbrToStateKey("NY") → "new_york"');
assertEq(_abbrToStateKey(null), null, '_abbrToStateKey(null) → null');
assertEq(_abbrToStateKey(''), null, '_abbrToStateKey("") → null');
assertEq(_abbrToStateKey('XX'), null, '_abbrToStateKey("XX") → null (unknown abbr)');
assertEq(_abbrToStateKey('va'), null, '_abbrToStateKey("va") → null (lowercase not matched)');

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 2: TI jurisdiction building — R2 prefix per jurisdiction
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── TI jurisdiction building ──', status: 'suite' });

{
    const tiJuris = buildTIJurisdictions('colorado');

    // Virginia jurisdictions should have state = "virginia" (r2Prefix)
    assertEq(tiJuris.henrico?.state, 'virginia',
        'TI: henrico.state = "virginia" (r2Prefix, not active state key)');
    assertEq(tiJuris.fairfax_county?.state, 'virginia',
        'TI: fairfax_county.state = "virginia"');

    // Colorado jurisdictions should have state = "colorado" (r2Prefix)
    assertEq(tiJuris.douglas?.state, 'colorado',
        'TI: douglas.state = "colorado"');
    assertEq(tiJuris.co_adams?.state, 'colorado',
        'TI: co_adams.state = "colorado"');

    // Jurisdiction with no state tag should fall back to active state
    assertEq(tiJuris.mystery_county?.state, 'colorado',
        'TI: mystery_county.state = fallback "colorado" (no state tag)');

    // Incomplete county (no bbox/mapCenter) should be excluded from TI
    assert(!tiJuris.incomplete_county,
        'TI: incomplete_county excluded (no bbox/mapCenter)');

    // Folder should be the jurisdiction key
    assertEq(tiJuris.douglas?.folder, 'douglas',
        'TI: douglas.folder = "douglas" (jurisdiction key)');
    assertEq(tiJuris.henrico?.folder, 'henrico',
        'TI: henrico.folder = "henrico"');

    // R2 path correctness: state/folder → "colorado/douglas"
    const douglasR2 = tiJuris.douglas.state + '/' + tiJuris.douglas.folder;
    assertEq(douglasR2, 'colorado/douglas',
        'TI: R2 path for Douglas = "colorado/douglas"');
    const henricoR2 = tiJuris.henrico.state + '/' + tiJuris.henrico.folder;
    assertEq(henricoR2, 'virginia/henrico',
        'TI: R2 path for Henrico = "virginia/henrico"');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 3: IM jurisdiction building
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── IM jurisdiction building ──', status: 'suite' });

{
    const imJuris = buildIMJurisdictions('colorado');

    // VA jurisdictions should get state = "virginia"
    assertEq(imJuris.henrico?.state, 'virginia',
        'IM: henrico.state = "virginia" (r2Prefix)');

    // CO jurisdictions should get state = "colorado"
    assertEq(imJuris.douglas?.state, 'colorado',
        'IM: douglas.state = "colorado"');

    // IM includes ALL jurisdictions (no bbox filter)
    assert(!!imJuris.incomplete_county,
        'IM: incomplete_county included (IM has no bbox filter)');

    // IM incomplete_county with state "VA" should get r2Prefix "virginia"
    assertEq(imJuris.incomplete_county?.state, 'virginia',
        'IM: incomplete_county.state = "virginia" (from VA tag)');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 4: IM populate + filter consistency
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── IM populate + filter consistency ──', status: 'suite' });

{
    const imJuris = buildIMJurisdictions('colorado');
    const populated = simulateIMPopulate(imJuris);

    // State dropdown should show r2Prefix values
    assert(populated.stateOptions.includes('virginia'),
        'IM populate: "virginia" in state dropdown');
    assert(populated.stateOptions.includes('colorado'),
        'IM populate: "colorado" in state dropdown');

    // Filtering by "virginia" should return VA jurisdictions
    const vaJuris = simulateIMFilter(imJuris, 'virginia');
    assert(vaJuris.includes('henrico'), 'IM filter("virginia"): includes henrico');
    assert(vaJuris.includes('fairfax_county'), 'IM filter("virginia"): includes fairfax_county');
    assert(vaJuris.includes('incomplete_county'), 'IM filter("virginia"): includes incomplete_county');
    assert(!vaJuris.includes('douglas'), 'IM filter("virginia"): excludes douglas (CO)');

    // Filtering by "colorado" should return CO jurisdictions
    const coJuris = simulateIMFilter(imJuris, 'colorado');
    assert(coJuris.includes('douglas'), 'IM filter("colorado"): includes douglas');
    assert(coJuris.includes('co_adams'), 'IM filter("colorado"): includes co_adams');
    assert(!coJuris.includes('henrico'), 'IM filter("colorado"): excludes henrico (VA)');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 5: IM sync message uses r2Prefix
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── IM sync message ──', status: 'suite' });

{
    // When active state is "colorado", sync message should use r2Prefix
    const coMsg = buildIMSyncMessage('colorado', 'douglas');
    assertEq(coMsg.state, 'colorado', 'IM sync: colorado → state="colorado"');
    assertEq(coMsg.jurisdictionKey, 'douglas', 'IM sync: jurisdictionKey="douglas"');

    const vaMsg = buildIMSyncMessage('virginia', 'henrico');
    assertEq(vaMsg.state, 'virginia', 'IM sync: virginia → state="virginia"');

    // IM handler sets stSel.value = state, then calls updateCountyDropdown(state)
    // This must match the state values in the jurisdictions list
    const imJuris = buildIMJurisdictions('colorado');
    const coCounties = simulateIMFilter(imJuris, coMsg.state);
    assert(coCounties.includes(coMsg.jurisdictionKey),
        'IM sync: jurisdiction found after filter with sync state');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 6: IM loadCfg embedded detection
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── IM loadCfg embedded detection ──', status: 'suite' });

{
    const staleData = { pub: 'https://r2.example.com', state: 'virginia', county: 'henrico' };

    // When embedded: should load pub URL but NOT state/county
    const embeddedResult = simulateLoadCfg(staleData, true);
    assertEq(embeddedResult.pub, 'https://r2.example.com',
        'loadCfg embedded: pub URL loaded from localStorage');
    assertEq(embeddedResult.state, null,
        'loadCfg embedded: state NOT loaded (waits for parent)');
    assertEq(embeddedResult.county, null,
        'loadCfg embedded: county NOT loaded (waits for parent)');

    // When standalone: should load everything
    const standaloneResult = simulateLoadCfg(staleData, false);
    assertEq(standaloneResult.pub, 'https://r2.example.com',
        'loadCfg standalone: pub URL loaded');
    assertEq(standaloneResult.state, 'virginia',
        'loadCfg standalone: state loaded from localStorage');
    assertEq(standaloneResult.county, 'henrico',
        'loadCfg standalone: county loaded from localStorage');

    // Edge case: no localStorage data
    const emptyResult = simulateLoadCfg({}, true);
    assertEq(emptyResult.pub, null, 'loadCfg embedded empty: pub is null');
    assertEq(emptyResult.state, null, 'loadCfg embedded empty: state is null');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 7: AD config building
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── AD config building ──', status: 'suite' });

{
    const adCfg = buildADConfig('colorado', 'douglas', 'https://r2.example.com');
    assertEq(adCfg.config.r2Path, 'colorado/douglas',
        'AD config: R2 path = "colorado/douglas"');
    assertEq(adCfg.config.jurisdictionName, 'Douglas County',
        'AD config: jurisdictionName = "Douglas County"');
    assertEq(adCfg.config.state, 'colorado',
        'AD config: state = "colorado"');
    assert(adCfg.config.bbox !== null,
        'AD config: bbox is present');
    assert(adCfg.config.mapCenter !== null,
        'AD config: mapCenter is present');

    const adVa = buildADConfig('virginia', 'henrico', 'https://r2.example.com');
    assertEq(adVa.config.r2Path, 'virginia/henrico',
        'AD config VA: R2 path = "virginia/henrico"');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 8: Cross-state consistency — the original bug scenario
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── Cross-state consistency (original bug scenario) ──', status: 'suite' });

{
    // Scenario: User is on Colorado/Douglas, all iframes should show Colorado data
    const activeState = 'colorado';
    const activeJurisdiction = 'douglas';

    const tiJuris = buildTIJurisdictions(activeState);
    const imJuris = buildIMJurisdictions(activeState);
    const imSync = buildIMSyncMessage(activeState, activeJurisdiction);
    const adCfg = buildADConfig(activeState, activeJurisdiction, 'https://r2.example.com');

    // TI: Douglas should have correct R2 path
    assertEq(tiJuris.douglas.state + '/' + tiJuris.douglas.folder, 'colorado/douglas',
        'Scenario CO: TI R2 path = "colorado/douglas"');

    // IM: Sync message should point to Colorado
    assertEq(imSync.state, 'colorado',
        'Scenario CO: IM sync state = "colorado"');

    // IM: After receiving sync, filtering by sync state should find douglas
    const filtered = simulateIMFilter(imJuris, imSync.state);
    assert(filtered.includes('douglas'),
        'Scenario CO: IM county dropdown includes "douglas" after sync');

    // AD: R2 path should be Colorado
    assertEq(adCfg.config.r2Path, 'colorado/douglas',
        'Scenario CO: AD R2 path = "colorado/douglas"');

    // CRITICAL: VA jurisdictions in the same list should NOT have Colorado r2Prefix
    assertEq(tiJuris.henrico.state, 'virginia',
        'Scenario CO: henrico still has state="virginia" (not "colorado")');
    assertEq(imJuris.henrico.state, 'virginia',
        'Scenario CO: IM henrico still has state="virginia"');
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 9: Map default coordinates
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── Map default coordinates ──', status: 'suite' });

{
    // Traffic Inventory: should use US center [39.0, -98.0] zoom 4, not Henrico
    // (We check the actual code was changed — this is a static code assertion)
    // The diff shows: setView([39.0,-98.0],4)
    assert(true, 'TI initMap: setView([39.0, -98.0], 4) — US center (verified in diff)');

    // Asset Deficiency: still hardcoded to [37.56, -77.46] zoom 11 — BUG!
    reportBug('medium',
        'Asset Deficiency initMap still hardcoded to Henrico coordinates',
        'asset-deficiency.html line 331: map.setView([37.56,-77.46],11) should be setView([39.0,-98.0],4) like TI',
        'app/asset-deficiency.html', 331);
    // Note: AD does get recentered when data loads (fitBounds), but initial view is wrong
    results.push({ name: 'BUG: AD initMap hardcoded to Henrico [37.56,-77.46]', status: 'fail',
        detail: 'Should use US center like TI, or recenter on ad-config receipt' });
    failed++; totalTests++;

    // Inventory Manager: still hardcoded to [37.55, -77.40] zoom 11 — BUG!
    reportBug('medium',
        'Inventory Manager initMap still hardcoded to Henrico coordinates',
        'inventory-manager.html line 701: map.setView([37.55,-77.40],11) should be setView([39.0,-98.0],4) like TI',
        'app/inventory-manager.html', 701);
    results.push({ name: 'BUG: IM initMap hardcoded to Henrico [37.55,-77.40]', status: 'fail',
        detail: 'Should use US center like TI, or recenter on im-set-jurisdiction receipt' });
    failed++; totalTests++;
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 10: AD map recentering on config receipt
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── AD map recentering on config receipt ──', status: 'suite' });

{
    // The ad-config handler in asset-deficiency.html does NOT recenter the map
    // when it receives new jurisdiction config (bbox, mapCenter).
    // It only sets FIPS and R2 URLs. The map stays at the hardcoded position
    // until crash data triggers fitBounds.
    reportBug('low',
        'Asset Deficiency does not recenter map on ad-config receipt',
        'When ad-config is received with mapCenter/bbox, the map should recenter. Currently it stays at the default position until analysis runs.',
        'app/asset-deficiency.html', 1176);
    results.push({ name: 'BUG: AD does not recenter map on ad-config receipt', status: 'fail',
        detail: 'Map stays at default coords until crash data loads and fitBounds runs' });
    failed++; totalTests++;
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 11: Edge case — _abbrToStateKey is case-sensitive
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── Edge cases ──', status: 'suite' });

{
    // config.json jurisdictions use uppercase abbreviations (VA, CO)
    // but what if a jurisdiction has lowercase?
    assertEq(_abbrToStateKey('va'), null,
        'Edge: _abbrToStateKey("va") returns null — case sensitive');
    // This is technically correct behavior since config uses uppercase,
    // but worth noting the fragility

    // What happens when mystery_county (no state tag) gets sent to IM?
    const imJuris = buildIMJurisdictions('colorado');
    assertEq(imJuris.mystery_county?.state, 'colorado',
        'Edge: no-state jurisdiction uses fallback active state for r2Prefix');

    // What if fallback state key is invalid?
    const badJuris = buildIMJurisdictions('nonexistent_state');
    assertEq(badJuris.mystery_county?.state, 'nonexistent_state',
        'Edge: invalid fallback state key passed through as-is');
    // This is acceptable — falls back gracefully
}

// ═══════════════════════════════════════════════════════════════
// TEST SUITE 12: Ordering — sendAllJurisdictions must be called BEFORE syncJurisdiction
// ═══════════════════════════════════════════════════════════════
results.push({ name: '── Call ordering in saveJurisdictionSelection ──', status: 'suite' });

{
    // In saveJurisdictionSelection, the order is:
    // 1. sendAllJurisdictionsToTrafficInventory()  ← populates dropdown
    // 2. syncJurisdictionToTrafficInventory()       ← selects item in dropdown
    // If order is reversed, the dropdown won't have the jurisdiction yet.
    // Our diff shows the correct order. Verify by code review.
    assert(true, 'TI: sendAllJurisdictions called BEFORE syncJurisdiction (verified in diff)');

    // AD: sendConfig called BEFORE sendCrashData
    // Config sets up R2 URLs, crash data triggers analysis
    assert(true, 'AD: sendConfig called BEFORE sendCrashData (verified in diff)');
}

const resultsDiv = document.getElementById('results');

let suiteDiv = null;

results.forEach(r => {
