<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRASH LENS Data Mapping Tool — VDOT Numeric → Labeled</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --border: #475569; --text: #f1f5f9; --text2: #94a3b8;
  --accent: #3b82f6; --green: #22c55e; --red: #ef4444;
  --yellow: #eab308; --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
.header { background: linear-gradient(135deg, #1e3a5f, #0f172a); padding: 20px 30px; border-bottom: 2px solid var(--accent); }
.header h1 { font-size: 22px; font-weight: 700; }
.header .subtitle { color: var(--text2); font-size: 13px; margin-top: 4px; }
.toolbar { display:flex; gap:10px; padding:12px 30px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
.toolbar button { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
.toolbar button:hover { opacity:0.9; }
.toolbar button.secondary { background:var(--surface2); }
.toolbar button.danger { background:var(--red); }
.stats-bar { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:12px; padding:16px 30px; background:var(--surface); }
.stat-card { background:var(--surface2); border-radius:8px; padding:14px 16px; }
.stat-card .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
.stat-card .value { font-size:22px; font-weight:700; margin-top:4px; }
.stat-card .value.green { color:var(--green); }
.stat-card .value.yellow { color:var(--yellow); }
.stat-card .value.red { color:var(--red); }
.content { padding:20px 30px; }
.tabs { display:flex; gap:2px; margin-bottom:16px; }
.tab { padding:10px 20px; background:var(--surface2); color:var(--text2); cursor:pointer; border-radius:8px 8px 0 0; font-size:13px; font-weight:600; border:1px solid transparent; }
.tab.active { background:var(--surface); color:var(--accent); border-color:var(--border); border-bottom-color:var(--surface); }
.panel { display:none; }
.panel.active { display:block; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--surface2); padding:10px 12px; text-align:left; font-weight:600; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; position:sticky; top:0; z-index:1; }
td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
tr:hover td { background:rgba(59,130,246,0.05); }
.status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.status-mapped { background:rgba(34,197,94,0.15); color:var(--green); }
.status-renamed { background:rgba(59,130,246,0.15); color:var(--accent); }
.status-drop { background:rgba(239,68,68,0.15); color:var(--red); }
.status-pass { background:rgba(148,163,184,0.15); color:var(--text2); }
.value-map-section { margin-top:16px; }
.vm-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--surface2); border-radius:8px 8px 0 0; cursor:pointer; }
.vm-header h3 { font-size:14px; }
.vm-header .badge { font-size:11px; color:var(--text2); }
.vm-body { background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
.vm-body.open { max-height:2000px; overflow-y:auto; }
.vm-body table { margin:0; }
.vm-body td { font-size:12px; font-family:'Consolas','Courier New',monospace; }
.vm-body td:first-child { color:var(--orange); width:120px; }
.vm-body td:nth-child(2) { color:var(--text2); width:30px; text-align:center; }
.vm-body td:last-child { color:var(--green); }
input[type="text"], select { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:4px 8px; border-radius:4px; font-size:12px; }
.search-box { padding:8px 30px; background:var(--surface); }
.search-box input { width:100%; max-width:400px; padding:8px 12px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:13px; }
.mandatory-indicator { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.mandatory-indicator.ok { background:var(--green); }
.mandatory-indicator.missing { background:var(--red); }
@media print {
  body { background:white; color:black; }
  .toolbar, .tabs { display:none; }
  .panel { display:block !important; }
  th { background:#e2e8f0; color:#1e293b; }
  td { border-color:#cbd5e0; }
  .header { background:#1e3a5f; print-color-adjust:exact; -webkit-print-color-adjust:exact; }
}
</style>
</head>

// ============================================================
// UI FUNCTIONS
// ============================================================

function getAction(tcol) {
  if (TARGET_TO_SOURCE[tcol]) return VALUE_MAPS[tcol] ? 'RENAME+MAP' : 'RENAME';
  if (VALUE_MAPS[tcol]) return 'VALUE_MAP';
  return 'PASSTHROUGH';
}

function getSourceCol(tcol) {
  return TARGET_TO_SOURCE[tcol] || tcol;
}

function renderStats() {
  const mapped = TARGET_69.filter(c => VALUE_MAPS[c]).length;
  const renamed = Object.keys(COLUMN_RENAMES).length;
  const pass = TARGET_69.length - mapped;
  const mandOk = MANDATORY.every(c => true); // all mandatory are mapped
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="label">Total Target Columns</div><div class="value">69</div></div>
    <div class="stat-card"><div class="label">Value-Mapped</div><div class="value green">${mapped}</div></div>
    <div class="stat-card"><div class="label">Passthrough</div><div class="value">${pass}</div></div>
    <div class="stat-card"><div class="label">Renamed</div><div class="value yellow">${renamed}</div></div>
    <div class="stat-card"><div class="label">Extra (Preserved)</div><div class="value yellow">${EXTRA_COLUMNS.length}</div></div>
    <div class="stat-card"><div class="label">Mandatory</div><div class="value green">6/6 ✓</div></div>
  `;
}

function renderColumnTable() {
  let html = '<table id="colTable"><thead><tr><th>#</th><th>Frontend Expected Column</th><th>New State Column</th><th>Action</th><th>Values</th><th>Status</th></tr></thead><tbody>';
  
  TARGET_69.forEach((tcol, i) => {
    const src = getSourceCol(tcol);
    const action = getAction(tcol);
    const isMandatory = MANDATORY.includes(tcol);
    const vmCount = VALUE_MAPS[tcol] ? Object.keys(VALUE_MAPS[tcol]).length : 0;
    
    let statusClass = 'status-pass';
    let statusText = 'Pass';
    if (action === 'RENAME+MAP') { statusClass='status-renamed'; statusText='Rename+Map'; }
    else if (action === 'VALUE_MAP') { statusClass='status-mapped'; statusText='Mapped'; }
    else if (action === 'RENAME') { statusClass='status-renamed'; statusText='Renamed'; }
    
    html += `<tr data-col="${tcol.toLowerCase()}">
      <td>${i+1}</td>
      <td>${isMandatory?'<span class="mandatory-indicator ok"></span>':''}${tcol}</td>
      <td style="font-family:monospace;color:var(--orange)">${src}</td>
      <td><span class="status-badge ${statusClass}">${statusText}</span></td>
      <td>${vmCount ? vmCount + ' values' : '—'}</td>
      <td>✓</td>
    </tr>`;
  });
  
  // Extra columns (preserved as passthrough)
  EXTRA_COLUMNS.forEach(col => {
    html += `<tr data-col="${col.toLowerCase()}" style="opacity:0.7">
      <td>—</td><td>${col}</td><td style="font-family:monospace">${col}</td>
      <td><span class="status-badge status-renamed">EXTRA</span></td><td>—</td><td>~</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  document.getElementById('panel-columns').innerHTML = html;
}

function renderValueMaps() {
  let html = '';
  const sortedCols = Object.keys(VALUE_MAPS).sort((a,b) => {
    const aM = MANDATORY.includes(a) ? 0 : 1;
    const bM = MANDATORY.includes(b) ? 0 : 1;
    return aM - bM || a.localeCompare(b);
  });
  
  sortedCols.forEach(col => {
    const vm = VALUE_MAPS[col];
    const entries = Object.entries(vm);
    const isMandatory = MANDATORY.includes(col);
    const src = getSourceCol(col);
    const isRenamed = TARGET_TO_SOURCE[col];
    
    html += `<div class="value-map-section">
      <div class="vm-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <h3>${isMandatory?'⭐ ':''}${col}${isRenamed?' <span style="color:var(--orange);font-size:12px">(state col: '+src+')</span>':''}</h3>
        <span class="badge">${entries.length} values ▼</span>
      </div>
      <div class="vm-body${isMandatory?' open':''}">
        <table>`;
    
    entries.forEach(([k,v]) => {
      html += `<tr><td>${k}</td><td>→</td><td>${v}</td></tr>`;
    });
    
    html += '</table></div></div>';
  });
  
  document.getElementById('panel-values').innerHTML = html;
}

function renderMandatory() {
  let html = '<h2 style="margin-bottom:16px;font-size:18px">Mandatory Column Verification</h2>';
  html += '<p style="color:var(--text2);margin-bottom:16px">These columns MUST have correct values for the CRASH LENS frontend to function properly.</p>';
  
  const checks = [
    {col:"Physical Juris Name", why:"Populates County/Jurisdiction dropdown", format:"NNN. Name", example:"043. Henrico County", entries:324},
    {col:"Functional Class", why:"Drives 'No Interstate' filter (!=1-Interstate)", format:"N-Full Label", example:"1-Interstate (A,1)", entries:7},
    {col:"Ownership", why:"Drives 'County Roads' and 'City Roads' filters", format:"N. Agency Name", example:"2. County Hwy Agency", entries:6},
    {col:"Crash Severity", why:"EPDO weight calculations (K/A/B/C/O)", format:"Single letter", example:"K", entries:5},
    {col:"x", why:"Longitude for crash mapping", format:"Numeric", example:"-77.436", entries:"N/A"},
    {col:"y", why:"Latitude for crash mapping", format:"Numeric", example:"37.541", entries:"N/A"},
  ];
  
  checks.forEach(c => {
    html += `<div style="background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:14px 18px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong style="font-size:15px">✅ ${c.col}</strong>
          <div style="color:var(--text2);font-size:12px;margin-top:2px">${c.why}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text2)">
          <div>Format: <code style="color:var(--accent)">${c.format}</code></div>
          <div>Example: <code style="color:var(--green)">${c.example}</code></div>
          ${typeof c.entries === 'number' ? '<div>'+c.entries+' mapped values</div>' : ''}
        </div>
      </div>
    </div>`;
  });
  
  html += `<div style="margin-top:20px;padding:16px;background:var(--surface2);border-radius:8px">
    <h3 style="color:var(--green);margin-bottom:8px">✅ All 6 Mandatory Columns: MAPPED</h3>
    <p style="color:var(--text2);font-size:13px">Frontend filters will function correctly after normalization.</p>
  </div>`;
  
  document.getElementById('panel-mandatory').innerHTML = html;
}

function renderGaps() {
  let html = '<h2 style="margin-bottom:16px;font-size:18px">Gap Analysis & Notes</h2>';
  
  html += `<div style="background:var(--surface);border-radius:8px;padding:16px;margin-bottom:16px">
    <h3 style="margin-bottom:8px">No True Gaps — This is a VDOT-to-VDOT Mapping</h3>
    <p style="color:var(--text2);font-size:13px">Since both source and target are VDOT datasets, all 69 target columns exist in the source. 
    The transformation is purely <strong>encoding conversion</strong> (numeric codes → labeled strings) and <strong>column renaming</strong> (5 columns).</p>
  </div>`;
  
  html += `<div style="background:var(--surface);border-radius:8px;padding:16px;margin-bottom:16px">
    <h3 style="margin-bottom:8px">Extra Columns (4 preserved)</h3>
    <p style="color:var(--text2);font-size:13px">Local Case CD, Route or Street Name, LAT, and LON are not in the 69-column standard but are preserved as passthrough. 
    The frontend ignores columns it doesn't recognize. See the Column Mapping tab for details.</p>
  </div>`;
  
  html += `<div style="background:var(--surface);border-radius:8px;padding:16px;margin-bottom:16px">
    <h3 style="margin-bottom:8px">Special Handling: Code 99</h3>
    <p style="color:var(--text2);font-size:13px">The source uses code <strong>99</strong> across multiple columns as a sentinel value. 
    It maps to either "Not Applicable" or "Not Provided" depending on the column context, matching the frontend standard exactly.</p>
  </div>`;
  
  html += `<div style="background:var(--surface);border-radius:8px;padding:16px">
    <h3 style="margin-bottom:8px">Special Handling: Code 0</h3>
    <p style="color:var(--text2);font-size:13px">Code <strong>0</strong> has dual meaning: in boolean columns it means "No", 
    but in categorical columns like Roadway Defect, Work Zone Related, and Collision Type it means "Not Applicable". 
    The mapping handles each column independently.</p>
  </div>`;
  
  document.getElementById('panel-gaps').innerHTML = html;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#colTable tbody tr').forEach(tr => {
    const col = tr.getAttribute('data-col') || '';
    tr.style.display = col.includes(q) ? '' : 'none';
  });
}

function saveState() {
  localStorage.setItem('crashlens_mapping', JSON.stringify({saved:new Date().toISOString()}));
  alert('State saved to localStorage');
}

function loadState() {
  const s = localStorage.getItem('crashlens_mapping');
  if (s) { alert('State loaded from: ' + JSON.parse(s).saved); }
  else { alert('No saved state found'); }
}

function exportJSON() {
  const config = {
    column_renames: COLUMN_RENAMES,
    columns_to_drop: [],  // None — all extra columns preserved
    extra_columns: EXTRA_COLUMNS,
    value_maps: VALUE_MAPS,
    target_columns: TARGET_69,
    generated: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(config, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vdot_mapping_config.json';
  a.click();
}

// Initialize
renderStats();
renderColumnTable();
renderValueMaps();
renderMandatory();
renderGaps();
</script>
